---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app minecraft-ketting
  namespace: game-servers
spec:
  interval: 5m
  chart:
    spec:
      chart: minecraft
      version: 5.1.2
      sourceRef:
        kind: HelmRepository
        name: minecraft-server-charts
        namespace: flux-system
      interval: 5m
  install:
    timeout: 10m
    replace: true
    crds: CreateReplace
    createNamespace: true
  upgrade:
    timeout: 15m
    remediation:
      remediateLastFailure: true
      retries: 3
      strategy: rollback
    cleanupOnFail: true
    crds: CreateReplace
  test:
    enable: true
  rollback:
    recreate: true
    force: true
    cleanupOnFail: true
  uninstall:
    keepHistory: false
  driftDetection:
    mode: enabled
  maxHistory: 3
  values:
    fullnameOverride: *app
    serviceAnnotations:
      lbipam.cilium.io/ips: ${CLUSTER_LB_MINECRAFT}
  valuesFrom:
    - kind: ConfigMap
      name: minecraft-ketting-values
    - kind: Secret
      name: minecraft-ketting-secret-values
  postRenderers:
    - kustomize:
        patches:
          - target:
              version: v1
              kind: Deployment
              name: minecraft-ketting
            patch: |
              - op: add
                path: /spec/template/spec/hostNetwork
                value: true
              - op: add
                path: /spec/template/spec/dnsPolicy
                value: ClusterFirstWithHostNet
              - op: add
                path: /spec/template/spec/volumes/-
                value:
                  name: geyser-config
                  configMap:
                    name: geysermc-ketting-config
              - op: add
                path: /spec/template/spec/containers/-
                value:
                  name: geyser-standalone
                  image: eclipse-temurin:21-jre
                  command:
                    - /bin/sh
                    - -c
                    - |
                      apt-get update -qq && apt-get install -y -qq curl >/dev/null 2>&1
                      curl -sL -o /geyser/Geyser.jar \
                        https://download.geysermc.org/v2/projects/geyser/versions/latest/builds/latest/downloads/standalone
                      cd /geyser && exec java -Xmx512m -jar Geyser.jar
                  ports:
                    - containerPort: 19132
                      protocol: UDP
                      name: geysermc
                  volumeMounts:
                    - name: geyser-config
                      mountPath: /geyser/config.yml
                      subPath: config.yml
                  resources:
                    requests:
                      memory: 512Mi
                      cpu: 250m
                    limits:
                      memory: 768Mi
          - target:
              version: v1
              kind: Service
              name: minecraft-ketting
            patch: |
              - op: add
                path: /spec/ports/-
                value:
                  name: geysermc
                  port: 19132
                  targetPort: 19132
                  protocol: UDP
