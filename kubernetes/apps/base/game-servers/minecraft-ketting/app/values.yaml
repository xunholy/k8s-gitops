extraEnv:
  TZ: "Australia/Melbourne"
  # CurseForge mods to download (Wither Storm mod bundles GeckoLib in its -all.jar)
  CURSEFORGE_FILES: "https://www.curseforge.com/minecraft/mc-mods/crackers-wither-storm-mod"

minecraftServer:
  serverName: Wildfire Wither Storm Server
  eula: "TRUE"
  type: FORGE
  version: "1.20.1"
  maxPlayers: 10
  maxTickTime: -1
  memory: 6144M
  gameMode: survival
  hardcore: false
  pvp: true
  worldSaveName: witherstorm-world
  # Offline mode allows Bedrock players to join via Geyser sidecar without extra auth
  onlineMode: false
  rcon:
    enabled: true
  motd: "Welcome to Wither Storm on Kubernetes!"
  playerIdleTimeout: 10
  cheats: true
  enableLanVisibility: true
  defaultPermission: operator
  enableSSH: true
  serviceType: LoadBalancer
  overrideServerProperties: true
  removeOldMods: true

tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: "node-role.kubernetes.io/control-plane"
              operator: "Exists"

resources:
  requests:
    memory: 6Gi
    cpu: 2
  limits:
    memory: 8Gi

persistence:
  dataDir:
    enabled: true
    existingClaim: minecraft-ketting-ceph

podSecurityContext:
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
