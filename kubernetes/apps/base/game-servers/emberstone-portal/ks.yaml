---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: emberstone-portal
  namespace: game-servers
  labels:
    gitops.owncloud.ai/defaults: disabled
spec:
  decryption:
    provider: sops
  interval: 30m
  retryInterval: 1m
  timeout: 10m
  path: "./apps/base/game-servers/emberstone-portal/app"
  prune: true
  wait: true
  sourceRef:
    kind: ExternalArtifact
    name: emberstone-portal
    namespace: flux-system
  # No dependsOn on cmangos — DB is now in cmangos-database, and the
  # portal is a stateless web client over the DBs. Keeping it
  # reconcilable when either world server is broken so account signups
  # / login keeps working against the healthy realm.
  targetNamespace: game-servers
