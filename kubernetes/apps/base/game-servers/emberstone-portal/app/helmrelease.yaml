---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: emberstone-portal
  namespace: game-servers
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      app:
        containers:
          app:
            image:
              repository: ghcr.io/xunholy/cmangos-registration
              tag: da24e639b3b8e8366f792423399cb8ef0ca2f4b7
            env:
              TZ: ${CLUSTER_TIMEZONE}
            envFrom:
              - secretRef:
                  name: emberstone-portal-captcha
              # SOAP creds (cmangos GM service account) from 1Password
              # via ESO. Replaces hardcoded soapadmin:soapadmin that
              # used to live in config.php.
              - secretRef:
                  name: cmangos-soap-creds
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 80
                  periodSeconds: 30
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 80
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 80
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 30
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
    defaultPodOptions:
      securityContext:
        fsGroup: 33
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: app
        ports:
          http:
            port: 80
    persistence:
      config:
        type: configMap
        name: emberstone-portal-config
        advancedMounts:
          app:
            app:
              - path: /var/www/html/application/config/config.php
                subPath: config.php
              - path: /var/www/html/template/kaelthas/tpl/header.php
                subPath: header.php
              - path: /var/www/html/template/kaelthas/tpl/footer.php
                subPath: footer.php
              - path: /var/www/html/template/kaelthas/tpl/main.php
                subPath: main.php
              - path: /var/www/html/template/kaelthas/tpl/posts.php
                subPath: posts.php
              - path: /var/www/html/template/kaelthas/tpl/howtoconnect.php
                subPath: howtoconnect.php
              - path: /var/www/html/template/kaelthas/tpl/bot_filter.php
                subPath: bot_filter.php
