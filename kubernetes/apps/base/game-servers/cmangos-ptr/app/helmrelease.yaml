---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
#
# Emberstone PTR — mangosd-only worldserver.
#
# Auth (realmd) and MariaDB are shared with the live realm via the
# cmangos-realmd / cmangos-database HelmReleases. PTR has its own
# world/characters/logs databases (ptrmangos/ptrcharacters/ptrlogs)
# on the same MariaDB instance. Realm id is 2 (live is 1).
#
# Settings mirror the live cmangos HelmRelease (modules, rates, anticheat,
# bot density) so PTR behaves identically to live for testing — only
# realm identity (RealmID/port/DB names/motd) and shutdown-window tuning
# differ. Bots use the `ptrbot` account prefix so they don't collide
# with live's `rndbot*` accounts in the shared classicrealmd.account
# table; each prefix's characters live in its own characters DB.
# Compute is sized to match live since PTR now carries a 500-2000 bot
# population on top of any human GMs.
#
# ───────────────────────────────────────────────────────────────────────
# CRASH-CLASS BISECT (2026-05-23/24) — closed
# ASan diagnostic runs on this PTR identified and fixed two crash classes:
#   PR #11 (xunholy/cmangos-classic#11, merged ec7e2825):
#     PlayerbotFactory::Randomize -> Player::SaveToDB -> Item::~Item
#     heap-use-after-free racing with ~Spell on a MapUpdater worker.
#     Fixed by honoring m_usedInSpellCount in Item destruction sites +
#     making the refcount atomic + dropping a PlayerBots double-bump.
#   PR #12 (xunholy/cmangos-classic#12, merged 190c0467):
#     GroupLootRoll::SendAllPassed UAF from Loot::~Loot destruction
#     order. Fixed by clearing m_roll before deleting m_lootItems.
# Both confirmed under bots=1500/2000 + ASan on this PTR. Modules
# are now re-enabled in lockstep with live (this commit).
#
# Known open (lower priority, separate followup PRs needed):
#   - SpellIdValue stack-use-after-return in PlayerbotChatHandler /
#     ChatHandler::ExtractLiteralArg (strtok) on a MapUpdater worker
#   - TravelMgr new-delete-type-mismatch at exit() — missing virtual
#     dtor in ai::TravelDestination base class
# ───────────────────────────────────────────────────────────────────────
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cmangos-ptr
  namespace: game-servers
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      mangosd:
        pod:
          terminationGracePeriodSeconds: 210
        initContainers:
          wait-db:
            image:
              repository: busybox
              tag: latest
            command: ['sh', '-c', 'until nc -z cmangos-database 3306; do sleep 2; done']
        containers:
          app:
            image:
              repository: ghcr.io/xunholy/cmangos-classic
              # Aligned with live on f24f277e — main HEAD after PR #9
              # merged (Engine::Reset swap-then-iterate UAF fix +
              # SqlStmtParameters canary diagnostic). PTR proved both
              # patches across an 8h+ run with full equipment paths
              # and MapUpdate.Threads=3.
              # DIAGNOSTIC 2026-05-24: ASan build off the PR #12 merge
              # SHA (xunholy/cmangos-classic#12, 190c046713...). That PR
              # adds the Loot shutdown-UAF fix on top of PR #11's
              # playerbot fixes. Combined fix set carried by this image:
              #   PR #11 (ec7e2825):
              #     1. Item: defer destruction when m_usedInSpellCount > 0
              #        (closes the SaveToDB -> delete-this UAF on bot login)
              #     2. Item: make m_usedInSpellCount atomic
              #     3. PlayerBots: drop redundant SetUsedInSpell(true)
              #        after SetCastItem (refcount leak cleanup)
              #   PR #12 (190c0467):
              #     4. Loot: clear m_roll before deleting LootItems
              #        in both ~Loot and Clear() — closes the
              #        GroupLootRoll::SendAllPassed UAF that fires from
              #        World::CleanupsBeforeStop on shutdown
              # PR #11 confirmed on PTR (0 restarts in 29 min). PR #12
              # validation is the next k8s rollout: rollout restart of
              # this deploy triggers preStop drain which runs
              # CleanupsBeforeStop — that's exactly where the shutdown
              # UAF fired pre-fix. ~2× runtime / ~3× memory overhead;
              # limit stays at 20Gi.
              # PTR validation 2026-05-25: PR #19 (xunholy/cmangos-classic#19)
              # branch image — attunement module amalgamates dualspec
              # (previously a standalone module). The standalone Dual
              # Specialization Crystal NPC (entry 190024) is despawned;
              # the Attuner of Paths now exposes the spec-switch gossip.
              # Existing custom_dualspec_* characters-DB tables are
              # preserved (live carries ~18k characters of spec/action-bar
              # state). This is a Release build (no ASan) — the
              # dualspec refactor is unrelated to UAF classes, and the
              # Jaz/Windsor PR #20 fix is also expected to bake on PTR
              # under hands-on test, not ASan instrumentation.
              # 2026-05-25 PTR validation image:
              #   - PR #19 (merged at 4cc55d5) on main: attunement
              #     amalgamates dualspec (fixed Main/Secondary names,
              #     no rename, single-confirm purchase, free-unlock UX,
              #     live re-render after activate).
              #   - PR #20 branch (head aeb0551) on top of new main:
              #     BRD Jail Break! escort can no longer freeze at the
              #     Jaz cell — the IN_PROGRESS-guarded SPECIAL signal
              #     is replaced with drain-on-empty GuidSets so AoE /
              #     simultaneous / out-of-order kills all advance
              #     Windsor correctly.
              # 2026-05-26 bump: PR #20 extended with two belt-and-braces
              # commits — defensive faction flip (d11feac) so the wardens
              # are guaranteed hostile regardless of DB seed state, and
              # pre-kill race close (a34da74) so a player running ahead
              # of Windsor and AoEing the wardens during phase 1 can't
              # wedge the escort. Full validation report in PR body.
              # Tag below is the GH-generated PR test-merge SHA.
              # 2026-06-08: bumped to 8fc4bbbc for the paladinpower module
              # (Classic paladin Crusader Strike) — vendored + build-wired in
              # xunholy/cmangos-classic@8fc4bbbc. PTR-only; live cmangos stays
              # pinned to 7205c38f. Enabled via the paladinpower-config mount.
              # 2026-06-14: bumped to fa0a3d9c for PR #21
              # (xunholy/cmangos-classic#21) — "The Missing Diplomat" / Dashel
              # Stonefist (quest 1447) fixes. Two server-side defects:
              #   1. HandleEndEvent no longer gates the whole RP/credit switch
              #      on m_thugsAlive, so the quest can complete when both Old
              #      Town Thugs die before Dashel yields (stage 5 now runs
              #      AreaExploredOrEventHappens(1447)).
              #   2. SetDeathPrevention(false) in Reset() — Dashel is no longer
              #      left permanently unkillable after the encounter.
              # Additive on top of 8fc4bbbc (same modules + paladinpower mount);
              # no SQL, so no new migration. GH PR test-merge SHA. PTR-only.
              # 2026-06-15: bumped to f086a251 for PR #22
              # (xunholy/cmangos-classic#22) — bounds-check the grid index in
              # TerrainInfo::GetGrid so an off-map coordinate (broken movement
              # spline) no longer reads m_GridMaps[64][64] out of bounds and
              # SIGSEGVs in GetAreaFlag on a map-update worker thread. This is
              # the soak-test image to validate that MapUpdate.Threads=3 is
              # stable, so we can drop the Threads=1 workaround. NOTE: this is
              # branched off main (8fc4bbbc), so it does NOT carry the PR #21
              # Dashel/Missing-Diplomat fix — intentionally, to isolate the
              # crash fix under multi-threaded map update. GH PR test-merge SHA.
              tag: f086a251beb33e76c515e41ab1c4a9c7b8e091df
            args: ["mangosd"]
            tty: true
            stdin: true
            env:
              TZ: ${CLUSTER_TIMEZONE}
              MANGOS_DBHOST: cmangos-database
              MANGOS_DBPORT: "3306"
              # Auth DB is shared with live so accounts/GM flags carry over.
              MANGOS_REALMD_DBNAME: classicrealmd
              # Game state isolated from live.
              MANGOS_WORLD_DBNAME: ptrmangos
              MANGOS_CHARACTERS_DBNAME: ptrcharacters
              MANGOS_LOGS_DBNAME: ptrlogs
            envFrom:
              # MANGOS_DBUSER + MANGOS_DBPASS from 1Password via ESO —
              # shared with live (same MariaDB instance, cmangos_app has
              # grants on ptrmangos / ptrcharacters / ptrlogs and the
              # shared classicrealmd). Hardcoded mangos:mangos was left
              # over from before the rotation; the old PTR pod survived
              # only because it held a pre-rotation DB connection.
              - secretRef:
                  name: cmangos-database-creds
            # PTR: shorter countdown (2 min), same double-save pattern
            # as live. SIGTERM at ~160s, SIGKILL at 210s.
            lifecycle:
              preStop:
                exec:
                  command:
                    - /bin/sh
                    - -c
                    - |
                      echo "server restart 120" > /tmp/mangosd-stdin
                      sleep 2
                      echo "saveall" > /tmp/mangosd-stdin
                      sleep 88
                      echo "saveall" > /tmp/mangosd-stdin
                      sleep 50
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 8086
                  periodSeconds: 30
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 8086
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 8086
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 180
            resources:
              # Matched to live cmangos for true parity. The 6Gi cap was
              # masking a playerbots memory-leak (PR #293 quest-handler
              # change) as a "PTR crashes when a player joins" symptom;
              # at 12Gi PTR can soak the leak long enough to either
              # observe steady growth or reach a stable plateau.
              # Raised 12Gi -> 20Gi to absorb the ASan ~3× shadow
              # memory overhead while on the diagnostic image. Revert
              # together with the image swap.
              requests:
                cpu: "2"
                memory: 4Gi
              limits:
                memory: 20Gi
          # Tail GM audit log to stdout — same pattern as live so GM
          # actions on PTR are visible in kubectl logs and any future
          # log collector.
          gm-log-tail:
            image:
              repository: busybox
              tag: latest
            command:
              - /bin/sh
              - -c
              - |
                while [ ! -f /opt/mangos/logs/gm.log ]; do sleep 5; done
                exec tail -F /opt/mangos/logs/gm.log
            resources:
              requests:
                cpu: 5m
                memory: 8Mi
              limits:
                memory: 32Mi
            securityContext:
              runAsUser: 1001
              runAsGroup: 1001
              runAsNonRoot: true
              readOnlyRootFilesystem: true
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
          # Cores-pruner — same UID + cap reasoning as live. Keeps the
          # 20Gi PTR cores PVC from wedging if PTR ever enters a crash loop.
          cores-pruner:
            image:
              repository: busybox
              tag: latest
            command:
              - /bin/sh
              - -c
              - |
                while true; do
                  if cd /opt/mangos/cores 2>/dev/null; then
                    find . -maxdepth 1 -name 'core.*' -size 0 -delete 2>/dev/null
                    # shellcheck disable=SC2012
                    ls -1t core.* 2>/dev/null | tail -n +3 | xargs -r rm -f --
                  fi
                  sleep 600
                done
            resources:
              requests:
                cpu: 5m
                memory: 8Mi
              limits:
                memory: 32Mi
            securityContext:
              runAsUser: 1001
              runAsGroup: 1001
              runAsNonRoot: true
              readOnlyRootFilesystem: true
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
    service:
      world:
        controller: mangosd
        ports:
          world:
            port: 8086
      soap:
        controller: mangosd
        ports:
          soap:
            # Different cluster-internal port than live so the two SOAP
            # endpoints don't collide if anything ever cross-references.
            port: 7879
    configMaps:
      mangosd-config:
        data:
          mangosd.conf: |
            RealmID = 2
            GameType = 1
            RealmZone = 8
            WorldServerPort = 8086
            BindIP = "0.0.0.0"
            # Negative PlayerLimit gates login on minimum security level
            # (-1 Moderator, -2 GM, -3 Admin). PTR is currently locked to
            # GM+ so only staff/testers can log in while features bake;
            # bots are spawned server-side and bypass this gate, so the
            # 500-2000 bot population stays up for load testing.
            PlayerLimit = -2
            # PTR stress test (2026-05-22): MapUpdate.Threads bumped
            # 1 → 3 to exercise concurrent map updates against the
            # patched binary (PR#9 with Engine::Reset swap-then-iterate
            # + SqlStmtParameters canary). Live keeps =1 as the
            # workaround; PTR is the soak-test bed for whether the
            # fixes hold up against the original concurrency hazard.
            # If a new crash class surfaces under N=3, revert here and
            # capture the core.
            MapUpdate.Threads = 3
            Motd = "Welcome to Emberstone PTR"
            # Match live: LogLevel=1 keeps kubectl logs clean, LogFile
            # captures full diagnostics on the PVC.
            LogLevel = 1
            LogFile = "/opt/mangos/logs/Server.log"
            LogFileLevel = 3
            LogTimestamp = 1
            GmLogFile = "/opt/mangos/logs/gm.log"
            GmLogTimestamp = 1
            GmLogPerAccount = 0
            LogGMTrade = 1
            LogFilter_GMChat = 0
            SOAP.Enabled = 1
            SOAP.IP = 0.0.0.0
            SOAP.Port = 7879
            Rate.XP.Kill = 1
            Rate.XP.Quest = 1
            Rate.XP.Explore = 1
            Rate.Drop.Item.Poor = 3
            Rate.Drop.Item.Normal = 3
            Rate.Drop.Item.Uncommon = 3
            Rate.Drop.Item.Rare = 2
            Rate.Drop.Item.Epic = 1
            Rate.Drop.Money = 3
            Rate.Reputation.Gain = 3
            AllowTwoSide.Interaction.Group = 1
            AllowTwoSide.Interaction.Guild = 1
            AllowTwoSide.Interaction.Chat = 1
            AllowTwoSide.Interaction.Channel = 1
            MailDeliveryDelay = 0
            StartPlayerMoney = 100000
            SkillGain.Crafting = 3
            SkillGain.Gathering = 3
            SkillGain.Defense = 3
            SkillGain.Weapon = 3
            Rate.Drop.Item.Quest = 3
            Death.Ghost.RunSpeed.World = 1.5
            PlayerSaveInterval = 60000
            Rate.Health = 3
            Rate.Mana = 3
      # All side-modules mirror live — same module versions in the same
      # binary, configured identically except where PTR identity (realm
      # id, ports, db names) forces differences.
      aiplayerbot-config:
        data:
          aiplayerbot.conf: |
            AiPlayerbot.Enabled = 1
            AiPlayerbot.RandomBotAutoCreate = 1
            AiPlayerbot.RandomBotAutologin = 1
            # Mirror live: don't stampede bot logins at boot. Bots ramp
            # via the random-bot tick after startup, which keeps the
            # MapUpdater + navmesh init out of the concurrent-crash
            # window seen on live.
            AiPlayerbot.RandomBotLoginAtStartup = 0
            # PTR-specific prefix: classicrealmd.account is shared with
            # live (where rndbot* lives). Using ptrbot* keeps the two
            # bot populations from sharing account rows — each prefix's
            # characters then live in its own characters DB (rndbot →
            # classiccharacters, ptrbot → ptrcharacters).
            AiPlayerbot.RandomBotAccountPrefix = ptrbot
            AiPlayerbot.RandomBotAccountCount = 2000
            AiPlayerbot.MinRandomBots = 1500
            AiPlayerbot.MaxRandomBots = 2000
            # Force random bots to learn Crusader Strike (paladinpower module).
            # PlayerbotFactory::ClearSpells() wipes module-granted spells on each
            # re-randomize, so the module's level-up hook isn't enough for bots;
            # RandomBotSpellIds is re-applied after ClearSpells. 54197 is the
            # stock default; appended CS ranks (all ranks, level-gating bypassed).
            AiPlayerbot.RandomBotSpellIds = 54197,2537,8823,8824,10336,10337
            AiPlayerbot.RandomBotMinLevel = 1
            AiPlayerbot.RandomBotMaxLevel = 60
            AiPlayerbot.RandomBotMaps = 0,1
            AiPlayerbot.AutoDoQuests = 1
            AiPlayerbot.AutoPickReward = yes
            AiPlayerbot.AutoEquipUpgradeLoot = 1
            AiPlayerbot.AutoLearnTrainerSpells = 1
            AiPlayerbot.AutoLearnQuestSpells = 1
            # Crash-class isolation (2026-05-21): PTR is reproducing the
            # MySqlPreparedStatement::bind heap-corruption SIGSEGV. Bot
            # equipment writes are the highest-volume async-DB-write
            # path; disabling here removes them from the suspect set so
            # we can confirm whether the trigger is equipment-related.
            # Re-enable to 1 once the upstream fix lands.
            AiPlayerbot.RandomGearUpgradeEnabled = 1
            AiPlayerbot.RandomGearMaxDiff = 3
            # Off: bots teleport to random level-appropriate spots instead of
            # onto real players. Spreads them across the world, cuts teleport
            # churn, and stops the city/quest-hub dogpiling that amplified the
            # emote/LLM chatter. (Community/celguar vanilla default is 0.)
            AiPlayerbot.RandomBotTeleportNearPlayer = 0
            AiPlayerbot.SyncQuestWithPlayer = 1
            # Match live: forces InitGuild() onto the no-bug branch (see
            # live aiplayerbot.conf for the 2026-05-21 SIGSEGV analysis).
            AiPlayerbot.RandomBotGuildCount = 50
            AiPlayerbot.RandomBotJoinBG = 1
            # Match live: bots queue when invited but don't auto-queue;
            # avoids the HandleMoveWorldportAckOpcode race.
            AiPlayerbot.RandomBotAutoJoinBG = 0
            AiPlayerbot.RandomBotGroupNearby = 1
            # Spread bots across the full 1-60 range instead of pinning them to
            # the (low) online-player level. With sync on, a quiet/low-level
            # server collapsed the bot cap to ~player+2, dragging the whole pool
            # to level 1-7 and swarming starter zones. Off: bots distribute 1-60
            # and the periodic randomize re-rolls any bot <= startingLevel(5)
            # upward, so low-level bots continuously level up and move on.
            # (SyncLevelMaxAbove is inert while sync is disabled.)
            AiPlayerbot.SyncLevelWithPlayers = 0
            AiPlayerbot.SyncLevelMaxAbove = 2
            AiPlayerbot.AutoPickTalents = full
            AiPlayerbot.AutoTrainSpells = free
            AiPlayerbot.minEnchantingBotLevel = 10
            AiPlayerbot.BotAcceptDuelMinimumLevel = 10
            AiPlayerbot.LogInGroupOnly = 1
            # LLM-driven chat — points at the in-cluster Ollama
            # (ai-system ns, qwen2.5:3b ~1.9GB). PlayerbotLLMInterface
            # is async by design and drops requests above the
            # MaxSimultaniousGenerations cap, so this can't block bot
            # tick threads even at 1500+ bots. Starting conservative:
            # - Mode 2 = LLM default for all bots (no per-bot strategy)
            # - max 25 concurrent generations (qwen2.5:3b on CPU does
            #   ~5-10 gens/s; 25 caps sustainable backpressure)
            # - 30s timeout drops slow gens rather than holding state
            # - Bot-to-bot chat OFF initially (avoid LLM-vs-LLM loops)
            # - RPG-AI chat ON (full chance during RPG interactions)
            # Response patterns are for the OpenAI-compat
            # /v1/chat/completions schema that Ollama exposes.
            # RE-ENABLED 2026-05-24 on the PR #13 image (asan-4194d578).
            # The previous LLMEnabled=2 attempt crashed mangosd with
            # std::regex_error -> SIGABRT on the first chat-completion
            # response. PR #13 wraps every std::regex(...) in
            # PlayerbotLLMInterface.cpp with try/catch so an invalid
            # response-parsing pattern logs sLog.outError and degrades
            # gracefully (no extraction / unchanged content / single
            # chunk / skip delete) instead of taking down the server.
            # A whisper-to-bot test under this image should now
            # produce a log line identifying the offending regex
            # rather than a crash.
            AiPlayerbot.LLMEnabled = 2
            AiPlayerbot.LLMApiEndpoint = http://ollama.ai-system.svc.cluster.local:11434/v1/chat/completions
            AiPlayerbot.LLMApiKey =
            AiPlayerbot.LLMApiJson = {"model": "qwen2.5:3b", "messages": [{"role": "system", "content": "<pre prompt> <context>"},{"role": "user", "content": "<prompt>"}],"max_tokens": 60}
            AiPlayerbot.LLMContextLength = 4096
            AiPlayerbot.LLMGenerationTimeout = 30
            AiPlayerbot.LLMMaxSimultaniousGenerations = 25
            AiPlayerbot.LLMPrePrompt = You are <bot name>, a level <bot level> <bot gender> <bot race> <bot class> in <bot subzone>, <bot zone>. <other name> (level <other level> <other gender> <other race> <other class>) just sent you a <channel name>. Reply like a real WoW Classic player would in chat: brief, casual, lowercase fine, shorthand fine (ty, wb, brb, lol, omw, gtg, np, k). React to what they said. Drop in your current activity (quest, grind spot, looking for group, heading to a city) when it fits naturally. Stay in character at all times — you are this character, in this world, right now. Never mention being an AI, "the game", interfaces, mechanics, or anything outside the world. Under 100 characters.
            AiPlayerbot.LLMPrompt = <receiver name>:<initial message>
            AiPlayerbot.LLMPostPrompt = <bot name>:
            AiPlayerbot.LLMRpgPrompt = You are <bot name>, a level <bot level> <bot gender> <bot race> <bot class>, standing in <bot subzone>, <bot zone>. Nearby is <unit name>, a <unit type> — a level <unit level> <unit gender> <unit race> <unit faction> <unit class>. Say something a real WoW Classic player would say in passing: a quick comment, observation, greeting, or in-character muttering about what you're doing. Casual chat tone, lowercase fine, shorthand fine. Reference your class, zone, or current activity if it fits. Stay in character: no AI talk, no game-mechanic talk, no fourth wall. Under 100 characters.
            # Only the StartPattern is overridden, and it deliberately
            # contains NO backslashes. Reason: the cmangos config
            # parser strips backslashes when loading .conf values
            # (verified empirically — PR #13 try/catch caught
            # "splitResponse: invalid regex (*.*?*)|..." where every
            # \\* in our config was reduced to *, breaking the regex).
            # The code defaults in PlayerbotAIConfig.cpp:678-681 are
            # R"(...)" raw string literals so they bypass the parser
            # and work correctly — we omit the End/Delete/Split
            # overrides so those defaults take effect. The Start
            # override is required because Ollama returns the
            # OpenAI-compat schema ("content":"...") rather than the
            # KoboldAI ("text":"...") schema the default targets; we
            # rewrite it backslash-free using literal characters.
            AiPlayerbot.LLMResponseStartPattern = ("content":")
            AiPlayerbot.LLMBotToBotChatChance = 0
            AiPlayerbot.LLMRpgAIChatChance = 100
      twinkmaster-config:
        data:
          twinkmaster.conf: |
            Twinkmaster.Enable = 1
            Twinkmaster.TargetLevel = 19
      attunement-config:
        data:
          # Hardcore was amalgamated into the Attuner of Paths gossip
          # in xunholy/cmangos-classic@feb8ea8b7. Dualspec was
          # amalgamated in PR #19 (this PTR image) — the standalone
          # Dual Specialization Crystal NPC (entry 190024) is despawned
          # and the spec-switch gossip lives on the Attuner. The merged
          # module reads Attunement.*, Hardcore.*, AND Dualspec.* keys
          # from this single attunement.conf. The old standalone
          # /opt/mangos/conf/hardcore.conf and /opt/mangos/conf/
          # dualspec.conf are no longer consulted by the binary.
          attunement.conf: |
            Attunement.Enable = 1
            Attunement.DefaultRate = 1.0
            Attunement.MinRate = 0.1
            Attunement.MaxRate = 100
            Attunement.Aura.Tier1.SpellId = 0
            Attunement.Aura.Tier2.SpellId = 0
            Attunement.Aura.Tier3.SpellId = 0
            Attunement.Aura.Tier4.SpellId = 0
            Attunement.Aura.Tier5.SpellId = 0
            Dualspec.Enable = 1
            # Free unlock — Dualspec.Cost is in copper. 0 means the
            # Attuner offers a single-click "Unlock Dual Talent
            # Specialization" with no cost-confirm popup (the code
            # branches on cost > 0 to drop the "(Xg)" suffix and the
            # are-you-sure dialog for the free path).
            Dualspec.Cost = 0
            Hardcore.Enable = 1
            Hardcore.PlayerConfig = 1
            Hardcore.BroadcastDeathGuild = 1
            Hardcore.BroadcastDeathWorld = 1
            Hardcore.SpawnGrave = 1
            Hardcore.GraveGameObjectID = 61
            Hardcore.GraveMessage = "Shit happens. <PlayerName> | Well, this sucks. <PlayerName> | It is really dark down here. <PlayerName> | Finally some peace and quiet. <PlayerName> | Shhh! I am sleeping. <PlayerName>"
            Hardcore.RemoveGravesOnCharacterDeleted = 1
            Hardcore.DropGear = 0
            Hardcore.DropItems = 0
            Hardcore.DropMoney = 0
            Hardcore.BotDropGear = 0
            Hardcore.BotDropItems = 0
            Hardcore.BotDropMoney = 0
            Hardcore.RemoveLootOnCharacterDeleted = 1
            Hardcore.LootGameObjectID = 2850
            Hardcore.ReviveDisabled = 1
            Hardcore.ReviveOnGraveyard = 0
            Hardcore.LevelDown = 0
            Hardcore.MaxPlayerLoot = 99
            Hardcore.DropOnDungeons = 1
            Hardcore.DropOnRaids = 1
            Hardcore.LevelDownOnDungeons = 1
            Hardcore.LevelDownOnRaids = 1
            Hardcore.LevelDownMinLevel = 1
            Hardcore.DropMinLevel = 1
            Hardcore.DisablePVP = 0
            Hardcore.SelfFound = 0
      anticheat-config:
        data:
          # Mirror live anticheat.conf verbatim. Canonical source:
          # etc/emberstone/anticheat.conf in xunholy/cmangos-classic.
          # Action mask vocabulary (sum of bits): 1=log, 2=prompt,
          # 4=kick, 8=ban_acct, 16=ban_ip, 32=silence. Every mask here
          # is ≤ 7 — kick-only, never auto-ban.
          anticheat.conf: |
            [AnticheatConf]
            ConfVersion=2017102301
            Enable = 1
            FingerprintHistory = 30
            FingerprintLevel = 6
            KickDelay.Min = 30
            KickDelay.Max = 90
            BanDelay.Min = 30
            BanDelay.Max = 90
            IPBanDelay.Min = 30
            IPBanDelay.Max = 90
            BanWave.Day = 1
            BanWave.Hour = 10
            BanWave.Minute = 0
            Movement.UseExtrapolation = 1
            Movement.SpeedHack.Enable  = 1
            Movement.WallClimb.TickCount   = 0
            Movement.WallClimb.TickAction  = 0
            Movement.WallClimb.TotalCount  = 0
            Movement.WallClimb.TotalAction = 0
            Movement.WaterWalk.TickCount   = 1
            Movement.WaterWalk.TickAction  = 7
            Movement.WaterWalk.TotalCount  = 0
            Movement.WaterWalk.TotalAction = 0
            Movement.SlowFall.TickCount   = 1
            Movement.SlowFall.TickAction  = 7
            Movement.SlowFall.TotalCount  = 0
            Movement.SlowFall.TotalAction = 0
            Movement.FlyHack.TickCount    = 1
            Movement.FlyHack.TickAction   = 7
            Movement.FlyHack.TotalCount   = 0
            Movement.FlyHack.TotalAction  = 0
            Movement.Forbidden.TickCount  = 1
            Movement.Forbidden.TickAction = 7
            Movement.Forbidden.TotalCount = 0
            Movement.Forbidden.TotalAction= 0
            Movement.NullClientTime.TickCount  = 1
            Movement.NullClientTime.TickAction = 7
            Movement.NullClientTime.TotalCount = 0
            Movement.NullClientTime.TotalAction = 0
            Movement.RootMove.TickCount  = 1
            Movement.RootMove.TickAction = 7
            Movement.RootMove.TotalCount = 0
            Movement.RootMove.TotalAction= 0
            Movement.TimeBack.TickCount  = 1
            Movement.TimeBack.TickAction = 7
            Movement.TimeBack.TotalCount = 0
            Movement.TimeBack.TotalAction= 0
            Movement.FakeTransport.TickCount   = 1
            Movement.FakeTransport.TickAction  = 7
            Movement.FakeTransport.TotalCount  = 0
            Movement.FakeTransport.TotalAction = 0
            Movement.TeleToTransport.TickCount  = 1
            Movement.TeleToTransport.TickAction = 7
            Movement.TeleToTransport.TotalCount = 0
            Movement.TeleToTransport.TotalAction= 0
            Movement.FixedZ.TickCount  = 1
            Movement.FixedZ.TickAction = 7
            Movement.FixedZ.TotalCount = 0
            Movement.FixedZ.TotalAction= 0
            Movement.MultiJump.TickCount    = 1
            Movement.MultiJump.TickAction   = 3
            Movement.MultiJump.TotalCount   = 10
            Movement.MultiJump.TotalAction  = 7
            Movement.FastJump.TickCount     = 1
            Movement.FastJump.TickAction    = 3
            Movement.FastJump.TotalCount    = 10
            Movement.FastJump.TotalAction   = 7
            Movement.JumpSpeedChange.TickCount  = 1
            Movement.JumpSpeedChange.TickAction = 3
            Movement.JumpSpeedChange.TotalCount = 10
            Movement.JumpSpeedChange.TotalAction= 7
            Movement.HeartbeatSkip.TickCount  = 1
            Movement.HeartbeatSkip.TickAction = 3
            Movement.HeartbeatSkip.TotalCount = 10
            Movement.HeartbeatSkip.TotalAction= 7
            Movement.ClockDesync.TickCount  = 1
            Movement.ClockDesync.TickAction = 3
            Movement.ClockDesync.TotalCount = 10
            Movement.ClockDesync.TotalAction= 7
            Movement.OverspeedZ.TickCount   = 1
            Movement.OverspeedZ.TickAction  = 3
            Movement.OverspeedZ.TotalCount  = 5
            Movement.OverspeedZ.TotalAction = 7
            Movement.BadOrderAck.TickCount  = 1
            Movement.BadOrderAck.TickAction = 3
            Movement.BadOrderAck.TotalCount = 5
            Movement.BadOrderAck.TotalAction= 7
            Movement.Teleport.TickCount     = 1
            Movement.Teleport.TickAction    = 7
            Movement.Teleport.TotalCount    = 0
            Movement.Teleport.TotalAction   = 0
            Movement.TeleportFar.TickCount  = 1
            Movement.TeleportFar.TickAction = 7
            Movement.TeleportFar.TotalCount = 0
            Movement.TeleportFar.TotalAction= 0
            Movement.Explore.TickCount     = 3
            Movement.Explore.TickAction    = 3
            Movement.Explore.TotalCount    = 0
            Movement.Explore.TotalAction   = 0
            Movement.ExploreHigh.TickCount  = 1
            Movement.ExploreHigh.TickAction = 3
            Movement.ExploreHigh.TotalCount  = 0
            Movement.ExploreHigh.TotalAction = 0
            Movement.BadFallReset.Enable    = 1
            Movement.BadFallReset.Threshold = 1
            Movement.BadFallReset.Penalty   = 7
            Antispam.Enable   = 1
            Antispam.Silence  = 1
            Antispam.MaxLevel = 25
            # Warden re-enabled to match live (commit 74862c593) — bots
            # are now believed to be the crash variable, not Warden.
            Warden.Enable                       = 1
            Warden.ModuleDir                    = "/opt/mangos/bin/warden_modules"
            Warden.Timeout                      = 30
            Warden.ScanFrequency                = 15
            Warden.ScanCount                    = 10
            Warden.MinimumLevel                 = 1
            Warden.MinimumAdvancedLevel         = 1
            Warden.SuspiciousEndSceneHookAction = 7
            Warden.TickCount                    = 1
            Warden.TickAction                   = 7
            Warden.TotalCount                   = 0
            Warden.TotalAction                  = 0
      vip-config:
        data:
          # Mirror live vip.conf: MasterSpellId 18282 + the full bundle.
          # Plain key=value only (see live config: section headers and
          # # comments parse as garbage with the cmangos config parser).
          vip.conf: |
            Vip.Enable = 1
            Vip.MasterSpellId = 18282
            Vip.BundledSpellIds = 22888,24425,15366,16609,22817,22818,22820,23735,23736,23737,23768,26393,17626,17627,17628
      autoscale-config:
        data:
          autoscale.conf: |
            Autoscale.Enable = 1
            Autoscale.RescanIntervalSeconds = 10
            Autoscale.HpExponent = 0.85
            Autoscale.MinScale = 0.20
            Autoscale.MaxScale = 1.0
            Autoscale.Baseline.Dungeon = 5
            Autoscale.Baseline.RaidDefault = 40
            Autoscale.MapBaselines = "309:20,509:20"
            Autoscale.MapBlacklist = ""
            Autoscale.Announce = 1
      ahbot-config:
        data:
          ahbot.conf: |
            AuctionHouseBot.Seller.Enabled = 1
            AuctionHouseBot.Buyer.Enabled = 1
            AuctionHouseBot.Chance.Sell = 80
            AuctionHouseBot.Chance.Buy = 40
            AuctionHouseBot.Alliance.Items.Amount.Ratio = 100
            AuctionHouseBot.Horde.Items.Amount.Ratio = 100
            AuctionHouseBot.Neutral.Items.Amount.Ratio = 80
            AuctionHouseBot.Buy.Value = 90
            AuctionHouseBot.Bid.Min = 60
            AuctionHouseBot.Bid.Max = 95
            AuctionHouseBot.Time.Min = 2
            AuctionHouseBot.Time.Max = 48
            AuctionHouseBot.Value.Variance = 15
            AuctionHouseBot.Items.Profession = 90, 100, 0, 60
            AuctionHouseBot.Loot.Creature.Normal = 40, 50, 8, 15
            AuctionHouseBot.Loot.Creature.Elite = 35, 40, 2, 4
            AuctionHouseBot.Loot.Creature.Rare = 5, 15, 1, 2
            AuctionHouseBot.Loot.Disenchant = 15, 20, 1, 3
            AuctionHouseBot.Loot.Fishing = 5, 10, 30, 50
            AuctionHouseBot.Loot.Gameobject = 20, 25, 7, 15
            AuctionHouseBot.Loot.Skinning = 5, 10, 50, 80
      transmog-config:
        data:
          transmog.conf: |
            Transmog.Enable = 1
            Transmog.CostFee = 0
            Transmog.CostMultiplier = 1.0
            Transmog.TokenRequired = 0
            Transmog.TokenEntry = 0
            Transmog.TokenAmount = 1
      barber-config:
        data:
          barber.conf: |
            Barber.Enable = 1
      trainingdummies-config:
        data:
          trainingdummies.conf: |
            Trainingdummies.Enable = 1
      achievements-config:
        data:
          achievements.conf: |
            Achievements.Enable = 1
            Achievements.SendMessage = 1
            Achievements.SendAddon = 1
            Achievements.SendVisual = 1
            Achievements.EffectId = 146
            # Match live: bots don't clutter realm-first leaderboards.
            Achievements.RandomBots = 0
            Achievements.RandomBotsRealmFirst = 0
            Achievements.AccountAchievements = 0
      # paladinpower module (Classic paladin Crusader Strike). PTR-only test.
      # Enable=1 + EnableCrusaderStrike=1 grants CS ranks 2537/8823/8824/10336/
      # 10337 (L10-58). Plain key=value only — the cmangos parser treats inline
      # section headers/comments inside the .conf body as garbage.
      paladinpower-config:
        data:
          paladinpower.conf: |
            Paladinpower.Enable = 1
            Paladinpower.EnableCrusaderStrike = 1
            Paladinpower.EnableOldHolyStrike = 0
