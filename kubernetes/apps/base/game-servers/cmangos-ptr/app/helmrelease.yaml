---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
#
# Emberstone PTR — mangosd-only worldserver.
#
# Auth (realmd) and MariaDB are shared with the live realm via the
# cmangos-realmd / cmangos-database HelmReleases. PTR has its own
# world/characters/logs databases (ptrmangos/ptrcharacters/ptrlogs)
# on the same MariaDB instance. Realm id is 2 (live is 1).
#
# Settings mirror the live cmangos HelmRelease (modules, rates, anticheat,
# bot density) so PTR behaves identically to live for testing — only
# realm identity (RealmID/port/DB names/motd) and shutdown-window tuning
# differ. Bots use the `ptrbot` account prefix so they don't collide
# with live's `rndbot*` accounts in the shared classicrealmd.account
# table; each prefix's characters live in its own characters DB.
# Compute is sized to match live since PTR now carries a 500-2000 bot
# population on top of any human GMs.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cmangos-ptr
  namespace: game-servers
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      mangosd:
        pod:
          terminationGracePeriodSeconds: 180
        initContainers:
          wait-db:
            image:
              repository: busybox
              tag: latest
            command: ['sh', '-c', 'until nc -z cmangos-database 3306; do sleep 2; done']
        containers:
          app:
            image:
              repository: ghcr.io/xunholy/cmangos-classic
              # Mirror prod cmangos bump to e77c5494d (clean main HEAD).
              # See kubernetes/apps/base/game-servers/cmangos/app/helmrelease.yaml
              # for the binary-delta context; PTR shares the worldserver
              # binary so we keep versions matched.
              tag: e77c5494d7b179177ceb198e0669b514f2139199
            args: ["mangosd"]
            tty: true
            stdin: true
            env:
              TZ: ${CLUSTER_TIMEZONE}
              MANGOS_DBHOST: cmangos-database
              MANGOS_DBPORT: "3306"
              # Auth DB is shared with live so accounts/GM flags carry over.
              MANGOS_REALMD_DBNAME: classicrealmd
              # Game state isolated from live.
              MANGOS_WORLD_DBNAME: ptrmangos
              MANGOS_CHARACTERS_DBNAME: ptrcharacters
              MANGOS_LOGS_DBNAME: ptrlogs
            envFrom:
              # MANGOS_DBUSER + MANGOS_DBPASS from 1Password via ESO —
              # shared with live (same MariaDB instance, cmangos_app has
              # grants on ptrmangos / ptrcharacters / ptrlogs and the
              # shared classicrealmd). Hardcoded mangos:mangos was left
              # over from before the rotation; the old PTR pod survived
              # only because it held a pre-rotation DB connection.
              - secretRef:
                  name: cmangos-database-creds
            # Matches live's graceful-shutdown pattern, tightened for PTR:
            # 120s in-game countdown + 140s drain, SIGTERM at ~160s, SIGKILL
            # at 180s. PTR will rarely have anyone logged in so a shorter
            # window keeps rollouts snappy.
            lifecycle:
              preStop:
                exec:
                  command:
                    - /bin/sh
                    - -c
                    - |
                      echo "server restart 120" > /tmp/mangosd-stdin
                      sleep 140
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 8086
                  periodSeconds: 30
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 8086
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 8086
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 180
            resources:
              requests:
                cpu: "1"
                memory: 2Gi
              limits:
                memory: 6Gi
          # Tail GM audit log to stdout — same pattern as live so GM
          # actions on PTR are visible in kubectl logs and any future
          # log collector.
          gm-log-tail:
            image:
              repository: busybox
              tag: latest
            command:
              - /bin/sh
              - -c
              - |
                while [ ! -f /opt/mangos/logs/gm.log ]; do sleep 5; done
                exec tail -F /opt/mangos/logs/gm.log
            resources:
              requests:
                cpu: 5m
                memory: 8Mi
              limits:
                memory: 32Mi
            securityContext:
              runAsUser: 1001
              runAsGroup: 1001
              runAsNonRoot: true
              readOnlyRootFilesystem: true
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
          # Cores-pruner — same UID + cap reasoning as live. Keeps the
          # 20Gi PTR cores PVC from wedging if PTR ever enters a crash loop.
          cores-pruner:
            image:
              repository: busybox
              tag: latest
            command:
              - /bin/sh
              - -c
              - |
                while true; do
                  if cd /opt/mangos/cores 2>/dev/null; then
                    find . -maxdepth 1 -name 'core.*' -size 0 -delete 2>/dev/null
                    # shellcheck disable=SC2012
                    ls -1t core.* 2>/dev/null | tail -n +3 | xargs -r rm -f --
                  fi
                  sleep 600
                done
            resources:
              requests:
                cpu: 5m
                memory: 8Mi
              limits:
                memory: 32Mi
            securityContext:
              runAsUser: 1001
              runAsGroup: 1001
              runAsNonRoot: true
              readOnlyRootFilesystem: true
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
    service:
      world:
        controller: mangosd
        ports:
          world:
            port: 8086
      soap:
        controller: mangosd
        ports:
          soap:
            # Different cluster-internal port than live so the two SOAP
            # endpoints don't collide if anything ever cross-references.
            port: 7879
    configMaps:
      mangosd-config:
        data:
          mangosd.conf: |
            RealmID = 2
            GameType = 1
            RealmZone = 8
            WorldServerPort = 8086
            BindIP = "0.0.0.0"
            # Match live PlayerLimit so PTR can hold its 500-2000 bot
            # population plus any human GMs / testers without rejecting
            # logins at the door.
            PlayerLimit = 750
            # Mirror live: serialize MapUpdater workers — workaround for
            # the concurrent-map-update SIGSEGV class on this codebase.
            # See live mangosd.conf comment for the full incident notes.
            MapUpdate.Threads = 1
            Motd = "Welcome to Emberstone PTR"
            # Match live: LogLevel=1 keeps kubectl logs clean, LogFile
            # captures full diagnostics on the PVC.
            LogLevel = 1
            LogFile = "/opt/mangos/logs/Server.log"
            LogFileLevel = 3
            LogTimestamp = 1
            GmLogFile = "/opt/mangos/logs/gm.log"
            GmLogTimestamp = 1
            GmLogPerAccount = 0
            LogGMTrade = 1
            LogFilter_GMChat = 0
            SOAP.Enabled = 1
            SOAP.IP = 0.0.0.0
            SOAP.Port = 7879
            Rate.XP.Kill = 1
            Rate.XP.Quest = 1
            Rate.XP.Explore = 1
            Rate.Drop.Item.Poor = 3
            Rate.Drop.Item.Normal = 3
            Rate.Drop.Item.Uncommon = 3
            Rate.Drop.Item.Rare = 2
            Rate.Drop.Item.Epic = 1
            Rate.Drop.Money = 3
            Rate.Reputation.Gain = 3
            AllowTwoSide.Interaction.Group = 1
            AllowTwoSide.Interaction.Guild = 1
            AllowTwoSide.Interaction.Chat = 1
            AllowTwoSide.Interaction.Channel = 1
            MailDeliveryDelay = 0
            StartPlayerMoney = 100000
            SkillGain.Crafting = 3
            SkillGain.Gathering = 3
            SkillGain.Defense = 3
            SkillGain.Weapon = 3
            Rate.Drop.Item.Quest = 3
            Death.Ghost.RunSpeed.World = 1.5
            PlayerSaveInterval = 60000
            Rate.Health = 3
            Rate.Mana = 3
      # All side-modules mirror live — same module versions in the same
      # binary, configured identically except where PTR identity (realm
      # id, ports, db names) forces differences.
      aiplayerbot-config:
        data:
          aiplayerbot.conf: |
            AiPlayerbot.Enabled = 1
            AiPlayerbot.RandomBotAutoCreate = 1
            AiPlayerbot.RandomBotAutologin = 1
            # Mirror live: don't stampede bot logins at boot. Bots ramp
            # via the random-bot tick after startup, which keeps the
            # MapUpdater + navmesh init out of the concurrent-crash
            # window seen on live.
            AiPlayerbot.RandomBotLoginAtStartup = 0
            # PTR-specific prefix: classicrealmd.account is shared with
            # live (where rndbot* lives). Using ptrbot* keeps the two
            # bot populations from sharing account rows — each prefix's
            # characters then live in its own characters DB (rndbot →
            # classiccharacters, ptrbot → ptrcharacters).
            AiPlayerbot.RandomBotAccountPrefix = ptrbot
            AiPlayerbot.RandomBotAccountCount = 2000
            AiPlayerbot.MinRandomBots = 500
            AiPlayerbot.MaxRandomBots = 2000
            AiPlayerbot.RandomBotMinLevel = 1
            AiPlayerbot.RandomBotMaxLevel = 60
            AiPlayerbot.RandomBotMaps = 0,1
            AiPlayerbot.AutoDoQuests = 1
            AiPlayerbot.AutoPickReward = yes
            AiPlayerbot.AutoEquipUpgradeLoot = 1
            AiPlayerbot.AutoLearnTrainerSpells = 1
            AiPlayerbot.AutoLearnQuestSpells = 1
            AiPlayerbot.RandomGearUpgradeEnabled = 1
            AiPlayerbot.RandomGearMaxDiff = 3
            AiPlayerbot.RandomBotTeleportNearPlayer = 1
            AiPlayerbot.SyncQuestWithPlayer = 1
            # Match live: forces InitGuild() onto the no-bug branch (see
            # live aiplayerbot.conf for the 2026-05-21 SIGSEGV analysis).
            AiPlayerbot.RandomBotGuildCount = 50
            AiPlayerbot.RandomBotJoinBG = 1
            # Match live: bots queue when invited but don't auto-queue;
            # avoids the HandleMoveWorldportAckOpcode race.
            AiPlayerbot.RandomBotAutoJoinBG = 0
            AiPlayerbot.RandomBotGroupNearby = 1
            AiPlayerbot.SyncLevelWithPlayers = 1
            AiPlayerbot.SyncLevelMaxAbove = 2
            AiPlayerbot.AutoPickTalents = full
            AiPlayerbot.AutoTrainSpells = free
            AiPlayerbot.minEnchantingBotLevel = 10
            AiPlayerbot.BotAcceptDuelMinimumLevel = 10
            AiPlayerbot.LogInGroupOnly = 1
      twinkmaster-config:
        data:
          twinkmaster.conf: |
            Twinkmaster.Enable = 1
            Twinkmaster.TargetLevel = 19
      attunement-config:
        data:
          # Mirror live: hardcore was amalgamated into the Attuner of
          # Paths gossip in xunholy/cmangos-classic@feb8ea8b7 — the
          # merged module reads both Attunement.* and Hardcore.* keys
          # from this single attunement.conf. The old /opt/mangos/etc/
          # hardcore.conf path is no longer consulted by the binary.
          attunement.conf: |
            Attunement.Enable = 1
            Attunement.DefaultRate = 1.0
            Attunement.MinRate = 0.1
            Attunement.MaxRate = 100
            Attunement.Aura.Tier1.SpellId = 0
            Attunement.Aura.Tier2.SpellId = 0
            Attunement.Aura.Tier3.SpellId = 0
            Attunement.Aura.Tier4.SpellId = 0
            Attunement.Aura.Tier5.SpellId = 0
            Hardcore.Enable = 1
            Hardcore.PlayerConfig = 1
            Hardcore.BroadcastDeathGuild = 1
            Hardcore.BroadcastDeathWorld = 1
            Hardcore.SpawnGrave = 1
            Hardcore.GraveGameObjectID = 61
            Hardcore.GraveMessage = "Shit happens. <PlayerName> | Well, this sucks. <PlayerName> | It is really dark down here. <PlayerName> | Finally some peace and quiet. <PlayerName> | Shhh! I am sleeping. <PlayerName>"
            Hardcore.RemoveGravesOnCharacterDeleted = 1
            Hardcore.DropGear = 0
            Hardcore.DropItems = 0
            Hardcore.DropMoney = 0
            Hardcore.BotDropGear = 0
            Hardcore.BotDropItems = 0
            Hardcore.BotDropMoney = 0
            Hardcore.RemoveLootOnCharacterDeleted = 1
            Hardcore.LootGameObjectID = 2850
            Hardcore.ReviveDisabled = 1
            Hardcore.ReviveOnGraveyard = 0
            Hardcore.LevelDown = 0
            Hardcore.MaxPlayerLoot = 99
            Hardcore.DropOnDungeons = 1
            Hardcore.DropOnRaids = 1
            Hardcore.LevelDownOnDungeons = 1
            Hardcore.LevelDownOnRaids = 1
            Hardcore.LevelDownMinLevel = 1
            Hardcore.DropMinLevel = 1
            Hardcore.DisablePVP = 0
            Hardcore.SelfFound = 0
      anticheat-config:
        data:
          # Mirror live anticheat.conf verbatim. Canonical source:
          # etc/emberstone/anticheat.conf in xunholy/cmangos-classic.
          # Action mask vocabulary (sum of bits): 1=log, 2=prompt,
          # 4=kick, 8=ban_acct, 16=ban_ip, 32=silence. Every mask here
          # is ≤ 7 — kick-only, never auto-ban.
          anticheat.conf: |
            [AnticheatConf]
            ConfVersion=2017102301
            Enable = 1
            FingerprintHistory = 30
            FingerprintLevel = 6
            KickDelay.Min = 30
            KickDelay.Max = 90
            BanDelay.Min = 30
            BanDelay.Max = 90
            IPBanDelay.Min = 30
            IPBanDelay.Max = 90
            BanWave.Day = 1
            BanWave.Hour = 10
            BanWave.Minute = 0
            Movement.UseExtrapolation = 1
            Movement.SpeedHack.Enable  = 1
            Movement.WallClimb.TickCount   = 0
            Movement.WallClimb.TickAction  = 0
            Movement.WallClimb.TotalCount  = 0
            Movement.WallClimb.TotalAction = 0
            Movement.WaterWalk.TickCount   = 1
            Movement.WaterWalk.TickAction  = 7
            Movement.WaterWalk.TotalCount  = 0
            Movement.WaterWalk.TotalAction = 0
            Movement.SlowFall.TickCount   = 1
            Movement.SlowFall.TickAction  = 7
            Movement.SlowFall.TotalCount  = 0
            Movement.SlowFall.TotalAction = 0
            Movement.FlyHack.TickCount    = 1
            Movement.FlyHack.TickAction   = 7
            Movement.FlyHack.TotalCount   = 0
            Movement.FlyHack.TotalAction  = 0
            Movement.Forbidden.TickCount  = 1
            Movement.Forbidden.TickAction = 7
            Movement.Forbidden.TotalCount = 0
            Movement.Forbidden.TotalAction= 0
            Movement.NullClientTime.TickCount  = 1
            Movement.NullClientTime.TickAction = 7
            Movement.NullClientTime.TotalCount = 0
            Movement.NullClientTime.TotalAction = 0
            Movement.RootMove.TickCount  = 1
            Movement.RootMove.TickAction = 7
            Movement.RootMove.TotalCount = 0
            Movement.RootMove.TotalAction= 0
            Movement.TimeBack.TickCount  = 1
            Movement.TimeBack.TickAction = 7
            Movement.TimeBack.TotalCount = 0
            Movement.TimeBack.TotalAction= 0
            Movement.FakeTransport.TickCount   = 1
            Movement.FakeTransport.TickAction  = 7
            Movement.FakeTransport.TotalCount  = 0
            Movement.FakeTransport.TotalAction = 0
            Movement.TeleToTransport.TickCount  = 1
            Movement.TeleToTransport.TickAction = 7
            Movement.TeleToTransport.TotalCount = 0
            Movement.TeleToTransport.TotalAction= 0
            Movement.FixedZ.TickCount  = 1
            Movement.FixedZ.TickAction = 7
            Movement.FixedZ.TotalCount = 0
            Movement.FixedZ.TotalAction= 0
            Movement.MultiJump.TickCount    = 1
            Movement.MultiJump.TickAction   = 3
            Movement.MultiJump.TotalCount   = 10
            Movement.MultiJump.TotalAction  = 7
            Movement.FastJump.TickCount     = 1
            Movement.FastJump.TickAction    = 3
            Movement.FastJump.TotalCount    = 10
            Movement.FastJump.TotalAction   = 7
            Movement.JumpSpeedChange.TickCount  = 1
            Movement.JumpSpeedChange.TickAction = 3
            Movement.JumpSpeedChange.TotalCount = 10
            Movement.JumpSpeedChange.TotalAction= 7
            Movement.HeartbeatSkip.TickCount  = 1
            Movement.HeartbeatSkip.TickAction = 3
            Movement.HeartbeatSkip.TotalCount = 10
            Movement.HeartbeatSkip.TotalAction= 7
            Movement.ClockDesync.TickCount  = 1
            Movement.ClockDesync.TickAction = 3
            Movement.ClockDesync.TotalCount = 10
            Movement.ClockDesync.TotalAction= 7
            Movement.OverspeedZ.TickCount   = 1
            Movement.OverspeedZ.TickAction  = 3
            Movement.OverspeedZ.TotalCount  = 5
            Movement.OverspeedZ.TotalAction = 7
            Movement.BadOrderAck.TickCount  = 1
            Movement.BadOrderAck.TickAction = 3
            Movement.BadOrderAck.TotalCount = 5
            Movement.BadOrderAck.TotalAction= 7
            Movement.Teleport.TickCount     = 1
            Movement.Teleport.TickAction    = 7
            Movement.Teleport.TotalCount    = 0
            Movement.Teleport.TotalAction   = 0
            Movement.TeleportFar.TickCount  = 1
            Movement.TeleportFar.TickAction = 7
            Movement.TeleportFar.TotalCount = 0
            Movement.TeleportFar.TotalAction= 0
            Movement.Explore.TickCount     = 3
            Movement.Explore.TickAction    = 3
            Movement.Explore.TotalCount    = 0
            Movement.Explore.TotalAction   = 0
            Movement.ExploreHigh.TickCount  = 1
            Movement.ExploreHigh.TickAction = 3
            Movement.ExploreHigh.TotalCount  = 0
            Movement.ExploreHigh.TotalAction = 0
            Movement.BadFallReset.Enable    = 1
            Movement.BadFallReset.Threshold = 1
            Movement.BadFallReset.Penalty   = 7
            Antispam.Enable   = 1
            Antispam.Silence  = 1
            Antispam.MaxLevel = 25
            # Warden re-enabled to match live (commit 74862c593) — bots
            # are now believed to be the crash variable, not Warden.
            Warden.Enable                       = 1
            Warden.ModuleDir                    = "/opt/mangos/bin/warden_modules"
            Warden.Timeout                      = 30
            Warden.ScanFrequency                = 15
            Warden.ScanCount                    = 10
            Warden.MinimumLevel                 = 1
            Warden.MinimumAdvancedLevel         = 1
            Warden.SuspiciousEndSceneHookAction = 7
            Warden.TickCount                    = 1
            Warden.TickAction                   = 7
            Warden.TotalCount                   = 0
            Warden.TotalAction                  = 0
      vip-config:
        data:
          # Mirror live vip.conf: MasterSpellId 18282 + the full bundle.
          # Plain key=value only (see live config: section headers and
          # # comments parse as garbage with the cmangos config parser).
          vip.conf: |
            Vip.Enable = 1
            Vip.MasterSpellId = 18282
            Vip.BundledSpellIds = 22888,24425,15366,16609,22817,22818,22820,23735,23736,23737,23768,26393,17626,17627,17628
      autoscale-config:
        data:
          autoscale.conf: |
            Autoscale.Enable = 1
            Autoscale.RescanIntervalSeconds = 10
            Autoscale.HpExponent = 0.85
            Autoscale.MinScale = 0.20
            Autoscale.MaxScale = 1.0
            Autoscale.Baseline.Dungeon = 5
            Autoscale.Baseline.RaidDefault = 40
            Autoscale.MapBaselines = "309:20,509:20"
            Autoscale.MapBlacklist = ""
            Autoscale.Announce = 1
      ahbot-config:
        data:
          ahbot.conf: |
            AuctionHouseBot.Seller.Enabled = 1
            AuctionHouseBot.Buyer.Enabled = 1
            AuctionHouseBot.Chance.Sell = 80
            AuctionHouseBot.Chance.Buy = 40
            AuctionHouseBot.Alliance.Items.Amount.Ratio = 100
            AuctionHouseBot.Horde.Items.Amount.Ratio = 100
            AuctionHouseBot.Neutral.Items.Amount.Ratio = 80
            AuctionHouseBot.Buy.Value = 90
            AuctionHouseBot.Bid.Min = 60
            AuctionHouseBot.Bid.Max = 95
            AuctionHouseBot.Time.Min = 2
            AuctionHouseBot.Time.Max = 48
            AuctionHouseBot.Value.Variance = 15
            AuctionHouseBot.Items.Profession = 90, 100, 0, 60
            AuctionHouseBot.Loot.Creature.Normal = 40, 50, 8, 15
            AuctionHouseBot.Loot.Creature.Elite = 35, 40, 2, 4
            AuctionHouseBot.Loot.Creature.Rare = 5, 15, 1, 2
            AuctionHouseBot.Loot.Disenchant = 15, 20, 1, 3
            AuctionHouseBot.Loot.Fishing = 5, 10, 30, 50
            AuctionHouseBot.Loot.Gameobject = 20, 25, 7, 15
            AuctionHouseBot.Loot.Skinning = 5, 10, 50, 80
      transmog-config:
        data:
          transmog.conf: |
            Transmog.Enable = 1
            Transmog.CostFee = 0
            Transmog.CostMultiplier = 1.0
            Transmog.TokenRequired = 0
            Transmog.TokenEntry = 0
            Transmog.TokenAmount = 1
      barber-config:
        data:
          barber.conf: |
            Barber.Enable = 1
      dualspec-config:
        data:
          dualspec.conf: |
            Dualspec.Enable = 1
            Dualspec.Cost = 100000
      trainingdummies-config:
        data:
          trainingdummies.conf: |
            Trainingdummies.Enable = 1
      achievements-config:
        data:
          achievements.conf: |
            Achievements.Enable = 1
            Achievements.SendMessage = 1
            Achievements.SendAddon = 1
            Achievements.SendVisual = 1
            Achievements.EffectId = 146
            # Match live: bots don't clutter realm-first leaderboards.
            Achievements.RandomBots = 0
            Achievements.RandomBotsRealmFirst = 0
            Achievements.AccountAchievements = 0
    persistence:
      data:
        existingClaim: cmangos-ptr-data
        advancedMounts:
          mangosd:
            app:
              - path: /var/lib/mangos
                readOnly: true
      cores:
        existingClaim: cmangos-ptr-cores
        advancedMounts:
          mangosd:
            app:
              - path: /opt/mangos/cores
            cores-pruner:
              - path: /opt/mangos/cores
      mangosd-config:
        type: configMap
        name: cmangos-ptr-mangosd-config
        advancedMounts:
          mangosd:
            app:
              - path: /opt/mangos/conf/mangosd.conf
                subPath: mangosd.conf
      aiplayerbot-config:
        type: configMap
        name: cmangos-ptr-aiplayerbot-config
        advancedMounts:
          mangosd:
            app:
              - path: /opt/mangos/conf/aiplayerbot.conf
                subPath: aiplayerbot.conf
      twinkmaster-config:
        type: configMap
        name: cmangos-ptr-twinkmaster-config
        advancedMounts:
          mangosd:
            app:
              - path: /opt/mangos/conf/twinkmaster.conf
                subPath: twinkmaster.conf
      attunement-config:
        type: configMap
        name: cmangos-ptr-attunement-config
        advancedMounts:
          mangosd:
            app:
              - path: /opt/mangos/conf/attunement.conf
                subPath: attunement.conf
      anticheat-config:
        type: configMap
        name: cmangos-ptr-anticheat-config
        advancedMounts:
          mangosd:
            app:
              - path: /opt/mangos/conf/anticheat.conf
                subPath: anticheat.conf
      vip-config:
        type: configMap
        name: cmangos-ptr-vip-config
        advancedMounts:
          mangosd:
            app:
              - path: /opt/mangos/conf/vip.conf
                subPath: vip.conf
      autoscale-config:
        type: configMap
        name: cmangos-ptr-autoscale-config
        advancedMounts:
          mangosd:
            app:
              - path: /opt/mangos/conf/autoscale.conf
                subPath: autoscale.conf
      ahbot-config:
        type: configMap
        name: cmangos-ptr-ahbot-config
        advancedMounts:
          mangosd:
            app:
              - path: /opt/mangos/conf/ahbot.conf
                subPath: ahbot.conf
      transmog-config:
        type: configMap
        name: cmangos-ptr-transmog-config
        advancedMounts:
          mangosd:
            app:
              - path: /opt/mangos/conf/transmog.conf
                subPath: transmog.conf
      barber-config:
        type: configMap
        name: cmangos-ptr-barber-config
        advancedMounts:
          mangosd:
            app:
              - path: /opt/mangos/conf/barber.conf
                subPath: barber.conf
      dualspec-config:
        type: configMap
        name: cmangos-ptr-dualspec-config
        advancedMounts:
          mangosd:
            app:
              - path: /opt/mangos/conf/dualspec.conf
                subPath: dualspec.conf
      trainingdummies-config:
        type: configMap
        name: cmangos-ptr-trainingdummies-config
        advancedMounts:
          mangosd:
            app:
              - path: /opt/mangos/conf/trainingdummies.conf
                subPath: trainingdummies.conf
      achievements-config:
        type: configMap
        name: cmangos-ptr-achievements-config
        advancedMounts:
          mangosd:
            app:
              - path: /opt/mangos/conf/achievements.conf
                subPath: achievements.conf
      mangosd-logs:
