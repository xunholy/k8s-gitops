    persistence:
      data:
        existingClaim: cmangos-ptr-data
        advancedMounts:
          mangosd:
            app:
              - path: /var/lib/mangos
                readOnly: true
      cores:
        existingClaim: cmangos-ptr-cores
        advancedMounts:
          mangosd:
            app:
              - path: /opt/mangos/cores
            cores-pruner:
              - path: /opt/mangos/cores
      mangosd-config:
        type: configMap
        name: cmangos-ptr-mangosd-config
        advancedMounts:
          mangosd:
            app:
              - path: /opt/mangos/conf/mangosd.conf
                subPath: mangosd.conf
      hardcore-config:
        type: configMap
        name: cmangos-ptr-hardcore-config
        advancedMounts:
          mangosd:
            app:
              - path: /opt/mangos/etc/hardcore.conf
                subPath: hardcore.conf
      twinkmaster-config:
        type: configMap
        name: cmangos-ptr-twinkmaster-config
        advancedMounts:
          mangosd:
            app:
              - path: /opt/mangos/conf/twinkmaster.conf
                subPath: twinkmaster.conf
      attunement-config:
        type: configMap
        name: cmangos-ptr-attunement-config
        advancedMounts:
          mangosd:
            app:
              - path: /opt/mangos/conf/attunement.conf
                subPath: attunement.conf
      anticheat-config:
        type: configMap
        name: cmangos-ptr-anticheat-config
        advancedMounts:
          mangosd:
            app:
              - path: /opt/mangos/conf/anticheat.conf
                subPath: anticheat.conf
      vip-config:
        type: configMap
        name: cmangos-ptr-vip-config
        advancedMounts:
          mangosd:
            app:
              - path: /opt/mangos/conf/vip.conf
                subPath: vip.conf
      autoscale-config:
        type: configMap
        name: cmangos-ptr-autoscale-config
        advancedMounts:
          mangosd:
            app:
              - path: /opt/mangos/conf/autoscale.conf
                subPath: autoscale.conf
      ahbot-config:
        type: configMap
        name: cmangos-ptr-ahbot-config
        advancedMounts:
          mangosd:
            app:
              - path: /opt/mangos/conf/ahbot.conf
                subPath: ahbot.conf
      mangosd-logs:
        existingClaim: cmangos-ptr-mangosd-logs
        advancedMounts:
          mangosd:
            app:
              - path: /opt/mangos/logs
            gm-log-tail:
              - path: /opt/mangos/logs
                readOnly: true
