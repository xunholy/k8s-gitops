---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# PTR-targeted clones of the cmangos/app/migrations/* Jobs. Each Job runs
# the same DDL the live realm gets, but against ptrmangos / ptrcharacters
# (PTR's isolated world + characters DBs) instead of classicmangos /
# classiccharacters. classicrealmd is shared with live, so accounts and
# GM flags carry over without a separate migration.
resources:
  - mangos-string-517-migration-job.yaml
  - gm-security-restore-migration-job.yaml
  # Vendored module migrations (cmangos-classic@main src/modules/*).
  # Comment-out individual lines for a staged rollout — all 5 modules also
  # gated by their .conf Enable= key in helmrelease.yaml.
  - transmog-migration-job.yaml
  - barber-migration-job.yaml
  - dualspec-migration-job.yaml
  - trainingdummies-migration-job.yaml
  - achievements-migration-job.yaml
  # PR #14 (feat/twinkmaster-rework) schema/data deltas — see Job comment
  # for scope. Both idempotent; safe to leave in once the PR merges.
  - attunement-account-boost-migration-job.yaml
  - twinkmaster-insane-removal-migration-job.yaml
  # AiPlayerbot data corrections.
  - aiplayerbot-ring-enchant-fix-migration-job.yaml
  # Reference data the playerbots module needs in the characters DB —
  # stranded by db-init's --no-data clone. Without this, mangosd boots
  # but the random-bot manager can never allocate character names and
  # spams "Not enough random bot accounts available" indefinitely.
  - ai-playerbot-names-seed-migration-job.yaml
