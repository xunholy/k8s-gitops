---
# Seeds the PTR databases on the shared MariaDB. World DB is a full clone
# of live so PTR has every NPC/quest/item/script the GMs would actually
# want to test against. Characters + logs are schema-only so PTR
# characters stay separate from live (the realm is GM-only via realmlist
# allowedSecurityLevel=3 anyway).
#
# Idempotent: if ptrmangos already has a non-trivial table count, the
# job exits 0 without touching anything. To force a fresh clone, drop
# the ptr* databases and let Flux re-run the job.
apiVersion: batch/v1
kind: Job
metadata:
  name: cmangos-ptr-db-init
  namespace: game-servers
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-db
          image: busybox:latest
          command: ['sh', '-c', 'until nc -z cmangos-database 3306; do echo "Waiting for database..."; sleep 2; done']
      containers:
        - name: init
          image: mariadb:12.2
          # CREATE DATABASE + GRANT must be run as root (mangos@% lacks
          # global CREATE). Dumps + restores then run as root too, since
          # we already have a root session here. Mangos user grants are
          # what the runtime PTR mangosd actually needs.
          env:
            - name: ROOT_PWD
              value: password
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              MARIADB="mariadb -h cmangos-database -P 3306 -u root -p$${ROOT_PWD}"
              DUMP="mariadb-dump -h cmangos-database -P 3306 -u root -p$${ROOT_PWD} --single-transaction --routines --triggers"

              already_seeded() {
                local db=$1
                local count
                count=$($${MARIADB} -N -B -e "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='$${db}';")
                [ "$${count}" -gt 0 ]
              }

              echo "=== Ensuring PTR databases exist ==="
              $${MARIADB} -e "CREATE DATABASE IF NOT EXISTS ptrmangos     CHARACTER SET utf8 COLLATE utf8_general_ci;"
              $${MARIADB} -e "CREATE DATABASE IF NOT EXISTS ptrcharacters CHARACTER SET utf8 COLLATE utf8_general_ci;"
              $${MARIADB} -e "CREATE DATABASE IF NOT EXISTS ptrlogs       CHARACTER SET utf8 COLLATE utf8_general_ci;"

              echo "=== Granting mangos@% access to PTR databases ==="
              $${MARIADB} -e "GRANT SELECT, INSERT, UPDATE, DELETE, CREATE, DROP, INDEX, ALTER, CREATE TEMPORARY TABLES, LOCK TABLES, EXECUTE, CREATE ROUTINE, ALTER ROUTINE ON \`ptrmangos\`.* TO 'mangos'@'%';"
              $${MARIADB} -e "GRANT SELECT, INSERT, UPDATE, DELETE, CREATE, DROP, INDEX, ALTER, CREATE TEMPORARY TABLES, LOCK TABLES ON \`ptrcharacters\`.* TO 'mangos'@'%';"
              $${MARIADB} -e "GRANT SELECT, INSERT, UPDATE, DELETE, CREATE, DROP, ALTER, CREATE TEMPORARY TABLES, LOCK TABLES ON \`ptrlogs\`.* TO 'mangos'@'%';"
              $${MARIADB} -e "FLUSH PRIVILEGES;"

              if already_seeded ptrmangos; then
                echo "=== ptrmangos already populated, skipping world clone ==="
              else
                echo "=== Cloning classicmangos -> ptrmangos (full data) ==="
                $${DUMP} classicmangos | $${MARIADB} ptrmangos
              fi

              if already_seeded ptrcharacters; then
                echo "=== ptrcharacters already populated, skipping characters clone ==="
              else
                echo "=== Cloning classiccharacters -> ptrcharacters (schema + version row) ==="
                $${DUMP} --no-data classiccharacters | $${MARIADB} ptrcharacters
                # mangosd refuses to boot without a row in *_db_version
                # (compatibility check). Copy the live row so PTR runs
                # against whatever schema rev live is on.
                $${MARIADB} -e "INSERT INTO ptrcharacters.character_db_version SELECT * FROM classiccharacters.character_db_version;"
              fi

              if already_seeded ptrlogs; then
                echo "=== ptrlogs already populated, skipping logs clone ==="
              else
                echo "=== Cloning classiclogs -> ptrlogs (schema + version row) ==="
                $${DUMP} --no-data classiclogs | $${MARIADB} ptrlogs
                $${MARIADB} -e "INSERT INTO ptrlogs.logs_db_version SELECT * FROM classiclogs.logs_db_version;"
              fi

              echo "=== Done. Table counts: ==="
              for db in ptrmangos ptrcharacters ptrlogs; do
                c=$($${MARIADB} -N -B -e "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='$${db}';")
                echo "  $${db}: $${c} tables"
              done
