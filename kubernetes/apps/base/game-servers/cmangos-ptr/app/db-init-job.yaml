---
# Seeds the PTR databases on the shared MariaDB. World DB is a full clone
# of live so PTR has every NPC/quest/item/script the GMs would actually
# want to test against. Characters + logs are schema-only so PTR
# characters stay separate from live (the realm is GM-only via realmlist
# allowedSecurityLevel=3 anyway).
#
# Idempotent: if ptrmangos already has a non-trivial table count, the
# job exits 0 without touching anything. To force a fresh clone, drop
# the ptr* databases and let Flux re-run the job.
apiVersion: batch/v1
kind: Job
metadata:
  name: cmangos-ptr-db-init
  namespace: game-servers
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-db
          image: busybox:latest
          command: ['sh', '-c', 'until nc -z cmangos-ptr-database 3306 && nc -z cmangos-database 3306; do echo "Waiting for databases..."; sleep 2; done']
      containers:
        - name: init
          image: mariadb:12.2
          # Uses the dedicated PTR-DB secret: MARIADB_ROOT_PASSWORD to admin
          # the new instance (CREATE DATABASE + GRANT — the app user lacks
          # global CREATE) and MANGOS_DBUSER/MANGOS_DBPASS to read the clone
          # source from the live shared instance. Same 1Password item as the
          # shared creds, so the app-user identity matches live.
          envFrom:
            - secretRef:
                name: cmangos-ptr-database-creds
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              # Admin on the NEW PTR instance (CREATE DATABASE + GRANT + the
              # restore target). Root password from the secret, not a literal
              # — this is the fresh instance's first-init root (DB_ROOT_PASSWORD).
              MARIADB="mariadb -h cmangos-ptr-database -P 3306 -u root -p$${MARIADB_ROOT_PASSWORD}"
              # Read the clone source from the LIVE shared instance as the
              # least-privilege app user (already has SELECT on the classic*
              # DBs) — no live root needed. --single-transaction = consistent
              # snapshot without locking live. --routines dropped: the app user
              # may lack routine-read on the source, and cmangos world content
              # doesn't rely on stored routines; re-add (and grant) if a clone
              # ever needs them.
              DUMP="mariadb-dump -h cmangos-database -P 3306 -u $${MANGOS_DBUSER} -p$${MANGOS_DBPASS} --single-transaction --triggers"

              already_seeded() {
                local db=$1
                local count
                count=$($${MARIADB} -N -B -e "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='$${db}';")
                [ "$${count}" -gt 0 ]
              }

              echo "=== Ensuring PTR databases exist ==="
              $${MARIADB} -e "CREATE DATABASE IF NOT EXISTS ptrmangos     CHARACTER SET utf8 COLLATE utf8_general_ci;"
              $${MARIADB} -e "CREATE DATABASE IF NOT EXISTS ptrcharacters CHARACTER SET utf8 COLLATE utf8_general_ci;"
              $${MARIADB} -e "CREATE DATABASE IF NOT EXISTS ptrlogs       CHARACTER SET utf8 COLLATE utf8_general_ci;"

              echo "=== Granting $${MANGOS_DBUSER}@% access to PTR databases ==="
              $${MARIADB} -e "GRANT SELECT, INSERT, UPDATE, DELETE, CREATE, DROP, INDEX, ALTER, CREATE TEMPORARY TABLES, LOCK TABLES, EXECUTE, CREATE ROUTINE, ALTER ROUTINE ON \`ptrmangos\`.* TO '$${MANGOS_DBUSER}'@'%';"
              $${MARIADB} -e "GRANT SELECT, INSERT, UPDATE, DELETE, CREATE, DROP, INDEX, ALTER, CREATE TEMPORARY TABLES, LOCK TABLES ON \`ptrcharacters\`.* TO '$${MANGOS_DBUSER}'@'%';"
              $${MARIADB} -e "GRANT SELECT, INSERT, UPDATE, DELETE, CREATE, DROP, ALTER, CREATE TEMPORARY TABLES, LOCK TABLES ON \`ptrlogs\`.* TO '$${MANGOS_DBUSER}'@'%';"
              $${MARIADB} -e "FLUSH PRIVILEGES;"

              if already_seeded ptrmangos; then
                echo "=== ptrmangos already populated, skipping world clone ==="
              else
                echo "=== Cloning classicmangos -> ptrmangos (full data) ==="
                $${DUMP} classicmangos | $${MARIADB} ptrmangos
              fi

              if already_seeded ptrcharacters; then
                echo "=== ptrcharacters already populated, skipping characters clone ==="
              else
                echo "=== Cloning classiccharacters -> ptrcharacters (schema + version row) ==="
                $${DUMP} --no-data classiccharacters | $${MARIADB} ptrcharacters
                # mangosd refuses to boot without a row in *_db_version
                # (compatibility check). The source table now lives on a
                # DIFFERENT instance, so copy it with a single-table dump
                # (drop+create+insert) instead of a cross-instance
                # INSERT...SELECT, which can't see classiccharacters from here.
                $${DUMP} classiccharacters character_db_version | $${MARIADB} ptrcharacters
              fi

              if already_seeded ptrlogs; then
                echo "=== ptrlogs already populated, skipping logs clone ==="
              else
                echo "=== Cloning classiclogs -> ptrlogs (schema + version row) ==="
                $${DUMP} --no-data classiclogs | $${MARIADB} ptrlogs
                # Single-table dump across instances (see character_db_version above).
                $${DUMP} classiclogs logs_db_version | $${MARIADB} ptrlogs
              fi

              echo "=== Done. Table counts: ==="
              for db in ptrmangos ptrcharacters ptrlogs; do
                c=$($${MARIADB} -N -B -e "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='$${db}';")
                echo "  $${db}: $${c} tables"
              done
