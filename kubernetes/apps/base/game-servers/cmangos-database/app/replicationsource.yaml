---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: cmangos-database
  annotations:
    # See pvc-database.yaml — preserves the backup schedule across the
    # Kustomization-ownership move into cmangos-database/.
    kustomize.toolkit.fluxcd.io/prune: disabled
spec:
  sourcePVC: cmangos-database
  trigger:
    schedule: "0 * * * *"
  kopia:
    accessModes:
      - ReadWriteOnce
    cacheAccessModes:
      - ReadWriteOnce
    cacheCapacity: 10Gi
    cacheStorageClassName: ceph-block
    compression: zstd-fastest
    copyMethod: Snapshot
    moverSecurityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
    parallelism: 2
    repository: cmangos-database-volsync-secret
    retain:
      daily: 3
    storageClassName: ceph-block
    volumeSnapshotClassName: csi-ceph-blockpool
