---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cmangos-database-creds
  namespace: game-servers
  annotations:
    # See pvc-database.yaml — preserves the Secret across the
    # Kustomization-ownership move into cmangos-database/. Deleting
    # this ExternalSecret would cascade-delete the cmangos-database-
    # creds Secret, breaking every pod that envFroms it (mangosd,
    # realmd, PTR, the prober).
    kustomize.toolkit.fluxcd.io/prune: disabled
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: cmangos-database-creds
    template:
      data:
        # Used by mangosd + realmd to connect to MariaDB.
        MANGOS_DBUSER: "{{ .DB_USER }}"
        MANGOS_DBPASS: "{{ .DB_PASSWORD }}"
        # Used by the mariadb container at first-init only. Match the
        # app-user creds so a fresh PVC reproduces the same login.
        MARIADB_USER: "{{ .DB_USER }}"
        MARIADB_PASSWORD: "{{ .DB_PASSWORD }}"
  dataFrom:
    - extract:
        key: cmangos
