---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cmangos-database
  namespace: game-servers
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    # `helm.sh/resource-policy: keep` on every chart-rendered resource.
    # The cmangos HR's release history (v289..v291) still records the
    # cmangos-database Deployment + Service as resources it once owned.
    # On every subsequent cmangos upgrade, Helm 3-way-merges new chart
    # vs that historical manifest and tries to DELETE these resources,
    # wiping the DB pod even though it's owned by this release. Pinning
    # the keep policy here makes Helm skip the deletion during cross-
    # release pruning — the resources are tied to this HR alone going
    # forward. Safe to leave in place permanently.
    globalAnnotations:
      helm.sh/resource-policy: keep
    controllers:
      database:
        containers:
          app:
            image:
              repository: mariadb
              tag: "12.2"
            env:
              TZ: ${CLUSTER_TIMEZONE}
              # MARIADB_ROOT_PASSWORD is first-init-only (DB volume is
              # persistent; ignored on subsequent starts). Rotation is
              # tracked separately from the app user.
              MARIADB_ROOT_PASSWORD: password
              MARIADB_DATABASE: classicrealmd
            envFrom:
              # MARIADB_USER / MARIADB_PASSWORD come from 1Password via
              # ExternalSecret (cmangos-database-creds). First-init only.
              - secretRef:
                  name: cmangos-database-creds
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ['healthcheck.sh', '--connect', '--innodb_initialized']
                  periodSeconds: 30
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ['healthcheck.sh', '--connect', '--innodb_initialized']
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ['healthcheck.sh', '--connect', '--innodb_initialized']
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 30
            resources:
              requests:
                cpu: "1"
                memory: 512Mi
              limits:
                memory: 2Gi
    # bjw-s app-template singleton-collapse: with one controller + one
    # service + zero ConfigMaps, the Deployment and Service both render
    # as just `cmangos-database` (not `cmangos-database-database` /
    # `cmangos-database-mysql`). That matches the existing Service name
    # all other releases connect to via DNS — no client-side changes
    # required across the migration.
    service:
      database:
        controller: database
        ports:
          mysql:
            port: 3306
    persistence:
      data:
        existingClaim: cmangos-database
        advancedMounts:
          database:
            app:
              - path: /var/lib/mysql
