---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
#
# Emberstone Database — Classic 1.12.1 reference site
#
# Pure static nginx serving a pre-built Astro snapshot of the world DB.
# The image bakes in a sample snapshot so first deploys are visible
# immediately; production builds (CI on push to main) re-dump from
# MariaDB so the site reflects the live world DB.
#
# Path-routed at https://emberstone.owncloud.ai/db/* by the sibling
# httproute.yaml so the database site shares a hostname with the
# existing registration portal — players see one product.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: emberstone-db
  namespace: game-servers
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      emberstone-db:
        pod:
          # nginx is happy with the default fsGroup; just make sure the
          # container runs non-root for cluster policy compliance.
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
            seccompProfile:
              type: RuntimeDefault
        containers:
          app:
            image:
              repository: ghcr.io/xunholy/emberstone-db
              # Pin to the per-commit SHA tag rather than :latest so the
              # kubelet re-resolves on every helmrelease change. :latest
              # was sticky — `imagePullPolicy: Always` only re-pulls when
              # the pod template changes, and the template didn't change
              # between the failed nginx-alpine build and the nginx-
              # unprivileged fix; the pod stayed on the cached digest.
              tag: c8060fd9792c7f5c8f1643ac90e0baf2581fe37d
              pullPolicy: IfNotPresent
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /db/healthz
                    port: 8080
                  periodSeconds: 30
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /db/healthz
                    port: 8080
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /db/healthz
                    port: 8080
                  periodSeconds: 5
                  timeoutSeconds: 3
                  failureThreshold: 20
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 20m
                memory: 64Mi
              limits:
                cpu: 500m
                memory: 256Mi

    defaultPodOptions:
      automountServiceAccountToken: false
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: emberstone-db

    service:
      app:
        controller: emberstone-db
        ports:
          http:
            port: 80
            targetPort: 8080
            protocol: HTTP

    # Two replicas so a rolling deploy never blanks the page; the HPA
    # below is sized for the low traffic we actually see (a handful of
    # browsers per second at peak).
    workloadType: deployment
