---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/gateway.networking.k8s.io/httproute_v1.json
#
# Path-based route for the Emberstone Database site at
# https://emberstone.owncloud.ai/db/* — shares the hostname with the
# existing emberstone-portal HTTPRoute. Gateway API resolves matching
# routes by longest-path-prefix, so a request to `/db/quests/4322`
# lands here while everything else (e.g. `/account`, `/howtoconnect`)
# stays on the portal.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: emberstone-db
  annotations:
    external-dns.alpha.kubernetes.io/external: 'true'
spec:
  parentRefs:
    - name: envoy-external
      namespace: network-system
      sectionName: https
  hostnames:
    - 'emberstone.${CLUSTER_DOMAIN}'
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /db
      backendRefs:
        - name: emberstone-db
          port: 80
          weight: 100
