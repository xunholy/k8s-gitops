---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cmangos-realmd
  namespace: game-servers
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      realmd:
        initContainers:
          wait-db:
            image:
              repository: busybox
              tag: latest
            command: ['sh', '-c', 'until nc -z cmangos-database 3306; do sleep 2; done']
        containers:
          app:
            image:
              repository: ghcr.io/xunholy/cmangos-classic
              tag: 7bf448dda338ce51a7756e8fd4c704f580d2ae4e
            args: ["realmd"]
            env:
              TZ: ${CLUSTER_TIMEZONE}
              MANGOS_DBHOST: cmangos-database
              MANGOS_DBPORT: "3306"
            envFrom:
              # MANGOS_DBUSER + MANGOS_DBPASS from 1Password via ESO.
              # The cmangos-database-creds Secret is owned by the cmangos
              # Kustomization (externalsecret-database.yaml). Bootstrap
              # ordering is enforced by ks.yaml dependsOn: cmangos.
              - secretRef:
                  name: cmangos-database-creds
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 3724
                  periodSeconds: 30
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 3724
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 3724
                  periodSeconds: 5
                  timeoutSeconds: 3
                  failureThreshold: 30
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
          # Keeps realmd.realmlist.realmflags in sync with the actual
          # liveness of each world. mangosd flips realmflags=0 on start
          # and =2 on graceful shutdown — but it never gets there on a
          # crash, OOM, or pod kill, so the launcher keeps showing the
          # realm as online and clicking it gives "connection failed"
          # instead of a grayed-out "Offline" entry.
          # This prober TCP-probes each world every 10s and toggles the
          # OFFLINE bit (2) only, leaving the rest of realmflags alone
          # (RECOMMENDED=8, NEW=16, FULL=32) so mangosd's own writes
          # still take effect.
          # realm ids come from the live realmd log:
          #   Added realm id 1, name 'Emberstone'      → cmangos-world:8085
          #   Added realm id 2, name 'Emberstone PTR'  → cmangos-ptr-world:8086
          realmflags-prober:
            image:
              repository: mariadb
              tag: "12.2"
            command:
              - /bin/bash
              - -c
              - |
                set -u
                # /bin/bash because the mariadb:12.2 image is Ubuntu-
                # based with no `nc` and /bin/sh = dash (no /dev/tcp).
                # bash's pseudo-device probes the TCP port with no
                # external tools — small, fast, and survives image
                # rebuilds without extra packages.
                probe() {
                  timeout 2 bash -c "</dev/tcp/$$1/$$2" >/dev/null 2>&1
                }
                # Hysteresis: flip OFFLINE on the first failed probe
                # (fast "down" signal so clients stop being lured into
                # clicking a half-dead realm), but require N consecutive
                # successful probes before clearing OFFLINE. Prevents
                # bait-and-switch during a crash loop where mangosd's
                # port is briefly open between SIGSEGVs.
                STABLE_REQUIRED=3
                ok1=0
                ok2=0
                while true; do
                  # Emberstone (realm id=1) ← cmangos-world:8085
                  if probe cmangos-world 8085; then
                    ok1=$$((ok1 + 1))
                    if [ "$$ok1" -ge "$$STABLE_REQUIRED" ]; then op1="& ~2"; else op1="| 2"; fi
                  else
                    ok1=0; op1="| 2"
                  fi
                  # Emberstone PTR (realm id=2) ← cmangos-ptr-world:8086
                  if probe cmangos-ptr-world 8086; then
                    ok2=$$((ok2 + 1))
                    if [ "$$ok2" -ge "$$STABLE_REQUIRED" ]; then op2="& ~2"; else op2="| 2"; fi
                  else
                    ok2=0; op2="| 2"
                  fi
                  mariadb -h cmangos-database -P 3306 \
                    -u "$${MANGOS_DBUSER}" -p"$${MANGOS_DBPASS}" classicrealmd \
                    -e "UPDATE realmlist SET realmflags = realmflags $${op1} WHERE id = 1; \
                        UPDATE realmlist SET realmflags = realmflags $${op2} WHERE id = 2" \
                    >/dev/null 2>&1 || true
                  sleep 3
                done
            env:
              TZ: ${CLUSTER_TIMEZONE}
            envFrom:
              # MANGOS_DBUSER / MANGOS_DBPASS for the UPDATE query.
              - secretRef:
                  name: cmangos-database-creds
            resources:
              requests:
                cpu: 5m
                memory: 16Mi
              limits:
                memory: 64Mi
            securityContext:
              # mariadb:12.2 defaults to root when the entrypoint is
              # overridden, so we have to pin a non-root UID explicitly
              # rather than rely on the image's default. UID 999 is the
              # mysql user baked into the image — gives the prober the
              # filesystem access mariadb-client needs (tmp, /etc).
              runAsUser: 999
              runAsGroup: 999
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
    service:
      auth:
        controller: realmd
        ports:
          auth:
            port: 3724
    configMaps:
      config:
        data:
          realmd.conf: |
            RealmServerPort = 3724
            BindIP = "0.0.0.0"
            # Refresh in-memory realmlist from DB every 5s (default 20s).
            # The realmflags-prober sidecar writes the OFFLINE bit
            # within ~3s of a world crash; pair that with a 5s realmd
            # cache so the WoW client sees the realm flip to Offline
            # in <10s end-to-end instead of up to ~30s with defaults.
            # Critical for the "mangosd crashed, let me pick another
            # realm" UX — otherwise the launcher shows the dead realm
            # as online and clicking it hangs the connect.
            RealmsStateUpdateDelay = 5
            # Brute-force protection on the SRP6 auth port (internet
            # exposed via TCPRoute → envoy-external gateway).
            #   MaxCount=5  failures before action
            #   BanTime=600 ten-minute ban
            #   BanType=1   ban by IP (0 = ban the account, riskier)
            #   Logging=1   log every failure so Crowdsec / Falco can
            #               pick up patterns and broaden the response
            WrongPass.MaxCount = 5
            WrongPass.BanTime = 600
            WrongPass.BanType = 1
            WrongPass.Logging = 1
    persistence:
      config:
        type: configMap
        # bjw-s app-template collapses singleton ConfigMap/Service/
        # Deployment names to the release name (no key suffix) when
        # there's only one of each kind. Verified via `helm get manifest`
        # — chart generates a ConfigMap literally named `cmangos-realmd`.
        name: cmangos-realmd
        advancedMounts:
          realmd:
            app:
              - path: /opt/mangos/conf/realmd.conf
                subPath: realmd.conf
      logs:
        type: emptyDir
        advancedMounts:
          realmd:
            app:
              - path: /opt/mangos/logs
