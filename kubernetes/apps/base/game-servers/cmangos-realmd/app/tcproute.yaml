---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/gateway.networking.k8s.io/tcproute_v1alpha2.json
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata:
  name: cmangos-auth
spec:
  parentRefs:
    - name: envoy-external
      namespace: network-system
      sectionName: cmangos-auth
  rules:
    - backendRefs:
        # bjw-s app-template collapses singleton Service names to the
        # release name (no key suffix), so the auth service ends up
        # named just `cmangos-realmd`, not `cmangos-realmd-auth`.
        - name: cmangos-realmd
          port: 3724
