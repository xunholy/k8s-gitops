---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cmangos-realmd
  namespace: game-servers
  labels:
    gitops.owncloud.ai/defaults: disabled
spec:
  decryption:
    provider: sops
  interval: 30m
  retryInterval: 1m
  timeout: 10m
  path: "./apps/base/game-servers/cmangos-realmd/app"
  prune: true
  wait: true
  sourceRef:
    kind: ExternalArtifact
    name: cmangos-realmd
    namespace: flux-system
  # No dependsOn on cmangos — DB is now in cmangos-database, and the
  # realmd pod's own wait-db init container handles runtime ordering.
  # Realmd must stay reconcilable when the world server is broken so
  # players can still authenticate and pick PTR / any healthy realm.
  targetNamespace: game-servers
