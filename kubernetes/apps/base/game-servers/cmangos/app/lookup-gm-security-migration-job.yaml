---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cmangos-lookup-gm-security-migration-sql
  namespace: game-servers
data:
  # Stock CMaNGOS ships the read-only .lookup subcommands (item, creature,
  # quest, spell, object, itemset, faction, skill, taxinode) at security
  # level 3 (Administrator). That blocks GMs (level 2) from basic lookups
  # like ".lookup item Hearthstone" — needed to ID NPCs/items/spells when
  # answering player tickets. The commands are read-only (return IDs, no
  # world mutation), so granting them to GMs is safe.
  #
  # `.reload command` in the mangosd console picks the change up without
  # a worldserver restart.
  lookup-gm-security.sql: |
    UPDATE `command`
       SET `security` = 2
     WHERE `name` IN (
       'lookup creature',
       'lookup faction',
       'lookup item',
       'lookup itemset',
       'lookup object',
       'lookup quest',
       'lookup skill',
       'lookup spell',
       'lookup taxinode'
     );
---
apiVersion: batch/v1
kind: Job
metadata:
  name: cmangos-lookup-gm-security-migration
  namespace: game-servers
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-db
          image: busybox:latest
          command: ['sh', '-c', 'until nc -z cmangos-database 3306; do echo "Waiting for database..."; sleep 2; done']
      containers:
        - name: migrate
          image: mariadb:12.2
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "=== Lowering .lookup subcommands to GM (security=2) in classicmangos ==="
              mariadb -h cmangos-database -P 3306 -u mangos -pmangos classicmangos < /sql/lookup-gm-security.sql

              # PTR shares the schema; apply there too so a fresh PTR rebuild
              # lands on the same policy.
              if mariadb -h cmangos-database -P 3306 -u mangos -pmangos -e "USE ptrmangos" 2>/dev/null; then
                echo "=== Lowering .lookup subcommands in ptrmangos ==="
                mariadb -h cmangos-database -P 3306 -u mangos -pmangos ptrmangos < /sql/lookup-gm-security.sql
              fi

              echo "=== Verifying ==="
              mariadb -h cmangos-database -P 3306 -u mangos -pmangos classicmangos \
                -e "SELECT name, security FROM command WHERE name LIKE 'lookup%' ORDER BY name;"

              echo "=== Done. Run '.reload command' in the mangosd console (no restart needed) ==="
          volumeMounts:
            - name: sql-scripts
              mountPath: /sql
      volumes:
        - name: sql-scripts
          configMap:
            name: cmangos-lookup-gm-security-migration-sql
