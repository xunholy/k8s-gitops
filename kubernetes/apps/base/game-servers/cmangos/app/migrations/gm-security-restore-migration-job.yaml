---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cmangos-gm-security-restore-migration-sql
  namespace: game-servers
data:
  # Roll back the two earlier GM-permission migrations:
  #   - gm-security-migration         (lowered six .gm * subcommands to 2)
  #   - lookup-gm-security-migration  (lowered nine .lookup * subcommands to 2)
  #
  # Both ConfigMap+Job pairs were removed from the kustomization in the same
  # commit, but Flux's prune only removes the K8s artifacts — the security
  # rows live in the `command` table of the world DB and persist. This Job
  # resets the 15 affected commands back to the CMaNGOS default of 3
  # (Administrator-only).
  #
  # Idempotent: the UPDATE is a no-op against a fresh DB (default is already 3).
  #
  # `.reload command` in the mangosd console picks the change up without
  # a worldserver restart.
  gm-security-restore.sql: |
    UPDATE `command`
       SET `security` = 3
     WHERE `name` IN (
       'gm',
       'gm chat',
       'gm visible',
       'gm ingame',
       'gm setview',
       'gm mountup',
       'lookup creature',
       'lookup faction',
       'lookup item',
       'lookup itemset',
       'lookup object',
       'lookup quest',
       'lookup skill',
       'lookup spell',
       'lookup taxinode'
     );
---
apiVersion: batch/v1
kind: Job
metadata:
  name: cmangos-gm-security-restore-migration
  namespace: game-servers
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-db
          image: busybox:latest
          command: ['sh', '-c', 'until nc -z cmangos-database 3306; do echo "Waiting for database..."; sleep 2; done']
      containers:
        - name: migrate
          image: mariadb:12.3
          envFrom:
            - secretRef:
                name: cmangos-database-creds
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "=== Restoring .gm + .lookup subcommands to default security=3 in classicmangos ==="
              mariadb -h cmangos-database -P 3306 -u "$MANGOS_DBUSER" -p"$MANGOS_DBPASS" classicmangos < /sql/gm-security-restore.sql

              if mariadb -h cmangos-database -P 3306 -u "$MANGOS_DBUSER" -p"$MANGOS_DBPASS" -e "USE ptrmangos" 2>/dev/null; then
                echo "=== Restoring in ptrmangos ==="
                mariadb -h cmangos-database -P 3306 -u "$MANGOS_DBUSER" -p"$MANGOS_DBPASS" ptrmangos < /sql/gm-security-restore.sql
              fi

              echo "=== Verifying ==="
              mariadb -h cmangos-database -P 3306 -u "$MANGOS_DBUSER" -p"$MANGOS_DBPASS" classicmangos \
                -e "SELECT name, security FROM command WHERE name LIKE 'gm%' OR name LIKE 'lookup%' ORDER BY name;"

              echo "=== Done. Run '.reload command' in the mangosd console (no restart needed) ==="
          volumeMounts:
            - name: sql-scripts
              mountPath: /sql
      volumes:
        - name: sql-scripts
          configMap:
            name: cmangos-gm-security-restore-migration-sql
