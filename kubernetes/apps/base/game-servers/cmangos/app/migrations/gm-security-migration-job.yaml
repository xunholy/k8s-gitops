---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cmangos-gm-security-migration-sql
  namespace: game-servers
data:
  # Stock celguar/playerbots ships the `.gm *` subcommands at security level 3
  # (Administrator). That blocks GMs (level 2) from core GM workflows like
  # `.gm on` (toggle GM mode) and `.gm visible` (cloak). Lower the six commands
  # that are either core to the GM role or read-only/cosmetic:
  #
  #   gm         — toggle/status of GM mode (.gm on/off)
  #   gm chat    — GM badge on chat messages
  #   gm visible — invisible-to-players cloak
  #   gm ingame  — read-only list of GMs currently in-game
  #   gm setview — farsight view on selected unit (debug)
  #   gm mountup — cosmetic GM mount
  #
  # NOT lowered (kept at 3 by design):
  #   gm list — dumps ALL GM accounts + security levels; info leak about
  #             admin accounts that GMs don't need.
  #   gm fly  — vanilla has no flight; keeping at 3 avoids hand-out of a
  #             movement lever often used by hacks.
  #
  # `.reload command` in the mangosd console picks the change up without
  # a worldserver restart.
  gm-security.sql: |
    UPDATE `command`
       SET `security` = 2
     WHERE `name` IN (
       'gm',
       'gm chat',
       'gm visible',
       'gm ingame',
       'gm setview',
       'gm mountup'
     );
---
apiVersion: batch/v1
kind: Job
metadata:
  name: cmangos-gm-security-migration
  namespace: game-servers
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-db
          image: busybox:latest
          command: ['sh', '-c', 'until nc -z cmangos-database 3306; do echo "Waiting for database..."; sleep 2; done']
      containers:
        - name: migrate
          image: mariadb:12.2
          envFrom:
            - secretRef:
                name: cmangos-database-creds
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "=== Lowering .gm subcommands to GM (security=2) in classicmangos ==="
              mariadb -h cmangos-database -P 3306 -u "$MANGOS_DBUSER" -p"$MANGOS_DBPASS" classicmangos < /sql/gm-security.sql

              # PTR shares the schema; apply there too so a fresh PTR rebuild
              # lands on the same policy.
              if mariadb -h cmangos-database -P 3306 -u "$MANGOS_DBUSER" -p"$MANGOS_DBPASS" -e "USE ptrmangos" 2>/dev/null; then
                echo "=== Lowering .gm subcommands in ptrmangos ==="
                mariadb -h cmangos-database -P 3306 -u "$MANGOS_DBUSER" -p"$MANGOS_DBPASS" ptrmangos < /sql/gm-security.sql
              fi

              echo "=== Verifying ==="
              mariadb -h cmangos-database -P 3306 -u "$MANGOS_DBUSER" -p"$MANGOS_DBPASS" classicmangos \
                -e "SELECT name, security FROM command WHERE name LIKE 'gm%' ORDER BY name;"

              echo "=== Done. Run '.reload command' in the mangosd console (no restart needed) ==="
          volumeMounts:
            - name: sql-scripts
              mountPath: /sql
      volumes:
        - name: sql-scripts
          configMap:
            name: cmangos-gm-security-migration-sql
