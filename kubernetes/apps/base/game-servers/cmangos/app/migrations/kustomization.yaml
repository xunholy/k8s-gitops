---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - mangos-string-517-migration-job.yaml
  # Roll back the two earlier GM-permission widenings (gm + lookup) — the
  # restore Job below resets the affected `command` rows back to security=3.
  # Leave it in the repo: idempotent against fresh DBs and safe to re-run.
  - gm-security-restore-migration-job.yaml
  # Vendored module migrations (cmangos-classic@main src/modules/*).
  # Comment-out individual lines for a staged rollout — all 5 modules also
  # gated by their .conf Enable= key in helmrelease.yaml.
  - transmog-migration-job.yaml
  - barber-migration-job.yaml
  - dualspec-migration-job.yaml
  - trainingdummies-migration-job.yaml
  - achievements-migration-job.yaml
  # PR #14 merged: twinkmaster rework + attunement one-boost-per-account.
  - attunement-account-boost-migration-job.yaml
  - twinkmaster-insane-removal-migration-job.yaml
  # QoL: all consumables (class 0) + trade goods (class 7) → 255 stack.
  - stack-size-255-migration-job.yaml
  # AiPlayerbot data corrections.
  - aiplayerbot-ring-enchant-fix-migration-job.yaml
  # One-off cleanup of classiccharacters orphan rows that don't exist on
  # PTR — leading hypothesis for the live-only SIGSEGV crash class.
  # Idempotent (backup tables + LEFT JOIN ... IS NULL DELETEs); safe to
  # re-run. Backup tables prefixed `_orphan_backup_*_20260523` retained
  # for at least 7 days for rollback. See job body for verify-count
  # output and ptrcharacters comparison.
  - db-orphan-cleanup-migration-job.yaml
