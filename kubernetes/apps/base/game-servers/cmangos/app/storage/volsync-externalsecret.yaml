---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cmangos-database-volsync
  annotations:
    # See pvc-database.yaml — preserves the Kopia repo password Secret
    # across the Kustomization-ownership move into cmangos-database/.
    kustomize.toolkit.fluxcd.io/prune: disabled
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: cmangos-database-volsync-secret
    template:
      data:
        KOPIA_FS_PATH: /repository
        KOPIA_PASSWORD: "{{ .KOPIA_PASSWORD }}"
        KOPIA_REPOSITORY: filesystem:///repository
  dataFrom:
    - extract:
        key: volsync-template
