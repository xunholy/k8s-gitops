---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cmangos-attunement-migration-sql
  namespace: game-servers
data:
  characters.sql: |
    CREATE TABLE IF NOT EXISTS `custom_attunement_player_config` (
      `guid` int(11) unsigned NOT NULL COMMENT 'Character GUID',
      `option_key` varchar(64) NOT NULL COMMENT 'Option name (e.g. xp_rate)',
      `value` float NOT NULL DEFAULT 0 COMMENT 'Option value',
      `updated_at` datetime DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
      PRIMARY KEY (`guid`, `option_key`)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8 COLLATE=utf8_bin COMMENT='Attunement per-player options';
  world.sql: |
    -- ============================================================
    -- Attunement NPC - "Attuner of Paths"
    -- Single faction-friendly NPC entry: 190014
    -- Spawns at every Classic starting zone (6 distinct zones, 8 races)
    -- ============================================================

    SET @AttunementEntry := 190014;

    -- NPC Template: faction 35 = Friendly to all, DisplayId 7949 = ethereal
    DELETE FROM `creature_template` WHERE `entry` = @AttunementEntry;
    INSERT INTO `creature_template`
      (`entry`, `DisplayId1`, `DisplayIdProbability1`, `name`, `subname`, `GossipMenuId`,
       `minlevel`, `maxlevel`, `faction`, `NpcFlags`, `scale`, `rank`,
       `DamageSchool`, `MeleeBaseAttackTime`, `RangedBaseAttackTime`, `unitClass`, `unitFlags`,
       `CreatureType`, `CreatureTypeFlags`, `ScriptName`, `lootid`, `PickpocketLootId`, `SkinningLootId`,
       `AIName`, `MovementType`, `RacialLeader`, `RegenerateStats`, `MechanicImmuneMask`, `ExtraFlags`)
    VALUES
      (@AttunementEntry, 7949, 100, 'Attuner of Paths', 'Adjuster of Fate', 0,
       60, 60, 35, 1, 1.1, 0,
       0, 2000, 0, 1, 0,
       7, 138936390, 'npc_attunement', 0, 0, 0,
       '', 0, 0, 1, 0, 0);

    -- Spawns: one per Classic starting zone (6 zones, 8 races)
    DELETE FROM `creature` WHERE `id` = @AttunementEntry;
    INSERT INTO `creature`
      (`id`, `map`, `spawnMask`, `position_x`, `position_y`, `position_z`, `orientation`,
       `spawntimesecsmin`, `spawntimesecsmax`, `spawndist`, `MovementType`)
    VALUES
      (@AttunementEntry, 0, 1, -8915.0, -135.0,  82.5, 0.0, 300, 300, 0, 0),  -- Northshire (Human)
      (@AttunementEntry, 0, 1, -6240.0,  331.0, 383.0, 0.0, 300, 300, 0, 0),  -- Coldridge Valley (Dwarf, Gnome)
      (@AttunementEntry, 0, 1,  1814.0, 1593.0,  97.0, 0.0, 300, 300, 0, 0),  -- Deathknell (Undead)
      (@AttunementEntry, 1, 1, 10316.0,  836.0,1326.0, 0.0, 300, 300, 0, 0),  -- Shadowglen (Night Elf)
      (@AttunementEntry, 1, 1,  -616.0,-4264.0,  38.0, 0.0, 300, 300, 0, 0),  -- Valley of Trials (Orc, Troll)
      (@AttunementEntry, 1, 1, -2917.0, -270.0,  53.0, 0.0, 300, 300, 0, 0);  -- Camp Narache (Tauren)

    -- NPC Text
    SET @TEXT_ID := 50930;
    DELETE FROM `npc_text` WHERE `ID` BETWEEN @TEXT_ID AND @TEXT_ID+1;
    INSERT INTO `npc_text` (`ID`, `text0_0`) VALUES
      (@TEXT_ID,
       'Some walk this world swiftly, others savor every step. I can attune the pace at which experience flows to you, $N. Pick a path - or whisper your own.'),
      (@TEXT_ID+1,
       'Whisper the rate you desire, $N. A number such as 1.5 or 7.');
---
apiVersion: batch/v1
kind: Job
metadata:
  name: cmangos-attunement-migration
  namespace: game-servers
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-db
          image: busybox:latest
          command: ['sh', '-c', 'until nc -z cmangos-database 3306; do echo "Waiting for database..."; sleep 2; done']
      containers:
        - name: migrate
          image: mariadb:12.2
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "=== Applying Attunement schema to classiccharacters ==="
              mariadb -h cmangos-database -P 3306 -u mangos -pmangos classiccharacters < /sql/characters.sql
              echo "=== Characters schema applied successfully ==="

              echo "=== Applying Attunement NPC + spawns to classicmangos ==="
              mariadb -h cmangos-database -P 3306 -u mangos -pmangos classicmangos < /sql/world.sql
              echo "=== World data applied successfully ==="

              echo "=== Verifying characters table ==="
              mariadb -h cmangos-database -P 3306 -u mangos -pmangos classiccharacters -e "SHOW TABLES LIKE 'custom_attunement%';"

              echo "=== Verifying Attunement NPC template ==="
              mariadb -h cmangos-database -P 3306 -u mangos -pmangos classicmangos -e "SELECT entry, name, subname, faction, NpcFlags, ScriptName FROM creature_template WHERE entry = 190014;"

              echo "=== Verifying spawns (expect 6 rows) ==="
              mariadb -h cmangos-database -P 3306 -u mangos -pmangos classicmangos -e "SELECT id, map, position_x, position_y, position_z FROM creature WHERE id = 190014;"

              echo "=== Verifying NPC text ==="
              mariadb -h cmangos-database -P 3306 -u mangos -pmangos classicmangos -e "SELECT ID, LEFT(text0_0, 60) AS text_preview FROM npc_text WHERE ID BETWEEN 50930 AND 50931;"

              echo "=== Attunement migration complete ==="
          volumeMounts:
            - name: sql-scripts
              mountPath: /sql
      volumes:
        - name: sql-scripts
          configMap:
            name: cmangos-attunement-migration-sql
