---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cmangos
  namespace: game-servers
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      mangosd:
        pod:
          terminationGracePeriodSeconds: 390
        initContainers:
          wait-db:
            image:
              repository: busybox
              tag: latest
            command: ['sh', '-c', 'until nc -z cmangos-database 3306; do sleep 2; done']
        containers:
          app:
            image:
              repository: ghcr.io/xunholy/cmangos-classic
              # Bumped to e77c5494d — first image off the cleaned-up main:
              # PR #5 mutex revert + vanilla cmangos (migration runner
              # stripped) + ccache wired into the builder for faster
              # future rebuilds. Binary delta vs 2473619f is just the
              # playerbots vendoring (upstream #292 -> #293 quest-flow
              # fix) and the EnchantItem null-guard — near-identical
              # behaviour expected. Cluster currently bots=0, so the
              # rollout should be uneventful.
              # Bumped to 7c511313a — clean main HEAD after:
              #   - PR #8 cherry-picked (replace_conf c\\ form, fixes
              #     the '|' crash that bit us on the e77c5494d bump)
              #   - PR #7 merged (fix(chat): audit every GM command
              #     attempt, not only handler-true)
              # Binary delta vs 2473619f: vendored playerbots upstream
              # bump (#292 -> #293, quest-flow fix) + EnchantItem
              # null-guard + the GM audit change.
              # ROLLBACK 2026-05-22: f24f277e (PR#9 fixes) crashed live
              # with exit 134 (SIGABRT) shortly after rollout, despite
              # PTR validating 8h+ on the same image. Different failure
              # mode than the SIGSEGV it was supposed to fix. Reverted
              # to 7c511313a (pre-PR#9) + bots back to 0/0 to stabilise.
              # Need to investigate the SIGABRT cause separately before
              # re-attempting this image on live.
              # Bumped to 190c0467 (Release) — main HEAD with the
              # full set of fixes validated on PTR under bots=1500/2000
              # + ASan + all modules enabled (no crashes for 30+ min):
              #   PR #10 (GameObject SPELLCASTER stack-use-after-scope)
              #   PR #11 (playerbot Item UAF — m_usedInSpellCount
              #          guards in Item::SaveToDB / Item::SetState,
              #          atomic refcount, PlayerBots double-bump fix)
              #   PR #12 (Loot::~Loot GroupLootRoll UAF — clear m_roll
              #          before deleting m_lootItems)
              # Re-enabling bots on live with this image (bot config
              # below: Min=1500, Max=2000). Two minor playerbot bugs
              # remain open (SpellIdValue UAR, TravelMgr exit-time
              # type-mismatch) — both pre-existing, only fire under
              # ASan; Release silently tolerates.
              # Bumped to 4cc55d58b (Release) — PR #19 merge
              # (xunholy/cmangos-classic#19). Amalgamates the standalone
              # dualspec module into the Attuner of Paths NPC. The
              # standalone Dual Specialization Crystal (entry 190024) is
              # despawned; the Attuner now exposes the spec-switch gossip.
              # Existing custom_dualspec_* tables are preserved (no
              # migration needed — the schema is unchanged, only the
              # module that reads it moved). Soaked on PTR.
              # Carries all of PR #14 (twinkmaster rework, attunement
              # one-boost-per-account, OnPreBuyItem hook, spell fixes,
              # T0 gear audit, stack-255).
              # Re-promoted after fixing config: dualspec keys moved into
              # attunement.conf, standalone dualspec ConfigMap + mount
              # removed (the binary no longer ships dualspec.conf.dist).
              # Bumped to 7205c38f7 — auto-unlock dualspec on first
              # visit (removed "Purchase Dual Talent Specialization"
              # gossip step; players go straight to spec-switch menu).
              tag: 7205c38f7097b1044f1c2ff28a74b0e6a12fc546
            args: ["mangosd"]
            tty: true
            stdin: true
            env:
              TZ: ${CLUSTER_TIMEZONE}
              MANGOS_DBHOST: cmangos-database
              MANGOS_DBPORT: "3306"
            envFrom:
              # MANGOS_DBUSER + MANGOS_DBPASS from 1Password via ESO.
              - secretRef:
                  name: cmangos-database-creds
            # Graceful shutdown (belt-and-suspenders save):
            #   1. Start 5-min in-game countdown immediately so players
            #      see the warning right away.
            #   2. saveall 2s later — safety-net flush in case anything
            #      goes wrong later in the window.
            #   3. Sleep until ~30s before shutdown, then saveall again
            #      to capture final progress (trades, quest hand-ins,
            #      last-second looting during the countdown).
            #   4. sleep out the remaining window for mangosd to exit.
            #   5. SIGTERM at ~340s, SIGKILL at 390s.
            lifecycle:
              preStop:
                exec:
                  command:
                    - /bin/sh
                    - -c
                    - |
                      echo "server restart 300" > /tmp/mangosd-stdin
                      sleep 2
                      echo "saveall" > /tmp/mangosd-stdin
                      sleep 268
                      echo "saveall" > /tmp/mangosd-stdin
                      sleep 50
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 8085
                  periodSeconds: 30
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 8085
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 8085
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 180
            resources:
              requests:
                cpu: "2"
                memory: 4Gi
              limits:
                memory: 12Gi
          # Tail the GM audit log to stdout so commands issued by
          # GM-tier accounts surface in kubectl logs (and the eventual
          # Loki collector). The mangosd container writes gm.log; this
          # sidecar shares the cmangos-mangosd-logs PVC read-only.
          gm-log-tail:
            image:
              repository: busybox
              tag: latest
            command:
              - /bin/sh
              - -c
              - |
                while [ ! -f /opt/mangos/logs/gm.log ]; do sleep 5; done
                exec tail -F /opt/mangos/logs/gm.log
            resources:
              requests:
                cpu: 5m
                memory: 8Mi
              limits:
                memory: 32Mi
            securityContext:
              runAsUser: 1001
              runAsGroup: 1001
              runAsNonRoot: true
              readOnlyRootFilesystem: true
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
          # Prune /opt/mangos/cores so a runaway crash loop can't fill
          # the 40Gi PVC again (May 2026 incident: cores went from a
          # 4-9 GB dump to zero-byte writes once the disk was full,
          # blinding post-mortem analysis). Keeps the 2 newest non-zero
          # cores by mtime and deletes the rest every 10 min.
          cores-pruner:
            image:
              repository: busybox
              tag: latest
            command:
              - /bin/sh
              - -c
              - |
                while true; do
                  if cd /opt/mangos/cores 2>/dev/null; then
                    find . -maxdepth 1 -name 'core.*' -size 0 -delete 2>/dev/null
                    # shellcheck disable=SC2012
                    ls -1t core.* 2>/dev/null | tail -n +3 | xargs -r rm -f --
                  fi
                  sleep 600
                done
            resources:
              requests:
                cpu: 5m
                memory: 8Mi
              limits:
                memory: 32Mi
            securityContext:
              # mangosd writes cores as the mangos user (UID 1001). Without
              # CAP_DAC_OVERRIDE (we drop ALL caps) root can't delete files
              # owned by 1001 at mode 0600, so the pruner becomes a no-op
              # and the cores PVC wedges at 100%. Match the worldserver UID.
              runAsUser: 1001
              runAsGroup: 1001
              runAsNonRoot: true
              readOnlyRootFilesystem: true
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
    service:
      world:
        controller: mangosd
        ports:
          world:
            port: 8085
      soap:
        controller: mangosd
        ports:
          soap:
            port: 7878
    configMaps:
      mangosd-config:
        data:
          mangosd.conf: |
            GameType = 1
            RealmZone = 8
            WorldServerPort = 8085
            BindIP = "0.0.0.0"
            PlayerLimit = 750
            # Serialize MapUpdater workers (=1). The 2026-05-21 incident saw
            # 4+ SIGSEGV/SIGABRTs in MySqlPreparedStatement::bind and
            # SqlTransaction::Execute under a fresh DB connection + 1100-bot
            # load. The bind() asserts only fire when holder.boundParams()
            # doesn't match the prepared m_nParams — that is heap corruption
            # of the params vector, not a logic bug. The SQL pipeline itself
            # is structurally clean (validated by reading SqlPreparedStatement,
            # SqlOperations, Database.cpp end-to-end); the corruption comes
            # from concurrent MapUpdateWorker writes elsewhere clobbering
            # unrelated heap blocks. Previously-confirmed crash class on this
            # codebase: concurrent dtNavMesh::getTileAt / ai::MovementAction::
            # UseTransport races at 250-500+ bots. Workaround only — proper
            # resolution needs ASan on the cmangos fork.
            MapUpdate.Threads = 1
            Motd = "Welcome to Emberstone"
            # Stdout quiet, file rich. LogLevel governs kubectl logs;
            # LogFileLevel governs /opt/mangos/logs/Server.log on the PVC.
            # Playerbot Engine::LogAction emits via sLog.outDetail (lvl 2),
            # so LogLevel=1 keeps the AI trace spam out of stdout while
            # the file still captures full diagnostics. Pair with
            # AiPlayerbot.LogInGroupOnly=1 so the file is also sane.
            LogLevel = 1
            LogFile = "/opt/mangos/logs/Server.log"
            LogFileLevel = 3
            LogTimestamp = 1
            # GM command audit log. Absolute path because run_mangosd cd's
            # into /opt/mangos/cores before exec. Tailed by the gm-log-tail
            # sidecar so lines also reach kubectl logs / future Loki.
            GmLogFile = "/opt/mangos/logs/gm.log"
            GmLogTimestamp = 1
            GmLogPerAccount = 0
            LogGMTrade = 1
            LogFilter_GMChat = 0
            SOAP.Enabled = 1
            SOAP.IP = 0.0.0.0
            SOAP.Port = 7878
            Rate.XP.Kill = 1
            Rate.XP.Quest = 1
            Rate.XP.Explore = 1
            Rate.Drop.Item.Poor = 3
            Rate.Drop.Item.Normal = 3
            Rate.Drop.Item.Uncommon = 3
            Rate.Drop.Item.Rare = 2
            Rate.Drop.Item.Epic = 1
            Rate.Drop.Money = 3
            Rate.Reputation.Gain = 3
            AllowTwoSide.Interaction.Group = 1
            AllowTwoSide.Interaction.Guild = 1
            AllowTwoSide.Interaction.Chat = 1
            AllowTwoSide.Interaction.Channel = 1
            MailDeliveryDelay = 0
            StartPlayerMoney = 100000
            SkillGain.Crafting = 3
            SkillGain.Gathering = 3
            SkillGain.Defense = 3
            SkillGain.Weapon = 3
            Rate.Drop.Item.Quest = 3
            Death.Ghost.RunSpeed.World = 1.5
            PlayerSaveInterval = 60000
            Rate.Health = 3
            Rate.Mana = 3
      aiplayerbot-config:
        data:
          aiplayerbot.conf: |
            AiPlayerbot.Enabled = 1
            AiPlayerbot.RandomBotAutoCreate = 1
            AiPlayerbot.RandomBotAutologin = 1
            # Boot-time bot stampede was segfaulting mangosd at "Loading
            # instance data for world_map_kalimdor": 250+ bots spawning
            # into maps 0/1 raced detour navmesh + sGOStorage::LookupEntry
            # before map state settled. MapUpdate.Threads=1 fixes the BG
            # runtime case but not the startup case. Bots ramp up over
            # time after boot via the random-bot tick, so we still reach
            # MinRandomBots without the boot stampede.
            AiPlayerbot.RandomBotLoginAtStartup = 0
            AiPlayerbot.RandomBotAccountPrefix = rndbot
            AiPlayerbot.RandomBotAccountCount = 2000
            # Bots re-enabled at 1500/2000 on 2026-05-24 after PTR
            # validated the full fix set (PRs #10/#11/#12) under the
            # same density for 30+ min with no UAF / crash markers.
            # RandomBotLoginAtStartup=0 above keeps the boot stampede
            # from racing detour/grid init; bots ramp via the periodic
            # random-bot tick over the first ~10 min.
            AiPlayerbot.MinRandomBots = 1500
            AiPlayerbot.MaxRandomBots = 2000
            AiPlayerbot.RandomBotMinLevel = 1
            AiPlayerbot.RandomBotMaxLevel = 60
            AiPlayerbot.RandomBotMaps = 0,1
            AiPlayerbot.AutoDoQuests = 1
            AiPlayerbot.AutoPickReward = yes
            AiPlayerbot.AutoEquipUpgradeLoot = 1
            AiPlayerbot.AutoLearnTrainerSpells = 1
            AiPlayerbot.AutoLearnQuestSpells = 1
            AiPlayerbot.RandomGearUpgradeEnabled = 1
            # Tighten the bot-level → item-required-level window from
            # default 9 down to 3. With 9, a L60 could be equipped with
            # items requiring L51 (way under-leveled gear); with 3, a
            # L60 only takes items requiring L57+. Smaller window =
            # better-itemized bots, mainly improves their effective
            # armor / stats in dungeons. Affects new gear assignments
            # by the random-bot manager — existing bots re-roll on the
            # normal RandomGearUpgrade tick.
            AiPlayerbot.RandomGearMaxDiff = 3
            # Off: bots teleport to random level-appropriate spots instead of
            # onto real players. Spreads them across the world, cuts teleport
            # churn, and stops the city/quest-hub dogpiling that amplified the
            # emote/LLM chatter. (Community/celguar vanilla default is 0.)
            AiPlayerbot.RandomBotTeleportNearPlayer = 0
            AiPlayerbot.SyncQuestWithPlayer = 1
            # Was 0 (no random guilds). Three-agent investigation on 2026-05-21
            # tied the deterministic ~4-min SIGSEGV crash loop to the early-
            # return path in PlayerbotFactory::InitGuild() (upstream playerbots
            # line ~5100). With Count=0, CreateRandomGuilds() never runs,
            # InitGuild() always logs "No random guilds available" and returns
            # immediately — something downstream of that return segfaults
            # (likely a destructor or the next bot-init step assuming guild
            # state). Setting >0 forces guild creation, takes the bot-init
            # path through the no-bug branch. Test value; revisit upstream
            # for a real guard once we have the core-dump backtrace.
            AiPlayerbot.RandomBotGuildCount = 50
            AiPlayerbot.RandomBotJoinBG = 1
            # Temporary: stop bots auto-queuing into BGs. Crashes traced to
            # HandleMoveWorldportAckOpcode racing a fresh BG removal — bots
            # cycling in/out of queues are what supplies the stale Worldport
            # ACKs. Re-enable once the WorldportAck patch (0002) lands in
            # the image. Bots still queue when invited (RandomBotJoinBG=1).
            AiPlayerbot.RandomBotAutoJoinBG = 0
            AiPlayerbot.RandomBotGroupNearby = 1
            # Spread bots across the full 1-60 range instead of pinning them to
            # the (low) online-player level. With sync on, a quiet/low-level
            # server collapsed the bot cap to ~player+2, dragging the whole pool
            # to level 1-7 and swarming starter zones. Off: bots distribute 1-60
            # and the periodic randomize re-rolls any bot <= startingLevel(5)
            # upward, so low-level bots continuously level up and move on.
            # (SyncLevelMaxAbove is inert while sync is disabled.)
            AiPlayerbot.SyncLevelWithPlayers = 0
            AiPlayerbot.SyncLevelMaxAbove = 2
            AiPlayerbot.AutoPickTalents = full
            AiPlayerbot.AutoTrainSpells = free
            # Competitive BG/WSG twink settings
            AiPlayerbot.minEnchantingBotLevel = 10
            AiPlayerbot.BotAcceptDuelMinimumLevel = 10
            # Engine::LogAction (Engine.cpp:782) early-returns when a bot
            # isn't grouped with a real player. With ~1000 random bots
            # idling in the world, that drops AI trace volume by ~95%
            # and stops k8s container-log rotation from evicting useful
            # lines within seconds. Grouped bots still get full traces.
            AiPlayerbot.LogInGroupOnly = 1
            # LLM-driven chat — points at the in-cluster Ollama
            # (ai-system ns, qwen2.5:3b ~1.9GB). PlayerbotLLMInterface
            # is async by design and drops requests above
            # MaxSimultaniousGenerations, so this cannot block bot
            # tick threads even at the current 1500-2000 bot density
            # on live. The binary already carries PR #13's
            # try/catch around every std::regex(...) in
            # PlayerbotLLMInterface.cpp (image 97851d0e), so an
            # invalid response-parsing pattern degrades gracefully
            # via sLog.outError instead of crashing the world server.
            #
            # Same settings as PTR after the prompt-tuning soak:
            # - Mode 2 = LLM default for all bots (no per-bot strategy)
            # - max 25 concurrent generations (qwen2.5:3b on CPU does
            #   ~5-10 gens/s; 25 caps sustainable backpressure)
            # - 30s timeout drops slow gens rather than holding state
            # - Bot-to-bot chat OFF (avoid LLM-vs-LLM loops)
            # - RPG-AI chat ON (full chance during RPG interactions)
            #
            # Only the StartPattern is overridden because Ollama
            # returns the OpenAI-compat schema ("content":"...") not
            # KoboldAI ("text":"..."), and it's deliberately
            # backslash-free — the cmangos .conf parser strips
            # single backslashes from values, so any pattern with
            # \s or \* or \[ in the config gets reduced to s/*/[ and
            # becomes invalid regex. End/Delete/Split overrides are
            # omitted so the (working) R"(...)" code defaults in
            # PlayerbotAIConfig.cpp:678-681 take effect — those
            # bypass the parser entirely.
            AiPlayerbot.LLMEnabled = 2
            AiPlayerbot.LLMApiEndpoint = http://ollama.ai-system.svc.cluster.local:11434/v1/chat/completions
            AiPlayerbot.LLMApiKey =
            AiPlayerbot.LLMApiJson = {"model": "qwen2.5:3b", "messages": [{"role": "system", "content": "<pre prompt> <context>"},{"role": "user", "content": "<prompt>"}],"max_tokens": 60}
            AiPlayerbot.LLMContextLength = 4096
            AiPlayerbot.LLMGenerationTimeout = 30
            AiPlayerbot.LLMMaxSimultaniousGenerations = 25
            AiPlayerbot.LLMPrePrompt = You are <bot name>, a level <bot level> <bot gender> <bot race> <bot class> in <bot subzone>, <bot zone>. <other name> (level <other level> <other gender> <other race> <other class>) just sent you a <channel name>. Reply like a real WoW Classic player would in chat: brief, casual, lowercase fine, shorthand fine (ty, wb, brb, lol, omw, gtg, np, k). React to what they said. Drop in your current activity (quest, grind spot, looking for group, heading to a city) when it fits naturally. Stay in character at all times — you are this character, in this world, right now. Never mention being an AI, "the game", interfaces, mechanics, or anything outside the world. Under 100 characters.
            AiPlayerbot.LLMPrompt = <receiver name>:<initial message>
            AiPlayerbot.LLMPostPrompt = <bot name>:
            AiPlayerbot.LLMRpgPrompt = You are <bot name>, a level <bot level> <bot gender> <bot race> <bot class>, standing in <bot subzone>, <bot zone>. Nearby is <unit name>, a <unit type> — a level <unit level> <unit gender> <unit race> <unit faction> <unit class>. Say something a real WoW Classic player would say in passing: a quick comment, observation, greeting, or in-character muttering about what you're doing. Casual chat tone, lowercase fine, shorthand fine. Reference your class, zone, or current activity if it fits. Stay in character: no AI talk, no game-mechanic talk, no fourth wall. Under 100 characters.
            AiPlayerbot.LLMResponseStartPattern = ("content":")
            AiPlayerbot.LLMBotToBotChatChance = 0
            AiPlayerbot.LLMRpgAIChatChance = 100
      twinkmaster-config:
        data:
          twinkmaster.conf: |
            Twinkmaster.Enable = 1
            Twinkmaster.TargetLevel = 19
      attunement-config:
        data:
          # Hardcore was amalgamated into the Attuner of Paths gossip
          # in xunholy/cmangos-classic@feb8ea8b7 — the merged module
          # reads both Attunement.* and Hardcore.* keys from this single
          # attunement.conf. (The old hardcore.conf path is no longer
          # consulted by the binary.)
          attunement.conf: |
            Attunement.Enable = 1
            Attunement.DefaultRate = 1.0
            Attunement.MinRate = 0.1
            Attunement.MaxRate = 100
            Attunement.Aura.Tier1.SpellId = 0
            Attunement.Aura.Tier2.SpellId = 0
            Attunement.Aura.Tier3.SpellId = 0
            Attunement.Aura.Tier4.SpellId = 0
            Attunement.Aura.Tier5.SpellId = 0
            Hardcore.Enable = 1
            Hardcore.PlayerConfig = 1
            Hardcore.BroadcastDeathGuild = 1
            Hardcore.BroadcastDeathWorld = 1
            Hardcore.SpawnGrave = 1
            Hardcore.GraveGameObjectID = 61
            Hardcore.GraveMessage = "Shit happens. <PlayerName> | Well, this sucks. <PlayerName> | It is really dark down here. <PlayerName> | Finally some peace and quiet. <PlayerName> | Shhh! I am sleeping. <PlayerName>"
            Hardcore.RemoveGravesOnCharacterDeleted = 1
            Hardcore.DropGear = 0
            Hardcore.DropItems = 0
            Hardcore.DropMoney = 0
            Hardcore.BotDropGear = 0
            Hardcore.BotDropItems = 0
            Hardcore.BotDropMoney = 0
            Hardcore.RemoveLootOnCharacterDeleted = 1
            Hardcore.LootGameObjectID = 2850
            Hardcore.ReviveDisabled = 1
            Hardcore.ReviveOnGraveyard = 0
            Hardcore.LevelDown = 0
            Hardcore.MaxPlayerLoot = 99
            Hardcore.DropOnDungeons = 1
            Hardcore.DropOnRaids = 1
            Hardcore.LevelDownOnDungeons = 1
            Hardcore.LevelDownOnRaids = 1
            Hardcore.LevelDownMinLevel = 1
            Hardcore.DropMinLevel = 1
            # Dualspec (amalgamated into attunement by PR #19 — keys
            # previously lived in dualspec.conf, now read from here).
            Dualspec.Enable = 1
            Dualspec.Cost = 100000
            Hardcore.DisablePVP = 0
            Hardcore.SelfFound = 0
      anticheat-config:
        data:
          # Canonical source: etc/emberstone/anticheat.conf in
          # xunholy/cmangos-classic. Keep in sync.
          # Action mask vocabulary (sum of bits): 1=log, 2=prompt,
          # 4=kick, 8=ban_acct, 16=ban_ip, 32=silence. Every mask here
          # is ≤ 7 — kick-only, never auto-ban (human decision only).
          anticheat.conf: |
            [AnticheatConf]
            ConfVersion=2017102301
            Enable = 1
            FingerprintHistory = 30
            FingerprintLevel = 6
            KickDelay.Min = 30
            KickDelay.Max = 90
            BanDelay.Min = 30
            BanDelay.Max = 90
            IPBanDelay.Min = 30
            IPBanDelay.Max = 90
            BanWave.Day = 1
            BanWave.Hour = 10
            BanWave.Minute = 0
            Movement.UseExtrapolation = 1
            Movement.SpeedHack.Enable  = 1
            Movement.WallClimb.TickCount   = 0
            Movement.WallClimb.TickAction  = 0
            Movement.WallClimb.TotalCount  = 0
            Movement.WallClimb.TotalAction = 0
            # High-confidence cheats — kick on first detect
            Movement.WaterWalk.TickCount   = 1
            Movement.WaterWalk.TickAction  = 7
            Movement.WaterWalk.TotalCount  = 0
            Movement.WaterWalk.TotalAction = 0
            Movement.SlowFall.TickCount   = 1
            Movement.SlowFall.TickAction  = 7
            Movement.SlowFall.TotalCount  = 0
            Movement.SlowFall.TotalAction = 0
            Movement.FlyHack.TickCount    = 1
            Movement.FlyHack.TickAction   = 7
            Movement.FlyHack.TotalCount   = 0
            Movement.FlyHack.TotalAction  = 0
            Movement.Forbidden.TickCount  = 1
            Movement.Forbidden.TickAction = 7
            Movement.Forbidden.TotalCount = 0
            Movement.Forbidden.TotalAction= 0
            Movement.NullClientTime.TickCount  = 1
            Movement.NullClientTime.TickAction = 7
            Movement.NullClientTime.TotalCount = 0
            Movement.NullClientTime.TotalAction = 0
            Movement.RootMove.TickCount  = 1
            Movement.RootMove.TickAction = 7
            Movement.RootMove.TotalCount = 0
            Movement.RootMove.TotalAction= 0
            Movement.TimeBack.TickCount  = 1
            Movement.TimeBack.TickAction = 7
            Movement.TimeBack.TotalCount = 0
            Movement.TimeBack.TotalAction= 0
            Movement.FakeTransport.TickCount   = 1
            Movement.FakeTransport.TickAction  = 7
            Movement.FakeTransport.TotalCount  = 0
            Movement.FakeTransport.TotalAction = 0
            Movement.TeleToTransport.TickCount  = 1
            Movement.TeleToTransport.TickAction = 7
            Movement.TeleToTransport.TotalCount = 0
            Movement.TeleToTransport.TotalAction= 0
            Movement.FixedZ.TickCount  = 1
            Movement.FixedZ.TickAction = 7
            Movement.FixedZ.TotalCount = 0
            Movement.FixedZ.TotalAction= 0
            # Twitchy under lag — log+prompt, kick after 10 cumulative
            Movement.MultiJump.TickCount    = 1
            Movement.MultiJump.TickAction   = 3
            Movement.MultiJump.TotalCount   = 10
            Movement.MultiJump.TotalAction  = 7
            Movement.FastJump.TickCount     = 1
            Movement.FastJump.TickAction    = 3
            Movement.FastJump.TotalCount    = 10
            Movement.FastJump.TotalAction   = 7
            Movement.JumpSpeedChange.TickCount  = 1
            Movement.JumpSpeedChange.TickAction = 3
            Movement.JumpSpeedChange.TotalCount = 10
            Movement.JumpSpeedChange.TotalAction= 7
            Movement.HeartbeatSkip.TickCount  = 1
            Movement.HeartbeatSkip.TickAction = 3
            Movement.HeartbeatSkip.TotalCount = 10
            Movement.HeartbeatSkip.TotalAction= 7
            Movement.ClockDesync.TickCount  = 1
            Movement.ClockDesync.TickAction = 3
            Movement.ClockDesync.TotalCount = 10
            Movement.ClockDesync.TotalAction= 7
            # Mid-confidence — kick after 3-5 cumulative
            Movement.OverspeedZ.TickCount   = 1
            Movement.OverspeedZ.TickAction  = 3
            Movement.OverspeedZ.TotalCount  = 5
            Movement.OverspeedZ.TotalAction = 7
            Movement.BadOrderAck.TickCount  = 1
            Movement.BadOrderAck.TickAction = 3
            Movement.BadOrderAck.TotalCount = 5
            Movement.BadOrderAck.TotalAction= 7
            # Teleport — instant kick on first detect. Position revert is
            # built into the anticheat: src/game/Anticheat/module/Movement/
            # movement.cpp:1034 calls Player::SavePositionInDB with the
            # PREVIOUS (legitimate) position and returns false to reject
            # the movement opcode. So a hacker teleporting to GM island
            # gets kicked AND the DB stores their pre-cheat location, so
            # relog doesn't keep them there.
            # GM island has an extra CHEAT_TYPE_FORBIDDEN detector at
            # movement.cpp:1031.
            # No false-positive concern: engine-initiated teleports (mage
            # portal, hearthstone, instance entry, gryphon arrivals) are
            # excluded from this check — only client-injected movements
            # the server didn't request trip it.
            Movement.Teleport.TickCount     = 1
            Movement.Teleport.TickAction    = 7
            Movement.Teleport.TotalCount    = 0
            Movement.Teleport.TotalAction   = 0
            Movement.TeleportFar.TickCount  = 1
            Movement.TeleportFar.TickAction = 7
            Movement.TeleportFar.TotalCount = 0
            Movement.TeleportFar.TotalAction= 0
            # Exploration — info only, no kick
            Movement.Explore.TickCount     = 3
            Movement.Explore.TickAction    = 3
            Movement.Explore.TotalCount    = 0
            Movement.Explore.TotalAction   = 0
            Movement.ExploreHigh.TickCount  = 1
            Movement.ExploreHigh.TickAction = 3
            Movement.ExploreHigh.TotalCount  = 0
            Movement.ExploreHigh.TotalAction = 0
            Movement.BadFallReset.Enable    = 1
            Movement.BadFallReset.Threshold = 1
            Movement.BadFallReset.Penalty   = 7
            # Antispam — silence (reversible)
            Antispam.Enable   = 1
            Antispam.Silence  = 1
            Antispam.MaxLevel = 25
            # Warden re-enable attempt. Previous crash was 'Failed to locate
            # Warden modules' — root cause hypothesis: relative path
            # "warden_modules" doesn't resolve at the moment WardenModuleMgr
            # lazy-initializes on first player auth (boost::fs::exists from
            # a CWD that isn't /opt/mangos/bin). Switching to absolute path
            # rules out CWD-resolution issues; data files at this path are
            # confirmed present + readable + size-valid + non-zero header.
            Warden.Enable                       = 1
            Warden.ModuleDir                    = "/opt/mangos/bin/warden_modules"
            Warden.Timeout                      = 30
            Warden.ScanFrequency                = 15
            Warden.ScanCount                    = 10
            Warden.MinimumLevel                 = 1
            Warden.MinimumAdvancedLevel         = 1
            Warden.SuspiciousEndSceneHookAction = 7
            Warden.TickCount                    = 1
            Warden.TickAction                   = 7
            Warden.TotalCount                   = 0
            Warden.TotalAction                  = 0
      vip-config:
        data:
          # merge_confs in the runner entrypoint splits each line on '=' and
          # uses LHS as the key. Section headers ([VipConf]) and # comments
          # don't parse as key=value, so they end up appended as garbage
          # '[VipConf] = [VipConf]' lines in /opt/mangos/etc/vip.conf.
          # Keep this to plain key=value only, matching attunement.conf.
          # MasterSpellId 22888 = Rallying Cry of the Dragonslayer.
          # Vanilla 1.12.1 client has it in spell.dbc (renders in
          # spellbook with that name + icon 1548). Zero references from
          # creatures, items, or AI scripts in this server's DB, so
          # reusing the ID does not collide with any in-game content.
          # The vanilla effects (10% crit / 140 AP / 5% spell crit, 2h)
          # ride along with whatever bundled spells get added below.
          # Previous ID 91200 ("Wayfarer's Boon") is Cataclysm-range
          # and invisible to vanilla clients without a custom patch-X.MPQ.
          vip.conf: |
            Vip.Enable = 1
            Vip.MasterSpellId = 18282
            # Explicit list (rather than "" which the mangos config parser
            # returns as a literal 2-char string, not an empty string —
            # the module's empty-string fallback to built-in defaults
            # never triggered).
            # Bundle (15 spells):
            #   22888 Rallying Cry of the Dragonslayer  16609 Warchief's Blessing
            #   24425 Spirit of Zandalar                 15366 Songflower Serenade
            #   22817 Fengus' Ferocity   22818 Mol'dar's Moxie   22820 Slip'kik's Savvy   (DM Tribute trio)
            #   23735 Sayge's Strength   23736 Sayge's Agility   23737 Sayge's Stamina    (Sayge Dark Fortunes)
            #   23768 Sayge's Damage     26393 Elune's Blessing  (Lunar Festival)
            #   17626 Flask of the Titans  17627 Distilled Wisdom  17628 Supreme Power
            Vip.BundledSpellIds = 22888,24425,15366,16609,22817,22818,22820,23735,23736,23737,23768,26393,17626,17627,17628
      autoscale-config:
        data:
          autoscale.conf: |
            Autoscale.Enable = 1
            Autoscale.RescanIntervalSeconds = 10
            Autoscale.HpExponent = 0.85
            Autoscale.MinScale = 0.20
            Autoscale.MaxScale = 1.0
            # Baselines reflect each raid's designed group size. MC/BWL/
            # AQ40/Onyxia were built for 40, ZG/AQ20 for 20. The
            # MinScale=0.20 floor catches small-group attempts (e.g. 5p
            # MC at the floor = 20% HP) — the "smallest party we'll
            # bother supporting" tier. Adding bodies scales mobs back up
            # toward 100% smoothly.
            Autoscale.Baseline.Dungeon = 5
            Autoscale.Baseline.RaidDefault = 40
            Autoscale.MapBaselines = "309:20,509:20"
            Autoscale.MapBlacklist = ""
            Autoscale.Announce = 1
      transmog-config:
        data:
          transmog.conf: |
            Transmog.Enable = 1
            # Per-transmog gold cost (copper). 0 = free.
            Transmog.CostFee = 0
            # Multiplier on item-quality-based cost (1.0 = no extra cost).
            Transmog.CostMultiplier = 1.0
            # Token-gated transmog (0 = disabled, no token required).
            Transmog.TokenRequired = 0
            Transmog.TokenEntry = 0
            Transmog.TokenAmount = 1
      barber-config:
        data:
          barber.conf: |
            Barber.Enable = 1
      trainingdummies-config:
        data:
          trainingdummies.conf: |
            Trainingdummies.Enable = 1
      achievements-config:
        data:
          achievements.conf: |
            Achievements.Enable = 1
            # Chat broadcast when an achievement is earned (1 = on).
            Achievements.SendMessage = 1
            # Send special packets for the client-side "Achiever" addon (1 = on).
            Achievements.SendAddon = 1
            # Visual sparkle effect on the player when earning achievement (1 = on).
            Achievements.SendVisual = 1
            # Spell ID for the visual effect.
            Achievements.EffectId = 146
            # Award achievements to random bots (0 = off — bots clutter realm-first leaderboards).
            Achievements.RandomBots = 0
            Achievements.RandomBotsRealmFirst = 0
            # Sync earned achievements across all characters of an account (0 = per-character).
            Achievements.AccountAchievements = 0
      ahbot-config:
        data:
          ahbot.conf: |
            AuctionHouseBot.Seller.Enabled = 1
            AuctionHouseBot.Buyer.Enabled = 1
            AuctionHouseBot.Chance.Sell = 80
            AuctionHouseBot.Chance.Buy = 40
            AuctionHouseBot.Alliance.Items.Amount.Ratio = 100
            AuctionHouseBot.Horde.Items.Amount.Ratio = 100
            AuctionHouseBot.Neutral.Items.Amount.Ratio = 80
            AuctionHouseBot.Buy.Value = 90
            AuctionHouseBot.Bid.Min = 60
            AuctionHouseBot.Bid.Max = 95
            AuctionHouseBot.Time.Min = 2
            AuctionHouseBot.Time.Max = 48
            AuctionHouseBot.Value.Variance = 15
            AuctionHouseBot.Items.Profession = 90, 100, 0, 60
            AuctionHouseBot.Loot.Creature.Normal = 40, 50, 8, 15
            AuctionHouseBot.Loot.Creature.Elite = 35, 40, 2, 4
            AuctionHouseBot.Loot.Creature.Rare = 5, 15, 1, 2
            AuctionHouseBot.Loot.Disenchant = 15, 20, 1, 3
            AuctionHouseBot.Loot.Fishing = 5, 10, 30, 50
            AuctionHouseBot.Loot.Gameobject = 20, 25, 7, 15
            AuctionHouseBot.Loot.Skinning = 5, 10, 50, 80
    persistence:
      data:
        existingClaim: cmangos-data
        advancedMounts:
          mangosd:
            app:
              - path: /var/lib/mangos
                readOnly: true
      cores:
        existingClaim: cmangos-cores
        advancedMounts:
          mangosd:
            app:
              # Mount as a sibling of /opt/mangos/etc so that mangosd's
              # default config lookups (../etc/X.conf for aiplayerbot,
              # ahbot, twinkmaster) keep resolving when we chdir here
              # for core-dump capture.
              - path: /opt/mangos/cores
            cores-pruner:
              - path: /opt/mangos/cores
      mangosd-config:
        type: configMap
        name: cmangos-mangosd-config
        advancedMounts:
          mangosd:
            app:
