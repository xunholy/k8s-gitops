---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: game-servers-rules
  namespace: game-servers
spec:
  groups:
    # ─── Availability ───────────────────────────────────────────────────────
    - name: game-servers.availability
      interval: 1m
      rules:
        - alert: GameServerDown
          expr: |
            kube_deployment_status_replicas_available{
              namespace="game-servers",
              deployment=~"cmangos-mangosd|cmangos-realmd|cmangos-database|azerothcore-worldserver|azerothcore-authserver|azerothcore-database|emberstone-portal"
            } == 0
          for: 2m
          labels:
            severity: critical
            team: game-servers
          annotations:
            summary: "{{ $labels.deployment }} is down (no ready replicas)"
            description: |
              Deployment `{{ $labels.deployment }}` in namespace `{{ $labels.namespace }}` has had zero
              ready replicas for at least 2 minutes. Players cannot connect.

        - alert: GameServerDegraded
          expr: |
            (
              kube_deployment_status_replicas{
                namespace="game-servers",
                deployment=~"cmangos-.*|azerothcore-.*|emberstone-portal"
              } -
              kube_deployment_status_replicas_available{
                namespace="game-servers",
                deployment=~"cmangos-.*|azerothcore-.*|emberstone-portal"
              }
            ) > 0
          for: 10m
          labels:
            severity: warning
            team: game-servers
          annotations:
            summary: "{{ $labels.deployment }} degraded ({{ $value }} replicas missing)"
            description: |
              Deployment `{{ $labels.deployment }}` has had fewer ready replicas than desired for
              10+ minutes. Service may still be reachable but is in a degraded state.

    # ─── Crash-loop detection ───────────────────────────────────────────────
    # Multiple thresholds to catch both fast loops (every 30s) and slow
    # loops (every few minutes). The slow-loop case is what slipped through
    # on 2026-05-02 when mangosd was segfaulting every ~6 min on a single
    # corrupt player record — too sparse for [15m]>5 to fire, too transient
    # for KubePodCrashLooping to settle.
    - name: game-servers.crashloop
      interval: 1m
      rules:
        - alert: GameServerCrashLooping
          expr: |
            increase(kube_pod_container_status_restarts_total{
              namespace="game-servers"
            }[15m]) >= 3
          for: 5m
          labels:
            severity: critical
            team: game-servers
          annotations:
            summary: "{{ $labels.pod }} restarted {{ $value }} times in the last 15 min"
            description: |
              Pod `{{ $labels.pod }}` in namespace `{{ $labels.namespace }}` is crash-looping
              ({{ $value }} restarts in 15 minutes). Likely application bug or unhealthy
              dependency; check `kubectl logs --previous` and `kubectl describe pod`.

        - alert: GameServerRecentRestarts
          # Slow but persistent restart pattern — catches anything restarting
          # >= 3 times per hour, which a 6-min crash cycle hits easily.
          expr: |
            increase(kube_pod_container_status_restarts_total{
              namespace="game-servers"
            }[1h]) >= 3
          for: 10m
          labels:
            severity: warning
            team: game-servers
          annotations:
            summary: "{{ $labels.pod }} has restarted {{ $value }} times in the last hour"
            description: |
              Pod `{{ $labels.pod }}` is restarting at a rate of >= 3/hour. Could be a
              slow crash loop (e.g., one specific event triggers a segfault that takes
              minutes to recur). Examine `kubectl logs --previous` for the exit cause.

        - alert: GameServerSegfault
          # Container exited via signal (exit code 137=SIGKILL, 139=SIGSEGV).
          # 139 specifically means the process crashed at the binary level.
          expr: |
            kube_pod_container_status_last_terminated_exitcode{
              namespace="game-servers"
            } == 139
          for: 1m
          labels:
            severity: critical
            team: game-servers
          annotations:
            summary: "{{ $labels.pod }} segfaulted (exit code 139)"
            description: |
              Pod `{{ $labels.pod }}` in `{{ $labels.namespace }}` exited via SIGSEGV.
              Likely indicates a binary-level bug or corrupt input data. Check
              `kubectl logs --previous` for the stack trace and any preceding errors.

    # ─── DB resource saturation ─────────────────────────────────────────────
    # Catches the class of incident from 2026-05-21: a single in-game
    # `.lookup creature %X%` query pinned cmangos-database at a full core for
    # 17 minutes, blocking the mangosd world tick while everything stayed
    # "Running" and no other alert fired. Until mysqld-exporter is deployed
    # this CPU proxy is the cheapest signal — fires on anything that pegs
    # the DB (runaway query, schema migration, vacuum, etc.) regardless of
    # cause.
    - name: game-servers.resources
      interval: 1m
      rules:
        - alert: GameServerDBCPUSaturated
          expr: |
            sum by (namespace, pod) (
              rate(container_cpu_usage_seconds_total{
                namespace="game-servers",
                pod=~"cmangos-database-.*|azerothcore-database-.*",
                container!="",
                container!="POD"
              }[5m])
            ) > 0.9
          for: 10m
          labels:
            severity: warning
            team: game-servers
          annotations:
            summary: "{{ $labels.pod }} pinned at {{ $value | humanize }} CPU cores"
            description: |
              Database pod `{{ $labels.pod }}` has sustained > 0.9 CPU cores for
              10+ minutes. Normal idle is ~50m. Most likely a runaway query (e.g.
              an in-game `.lookup` against a populated world DB) blocking the
              world tick. Check `SHOW FULL PROCESSLIST` on the pod and KILL any
              query with `Time` > 60s, then investigate where it was issued.

    # ─── Storage health (the class of bug that took us down today) ──────────
    - name: game-servers.storage
      interval: 1m
      rules:
        - alert: GameServerVolumeReadOnly
          expr: |
            node_filesystem_readonly{
              mountpoint=~"/var/lib/kubelet/pods/.*",
              fstype!~"tmpfs|overlay|nsfs"
            } == 1
          for: 1m
          labels:
            severity: critical
            team: game-servers
          annotations:
            summary: "A pod volume on {{ $labels.instance }} is mounted read-only"
            description: |
              Filesystem `{{ $labels.mountpoint }}` on `{{ $labels.instance }}` is read-only.
              Usually triggered by `errors=remount-ro` after underlying I/O errors (Ceph RBD
              session loss, disk failure). Pods using this volume will be unable to write —
              **force-recreate the pod** to remap the volume after underlying storage recovers.

        - alert: GameServerPVCNearFull
          expr: |
            (
              kubelet_volume_stats_available_bytes{namespace="game-servers"}
              /
              kubelet_volume_stats_capacity_bytes{namespace="game-servers"}
            ) < 0.10
          for: 15m
          labels:
            severity: warning
            team: game-servers
          annotations:
            summary: "PVC {{ $labels.persistentvolumeclaim }} is {{ $value | humanizePercentage }} free"
            description: |
              Game-server PVC is below 10% free space. Expand the PVC or clean up data
              before writes start failing.
