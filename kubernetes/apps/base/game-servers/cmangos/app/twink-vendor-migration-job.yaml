    -- Store original prices for potential rollback
    CREATE TABLE IF NOT EXISTS `custom_twinkmaster_original_prices` (
      `entry` int(11) unsigned NOT NULL,
      `original_buy_price` int(11) unsigned NOT NULL DEFAULT 0,
      `original_sell_price` int(11) unsigned NOT NULL DEFAULT 0,
      PRIMARY KEY (`entry`)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8 COLLATE=utf8_bin COMMENT='Backup of original item prices before Twink Master zeroed them';

