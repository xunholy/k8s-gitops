apiVersion: batch/v1
kind: Job
metadata:
  name: cmangos-twink-vendor-migration
  namespace: game-servers
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-db
          image: busybox:latest
          command: ['sh', '-c', 'until nc -z cmangos-database 3306; do echo "Waiting for database..."; sleep 2; done']
      containers:
        - name: migrate
          image: mariadb:11.8
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "=== Applying Twink Master schema to classiccharacters ==="
              mariadb -h cmangos-database -P 3306 -u mangos -pmangos classiccharacters < /sql/characters.sql
              echo "=== Characters schema applied successfully ==="

              echo "=== Applying Twink Master data to classicmangos ==="
              mariadb -h cmangos-database -P 3306 -u mangos -pmangos classicmangos < /sql/world.sql
              echo "=== World data applied successfully ==="

              echo "=== Verifying characters table ==="
              mariadb -h cmangos-database -P 3306 -u mangos -pmangos classiccharacters -e "SHOW TABLES LIKE 'custom_twinkmaster%';"

              echo "=== Verifying Twink Master NPC ==="
              mariadb -h cmangos-database -P 3306 -u mangos -pmangos classicmangos -e "SELECT entry, name, subname, NpcFlags FROM creature_template WHERE entry = 190012;"

              echo "=== Verifying creature spawns ==="
              mariadb -h cmangos-database -P 3306 -u mangos -pmangos classicmangos -e "SELECT COUNT(*) AS spawn_count FROM creature WHERE id = 190012;"

              echo "=== Verifying vendor items (should be 77) ==="
              mariadb -h cmangos-database -P 3306 -u mangos -pmangos classicmangos -e "SELECT COUNT(*) AS vendor_item_count FROM npc_vendor WHERE entry = 190012;"

              echo "=== Validating all vendor item IDs exist in item_template ==="
              mariadb -h cmangos-database -P 3306 -u mangos -pmangos classicmangos -e "
                SELECT nv.item AS missing_item_id
                FROM npc_vendor nv
                LEFT JOIN item_template it ON nv.item = it.entry
                WHERE nv.entry = 190012 AND it.entry IS NULL;
              "

              echo "=== Listing vendor items with names ==="
              mariadb -h cmangos-database -P 3306 -u mangos -pmangos classicmangos -e "
                SELECT nv.item, it.name, it.Quality, it.RequiredLevel, it.BuyPrice
                FROM npc_vendor nv
                JOIN item_template it ON nv.item = it.entry
                WHERE nv.entry = 190012
                ORDER BY it.class, it.subclass, it.name;
              "

              echo "=== Twink Master vendor migration complete ==="
          volumeMounts:
            - name: sql-scripts
              mountPath: /sql
      volumes:
        - name: sql-scripts
          configMap:
            name: cmangos-twink-vendor-migration-sql
