---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cmangos-twink-vendor-migration-sql
  namespace: game-servers
data:
  characters.sql: |
    CREATE TABLE IF NOT EXISTS `custom_twinkmaster_player_config` (
      `guid` int(11) unsigned NOT NULL COMMENT 'Character GUID',
      `xp_locked` boolean DEFAULT FALSE COMMENT 'Whether XP gain is blocked',
      `level_set` boolean DEFAULT FALSE COMMENT 'Whether level was set by Twink Master',
      `created_at` datetime DEFAULT CURRENT_TIMESTAMP,
      PRIMARY KEY (`guid`)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8 COLLATE=utf8_bin COMMENT='Twink Master player configuration';
  world.sql: |
    -- ============================================================
    -- Twink Master NPC - Level 19 BiS Vendor
    -- Entry: 190012
    -- ============================================================

    SET @Entry := 190012;

    -- NPC Template
    DELETE FROM `creature_template` WHERE `entry` = @Entry;
    INSERT INTO `creature_template` (`entry`, `DisplayId1`, `DisplayIdProbability1`, `name`, `subname`, `GossipMenuId`, `minlevel`, `maxlevel`, `faction`, `NpcFlags`, `scale`, `rank`, `DamageSchool`, `MeleeBaseAttackTime`, `RangedBaseAttackTime`, `unitClass`, `unitFlags`, `CreatureType`, `CreatureTypeFlags`, `lootid`, `PickpocketLootId`, `SkinningLootId`, `AIName`, `MovementType`, `RacialLeader`, `RegenerateStats`, `MechanicImmuneMask`, `ExtraFlags`) VALUES
    (@Entry, 3455, 100, 'Twink Master', 'Level 19 Specialist', 0, 19, 19, 35, 4, 1, 0, 0, 2000, 0, 1, 0, 7, 138936390, 0, 0, 0, '', 0, 0, 1, 0, 0);

    -- Spawns: Stormwind Trade District + Orgrimmar Valley of Honor
    DELETE FROM `creature` WHERE `id` = @Entry;
    INSERT INTO `creature` (`id`, `map`, `spawnMask`, `position_x`, `position_y`, `position_z`, `orientation`, `spawntimesecsmin`, `spawntimesecsmax`, `spawndist`, `MovementType`) VALUES
    (@Entry, 0, 1, -8830.0, 665.0, 97.9, 0.65, 25, 25, 0, 0),
    (@Entry, 1, 1, 1917.5, -4184.8, 43.5, 3.14, 25, 25, 0, 0);

    -- NPC Text (for Phase 2 gossip integration)
    SET @TEXT_ID := 50920;
    DELETE FROM `npc_text` WHERE `ID` BETWEEN @TEXT_ID AND @TEXT_ID+2;
    INSERT INTO `npc_text` (`ID`, `text0_0`) VALUES
    (@TEXT_ID,   'Welcome, $N! Looking to gear up for the battleground? I have everything a level 19 champion needs. Browse my wares - everything is on the house!'),
    (@TEXT_ID+1, 'Ready to lock in at level 19? I can set your level and lock your experience so you stay in peak form for Warsong Gulch.'),
    (@TEXT_ID+2, 'Only the finest equipment for aspiring twinks. May your battles be glorious, $N!');

    -- ============================================================
    -- Vendor Items: Free (BuyPrice = 0)
    -- ============================================================

    -- Make all vendor items free by setting BuyPrice to 0
    -- Store original prices for potential rollback
    DROP TABLE IF EXISTS `custom_twinkmaster_original_prices`;
    CREATE TABLE `custom_twinkmaster_original_prices` (
      `entry` int(11) unsigned NOT NULL,
      `original_buy_price` int(11) unsigned NOT NULL DEFAULT 0,
      `original_sell_price` int(11) unsigned NOT NULL DEFAULT 0,
      PRIMARY KEY (`entry`)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8 COLLATE=utf8_bin COMMENT='Backup of original item prices before Twink Master zeroed them';

    INSERT IGNORE INTO `custom_twinkmaster_original_prices` (`entry`, `original_buy_price`, `original_sell_price`)
    SELECT `entry`, `BuyPrice`, `SellPrice` FROM `item_template`
    WHERE `entry` IN (
      -- Weapons
      1482, 5191, 6448, 6469, 7230, 890, 6472, 6504, 6505,
      -- Armor
      2059, 10399, 5404, 5443, 12997, 1121, 4385, 6087, 6467, 6468,
      -- Accessories
      4381,
      -- Consumables
      2459, 3388, 2454, 2455, 929, 3390, 3389, 6373, 1478,
      -- Ammo
      2515, 2519, 8068,
      -- Bandages
      2581, 3531
    );

    UPDATE `item_template` SET `BuyPrice` = 0, `SellPrice` = 0
    WHERE `entry` IN (
      1482, 5191, 6448, 6469, 7230, 890, 6472, 6504, 6505,
      2059, 10399, 5404, 5443, 12997, 1121, 4385, 6087, 6467, 6468,
      4381,
      2459, 3388, 2454, 2455, 929, 3390, 3389, 6373, 1478,
      2515, 2519, 8068,
      2581, 3531
    );

    -- ============================================================
    -- NPC Vendor Inventory
    -- (entry, item, maxcount=0 unlimited, incrtime=0 instant)
    -- ============================================================
    DELETE FROM `npc_vendor` WHERE `entry` = @Entry;
    INSERT INTO `npc_vendor` (`entry`, `item`, `maxcount`, `incrtime`) VALUES
    -- === WEAPONS ===
    (@Entry, 1482,  0, 0),  -- Shadowfang (1H Sword, BoE)
    (@Entry, 5191,  0, 0),  -- Cruel Barb (1H Sword)
    (@Entry, 6448,  0, 0),  -- Tail Spike (Dagger)
    (@Entry, 6469,  0, 0),  -- Venomstrike (Bow)
    (@Entry, 7230,  0, 0),  -- Smite's Mighty Hammer (2H Mace)
    (@Entry, 890,   0, 0),  -- Twisted Chanter's Staff (Staff)
    (@Entry, 6472,  0, 0),  -- Stinging Viper (1H Mace)
    (@Entry, 6504,  0, 0),  -- Wingblade (1H Sword)
    (@Entry, 6505,  0, 0),  -- Crescent Staff (Staff)
    -- === ARMOR ===
    (@Entry, 2059,  0, 0),  -- Sentry Cloak (Back)
    (@Entry, 10399, 0, 0),  -- Blackened Defias Armor (Leather Chest)
    (@Entry, 5404,  0, 0),  -- Serpent's Shoulders (Leather Shoulders)
    (@Entry, 5443,  0, 0),  -- Gold-plated Buckler (Shield)
    (@Entry, 12997, 0, 0),  -- Redbeard Crest (Shield)
    (@Entry, 1121,  0, 0),  -- Feet of the Lynx (Leather Feet)
    (@Entry, 4385,  0, 0),  -- Green Tinted Goggles (Leather Head)
    (@Entry, 6087,  0, 0),  -- Chausses of Westfall (Mail Legs)
    (@Entry, 6467,  0, 0),  -- Deviate Scale Gloves (Leather Gloves)
    (@Entry, 6468,  0, 0),  -- Deviate Scale Belt (Leather Waist)
    -- === ACCESSORIES ===
    (@Entry, 4381,  0, 0),  -- Minor Recombobulator (Trinket)
    -- === CONSUMABLES ===
    (@Entry, 2459,  0, 0),  -- Swiftness Potion
    (@Entry, 3388,  0, 0),  -- Strong Troll's Blood Potion
    (@Entry, 2454,  0, 0),  -- Elixir of Lion's Strength
    (@Entry, 2455,  0, 0),  -- Minor Mana Potion
    (@Entry, 929,   0, 0),  -- Healing Potion
    (@Entry, 3390,  0, 0),  -- Elixir of Lesser Agility
    (@Entry, 3389,  0, 0),  -- Elixir of Defense
    (@Entry, 6373,  0, 0),  -- Elixir of Firepower
    (@Entry, 1478,  0, 0),  -- Scroll of Protection II
    -- === AMMO ===
    (@Entry, 2515,  0, 0),  -- Sharp Arrow
    (@Entry, 2519,  0, 0),  -- Heavy Shot
    (@Entry, 8068,  0, 0),  -- Crafted Heavy Shot
    -- === BANDAGES ===
    (@Entry, 2581,  0, 0),  -- Heavy Linen Bandage
    (@Entry, 3531,  0, 0);  -- Heavy Wool Bandage
---
apiVersion: batch/v1
kind: Job
metadata:
  name: cmangos-twink-vendor-migration
  namespace: game-servers
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-db
          image: busybox:latest
          command: ['sh', '-c', 'until nc -z cmangos-database 3306; do echo "Waiting for database..."; sleep 2; done']
      containers:
        - name: migrate
          image: mariadb:11.8
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "=== Applying Twink Master schema to classiccharacters ==="
              mariadb -h cmangos-database -P 3306 -u mangos -pmangos classiccharacters < /sql/characters.sql
              echo "=== Characters schema applied successfully ==="

              echo "=== Applying Twink Master data to classicmangos ==="
              mariadb -h cmangos-database -P 3306 -u mangos -pmangos classicmangos < /sql/world.sql
              echo "=== World data applied successfully ==="

              echo "=== Verifying characters table ==="
              mariadb -h cmangos-database -P 3306 -u mangos -pmangos classiccharacters -e "SHOW TABLES LIKE 'custom_twinkmaster%';"

              echo "=== Verifying Twink Master NPC ==="
              mariadb -h cmangos-database -P 3306 -u mangos -pmangos classicmangos -e "SELECT entry, name, subname, NpcFlags FROM creature_template WHERE entry = 190012;"

              echo "=== Verifying creature spawns ==="
              mariadb -h cmangos-database -P 3306 -u mangos -pmangos classicmangos -e "SELECT COUNT(*) AS spawn_count FROM creature WHERE id = 190012;"

              echo "=== Verifying vendor items (should be 34) ==="
              mariadb -h cmangos-database -P 3306 -u mangos -pmangos classicmangos -e "SELECT COUNT(*) AS vendor_item_count FROM npc_vendor WHERE entry = 190012;"

              echo "=== Validating all vendor item IDs exist in item_template ==="
              mariadb -h cmangos-database -P 3306 -u mangos -pmangos classicmangos -e "
                SELECT nv.item AS missing_item_id
                FROM npc_vendor nv
                LEFT JOIN item_template it ON nv.item = it.entry
                WHERE nv.entry = 190012 AND it.entry IS NULL;
              "

              echo "=== Listing vendor items with names ==="
              mariadb -h cmangos-database -P 3306 -u mangos -pmangos classicmangos -e "
                SELECT nv.item, it.name, it.Quality, it.RequiredLevel, it.BuyPrice
                FROM npc_vendor nv
                JOIN item_template it ON nv.item = it.entry
                WHERE nv.entry = 190012
                ORDER BY it.class, it.subclass, it.name;
              "

              echo "=== Twink Master vendor migration complete ==="
          volumeMounts:
            - name: sql-scripts
              mountPath: /sql
      volumes:
        - name: sql-scripts
          configMap:
            name: cmangos-twink-vendor-migration-sql
