apiVersion: v1
kind: ConfigMap
metadata:
  name: cmangos-twink-vendor-migration-sql
  namespace: game-servers
data:
  characters.sql: |
    CREATE TABLE IF NOT EXISTS `custom_twinkmaster_player_config` (
      `guid` int(11) unsigned NOT NULL COMMENT 'Character GUID',
      `xp_locked` boolean DEFAULT FALSE COMMENT 'Whether XP gain is blocked',
      `level_set` boolean DEFAULT FALSE COMMENT 'Whether level was set by Twink Master',
      `created_at` datetime DEFAULT CURRENT_TIMESTAMP,
      PRIMARY KEY (`guid`)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8 COLLATE=utf8_bin COMMENT='Twink Master player configuration';
  world.sql: |
    -- ============================================================
    -- Twink Master NPC - Level 19 Multi-Vendor
    -- Alliance: 190012 | Horde: 190013
    -- Categories: 1=BiS Gear, 2=Consumables, 3=Honor Gear, 4=Insane
    -- ============================================================

    SET @AllianceEntry := 190012;
    SET @HordeEntry := 190013;

    -- NPC Templates: Alliance (Stormwind faction) + Horde (Orgrimmar faction)
    DELETE FROM `creature_template` WHERE `entry` IN (@AllianceEntry, @HordeEntry);
    INSERT INTO `creature_template` (`entry`, `DisplayId1`, `DisplayIdProbability1`, `name`, `subname`, `GossipMenuId`, `minlevel`, `maxlevel`, `faction`, `NpcFlags`, `scale`, `rank`, `DamageSchool`, `MeleeBaseAttackTime`, `RangedBaseAttackTime`, `unitClass`, `unitFlags`, `CreatureType`, `CreatureTypeFlags`, `ScriptName`, `lootid`, `PickpocketLootId`, `SkinningLootId`, `AIName`, `MovementType`, `RacialLeader`, `RegenerateStats`, `MechanicImmuneMask`, `ExtraFlags`) VALUES
    (@AllianceEntry, 3455, 100, 'Twink Master', 'Level 19 Specialist', 0, 19, 19, 12, 5, 1, 0, 0, 2000, 0, 1, 0, 7, 138936390, 'npc_twinkmaster', 0, 0, 0, '', 0, 0, 1, 0, 0),
    (@HordeEntry,    1374, 100, 'Twink Master', 'Level 19 Specialist', 0, 19, 19, 85, 5, 1, 0, 0, 2000, 0, 1, 0, 7, 138936390, 'npc_twinkmaster', 0, 0, 0, '', 0, 0, 1, 0, 0);

    -- Spawns: Stormwind Trade District (Alliance) + Orgrimmar WSG area (Horde)
    DELETE FROM `creature` WHERE `id` IN (@AllianceEntry, @HordeEntry);
    INSERT INTO `creature` (`id`, `map`, `spawnMask`, `position_x`, `position_y`, `position_z`, `orientation`, `spawntimesecsmin`, `spawntimesecsmax`, `spawndist`, `MovementType`) VALUES
    (@AllianceEntry, 0, 1, -8830.0, 665.0, 97.9, 0.65, 25, 25, 0, 0),
    (@HordeEntry,    1, 1, 1986.0, -4785.0, 55.82, 4.26, 25, 25, 0, 0);

    -- NPC Text
    SET @TEXT_ID := 50920;
    DELETE FROM `npc_text` WHERE `ID` BETWEEN @TEXT_ID AND @TEXT_ID+2;
    INSERT INTO `npc_text` (`ID`, `text0_0`) VALUES
    (@TEXT_ID,   'Welcome, $N! Looking to gear up for the battleground? I have everything a level 19 champion needs. Browse my wares - everything is on the house!'),
    (@TEXT_ID+1, 'Ready to lock in at level 19? I can set your level and lock your experience so you stay in peak form for Warsong Gulch.'),
    (@TEXT_ID+2, 'Only the finest equipment for aspiring twinks. May your battles be glorious, $N!');

