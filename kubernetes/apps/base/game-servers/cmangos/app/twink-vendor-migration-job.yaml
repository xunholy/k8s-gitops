    -- ============================================================
    -- Restore original prices if previously zeroed, then drop backup
    -- ============================================================
    UPDATE `item_template` it
    JOIN `custom_twinkmaster_original_prices` op ON it.`entry` = op.`entry`
    SET it.`BuyPrice` = op.`original_buy_price`, it.`SellPrice` = op.`original_sell_price`
    WHERE it.`BuyPrice` = 0 AND op.`original_buy_price` > 0;
    DROP TABLE IF EXISTS `custom_twinkmaster_original_prices`;

    -- ============================================================
    -- NPC Vendor Inventory (for standard vendor fallback only;
    -- category vendor uses custom SMSG_LIST_INVENTORY with price=0)
    -- ============================================================
    DELETE FROM `npc_vendor` WHERE `entry` IN (@AllianceEntry, @HordeEntry);

    INSERT INTO `npc_vendor` (`entry`, `item`, `maxcount`, `incrtime`)
    SELECT @AllianceEntry, `item`, 0, 0 FROM `custom_twinkmaster_vendor_categories`
    UNION ALL
    SELECT @HordeEntry, `item`, 0, 0 FROM `custom_twinkmaster_vendor_categories`;
---
apiVersion: batch/v1
kind: Job
metadata:
  name: cmangos-twink-vendor-migration
  namespace: game-servers
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-db
          image: busybox:latest
          command: ['sh', '-c', 'until nc -z cmangos-database 3306; do echo "Waiting for database..."; sleep 2; done']
      containers:
        - name: migrate
          image: mariadb:12.2
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "=== Applying Twink Master schema to classiccharacters ==="
              mariadb -h cmangos-database -P 3306 -u mangos -pmangos classiccharacters < /sql/characters.sql
              echo "=== Characters schema applied successfully ==="

              echo "=== Applying Twink Master data to classicmangos ==="
              mariadb -h cmangos-database -P 3306 -u mangos -pmangos classicmangos < /sql/world.sql
              echo "=== World data applied successfully ==="

              echo "=== Verifying characters table ==="
              mariadb -h cmangos-database -P 3306 -u mangos -pmangos classiccharacters -e "SHOW TABLES LIKE 'custom_twinkmaster%';"

              echo "=== Verifying Twink Master NPCs ==="
              mariadb -h cmangos-database -P 3306 -u mangos -pmangos classicmangos -e "SELECT entry, name, subname, faction, NpcFlags FROM creature_template WHERE entry IN (190012, 190013);"

              echo "=== Verifying creature spawns ==="
              mariadb -h cmangos-database -P 3306 -u mangos -pmangos classicmangos -e "SELECT id, map, position_x, position_y, position_z FROM creature WHERE id IN (190012, 190013);"

              echo "=== Verifying vendor items per entry ==="
              mariadb -h cmangos-database -P 3306 -u mangos -pmangos classicmangos -e "SELECT entry, COUNT(*) AS vendor_item_count FROM npc_vendor WHERE entry IN (190012, 190013) GROUP BY entry;"

              echo "=== Verifying vendor categories ==="
              mariadb -h cmangos-database -P 3306 -u mangos -pmangos classicmangos -e "
                SELECT
                  CASE categories
                    WHEN 1 THEN 'BiS Gear'
                    WHEN 2 THEN 'Consumables'
                    WHEN 3 THEN 'Honor Gear'
                    WHEN 4 THEN 'Insane'
                  END AS category,
                  COUNT(*) AS item_count
                FROM custom_twinkmaster_vendor_categories
                GROUP BY categories
                ORDER BY categories;
              "

              echo "=== Validating all vendor item IDs exist in item_template ==="
              mariadb -h cmangos-database -P 3306 -u mangos -pmangos classicmangos -e "
                SELECT nv.entry, nv.item AS missing_item_id
                FROM npc_vendor nv
                LEFT JOIN item_template it ON nv.item = it.entry
                WHERE nv.entry IN (190012, 190013) AND it.entry IS NULL;
              "

              echo "=== Twink Master vendor migration complete ==="
          volumeMounts:
            - name: sql-scripts
              mountPath: /sql
      volumes:
        - name: sql-scripts
          configMap:
            name: cmangos-twink-vendor-migration-sql
