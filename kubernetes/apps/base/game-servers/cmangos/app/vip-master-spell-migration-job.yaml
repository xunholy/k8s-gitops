---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cmangos-vip-master-spell-migration-sql
  namespace: game-servers
data:
  vip-master-spell.sql: |
    -- VIP master spell migration: cleanup + existing-VIP swap.
    --
    -- We use vanilla spell 18282 'Dummy Spell' as the master (already
    -- Effect1=SPELL_EFFECT_DUMMY in vanilla spell_template, exists in
    -- the client's Spell.dbc, zero references in item/trainer/chain
    -- tables). VipModule::OnCast hooks the cast and fires the cascade.
    -- No INSERT/UPDATE on spell_template needed.
    --
    -- This script:
    --   1) DELETEs the obsolete custom spell row 91200 we tried first
    --      (vanilla 1.12 clients couldn't display it).
    --   2) UPDATEs character_spell to swap 22888 (the v2 hot-fix master)
    --      with 18282 for any existing VIPs. Rallying Cry of the
    --      Dragonslayer is not legitimately learnable in vanilla — anyone
    --      with it as a known spell got it from `.vip grant`, so the
    --      swap is safe.
    --
    -- Canonical SQL: etc/emberstone/sql/world/vip-master-spell.sql in
    -- xunholy/cmangos-classic. Keep in sync.
    --
    -- Idempotent on both statements.

    DELETE FROM `classicmangos`.`spell_template` WHERE `Id` = 91200;
    UPDATE `classiccharacters`.`character_spell` SET `spell` = 18282 WHERE `spell` = 22888;
---
apiVersion: batch/v1
kind: Job
metadata:
  name: cmangos-vip-master-spell-migration
  namespace: game-servers
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-db
          image: busybox:latest
          command: ['sh', '-c', 'until nc -z cmangos-database 3306; do echo "Waiting for database..."; sleep 2; done']
      containers:
        - name: migrate
          image: mariadb:12.2
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "=== Cleanup obsolete spell 91200 + swap existing VIPs 22888 → 18282 ==="
              mariadb -h cmangos-database -P 3306 -u mangos -pmangos < /sql/vip-master-spell.sql
              echo "=== Verify cleanup ==="
              mariadb -h cmangos-database -P 3306 -u mangos -pmangos classicmangos -e "SELECT COUNT(*) AS spell_91200_rows FROM spell_template WHERE Id = 91200;"
              echo "=== Verify VIP migration ==="
              mariadb -h cmangos-database -P 3306 -u mangos -pmangos classiccharacters -e "SELECT spell, COUNT(*) AS chars FROM character_spell WHERE spell IN (22888, 18282) GROUP BY spell;"
              echo "=== Done. Restart mangosd so the new Vip.MasterSpellId from the ConfigMap takes effect ==="
          volumeMounts:
            - name: sql-scripts
              mountPath: /sql
      volumes:
        - name: sql-scripts
          configMap:
            name: cmangos-vip-master-spell-migration-sql
