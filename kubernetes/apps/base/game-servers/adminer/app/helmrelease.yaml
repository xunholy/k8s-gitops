---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: adminer
  namespace: game-servers
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      app:
        containers:
          app:
            image:
              repository: adminer
              tag: "5"
            env:
              TZ: ${CLUSTER_TIMEZONE}
              # Default server pre-filled in the login form so an admin
              # only has to enter user + password.
              ADMINER_DEFAULT_SERVER: cmangos-database.game-servers.svc.cluster.local
              # No design preference; the dark theme is easier on the eyes
              # when staring at item_template at 2am.
              ADMINER_DESIGN: pepa-linha-dark
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8080
                  periodSeconds: 30
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness: *probe
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8080
                  periodSeconds: 5
                  timeoutSeconds: 3
                  failureThreshold: 30
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
    defaultPodOptions:
      securityContext:
        # adminer:5 image USER is "adminer" (UID 8 from adduser -u 8).
        # Numeric so the kubelet can verify non-root.
        runAsUser: 8
        runAsGroup: 8
        runAsNonRoot: true
        seccompProfile: { type: RuntimeDefault }
    service:
      app:
        controller: app
        ports:
          http:
            port: 8080
