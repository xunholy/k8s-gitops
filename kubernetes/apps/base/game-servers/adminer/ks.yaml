---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: adminer
  namespace: game-servers
  labels:
    gitops.owncloud.ai/defaults: disabled
spec:
  decryption:
    provider: sops
  interval: 30m
  retryInterval: 1m
  timeout: 10m
  path: "./apps/base/game-servers/adminer/app"
  prune: true
  wait: true
  sourceRef:
    kind: ExternalArtifact
    name: adminer
    namespace: flux-system
  # No dependsOn on cmangos — DB is now in cmangos-database, and
  # adminer is a stateless DB client that retries connections on its
  # own. Keeping it reconcilable when the world server is broken.
  targetNamespace: game-servers
