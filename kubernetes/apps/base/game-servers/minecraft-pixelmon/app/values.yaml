image:
  repository: itzg/minecraft-bedrock-server
  tag: latest
minecraftServer:
  serverName: Wildfire Pixelmon Server
  levelName: Pixelmon
  serverPort: 19138
  eula: "TRUE"
  version: LATEST
  difficulty: normal
  maxPlayers: 10
  gameMode: survival
  playerIdleTimeout: 10
  cheats: true
  enableLanVisibility: true
  defaultPermission: operator
  serviceType: LoadBalancer
  onlineMode: false
  texturepackRequired: true
extraEnv:
  SERVER_PORT_V6: "19139"
initContainers:
  - name: install-pokedrock
    image: alpine:latest
    securityContext:
      runAsUser: 0
      runAsNonRoot: false
    command:
      - /bin/sh
      - -c
      - |
        set -e
        apk add --no-cache curl unzip jq

        ADDON_URL="https://edge.forgecdn.net/files/7358/835/SERPpokedrock.mcaddon"
        DATA_DIR="/data"
        LEVEL_NAME="Pixelmon"

        # Skip if already installed
        if [ -f "$DATA_DIR/.serp-pokedrock-v1.29.1" ]; then
          echo "SERP Pokedrock v1.29.1 already installed, skipping..."
          exit 0
        fi

        # Download the addon
        echo "Downloading SERP Pokedrock addon..."
        curl -L -o /tmp/addon.mcaddon "$ADDON_URL"

        # Extract (mcaddon is a renamed zip)
        echo "Extracting addon..."
        mkdir -p /tmp/addon
        unzip -o /tmp/addon.mcaddon -d /tmp/addon

        # Extract any nested zip/mcpack files within the addon
        find /tmp/addon -name "*.zip" -o -name "*.mcpack" | while IFS= read -r nested; do
          echo "Extracting nested archive: $(basename "$nested")"
          NESTED_DIR="/tmp/addon/$(basename "$nested" | sed 's/\.[^.]*$//')"
          mkdir -p "$NESTED_DIR"
          unzip -o "$nested" -d "$NESTED_DIR"
          rm "$nested"
        done

        # Initialize pack activation files
        echo "[]" > /tmp/bp.json
        echo "[]" > /tmp/rp.json

        # Process each manifest.json to find behavior and resource packs
        find /tmp/addon -name "manifest.json" -type f | while IFS= read -r manifest; do
          PACK_DIR="$(dirname "$manifest")"
          PACK_TYPE="$(jq -r '.modules[0].type' "$manifest")"
          PACK_UUID="$(jq -r '.header.uuid' "$manifest")"
          PACK_VERSION="$(jq -c '.header.version' "$manifest")"
          PACK_NAME="$(basename "$PACK_DIR")"

          echo "Found pack: $PACK_NAME (type: $PACK_TYPE, uuid: $PACK_UUID)"

          if [ "$PACK_TYPE" = "data" ] || [ "$PACK_TYPE" = "script" ]; then
            echo "Installing behavior pack: $PACK_NAME"
            mkdir -p "$DATA_DIR/behavior_packs"
            cp -r "$PACK_DIR" "$DATA_DIR/behavior_packs/$PACK_NAME"
            jq --arg uuid "$PACK_UUID" --argjson ver "$PACK_VERSION" \
              '. + [{"pack_id": $uuid, "version": $ver}]' /tmp/bp.json > /tmp/bp_new.json
            mv /tmp/bp_new.json /tmp/bp.json
          elif [ "$PACK_TYPE" = "resources" ]; then
            echo "Installing resource pack: $PACK_NAME"
            mkdir -p "$DATA_DIR/resource_packs"
            cp -r "$PACK_DIR" "$DATA_DIR/resource_packs/$PACK_NAME"
            jq --arg uuid "$PACK_UUID" --argjson ver "$PACK_VERSION" \
              '. + [{"pack_id": $uuid, "version": $ver}]' /tmp/rp.json > /tmp/rp_new.json
            mv /tmp/rp_new.json /tmp/rp.json
          fi
        done

        # Activate packs for the world
        mkdir -p "$DATA_DIR/worlds/$LEVEL_NAME"
        cp /tmp/bp.json "$DATA_DIR/worlds/$LEVEL_NAME/world_behavior_packs.json"
        cp /tmp/rp.json "$DATA_DIR/worlds/$LEVEL_NAME/world_resource_packs.json"

        echo "=== Installed behavior packs ==="
        cat "$DATA_DIR/worlds/$LEVEL_NAME/world_behavior_packs.json"
        echo "=== Installed resource packs ==="
        cat "$DATA_DIR/worlds/$LEVEL_NAME/world_resource_packs.json"

        # Mark as installed
        touch "$DATA_DIR/.serp-pokedrock-v1.29.1"
        echo "SERP Pokedrock addon installation complete!"
    volumeMounts:
      - name: datadir
        mountPath: /data
startupProbe:
  enabled: true
  failureThreshold: 60
  periodSeconds: 10
livenessProbe:
  initialDelaySeconds: 60
readinessProbe:
  initialDelaySeconds: 60
persistence:
  dataDir:
    enabled: true
    existingClaim: minecraft-pixelmon-ceph
