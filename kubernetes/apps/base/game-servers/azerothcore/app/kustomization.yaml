---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - helmrelease.yaml
  - pvc-database.yaml
  - pvc-client-data.yaml
  - tcproutes.yaml
  - dnsendpoint.yaml
  - replicationsource.yaml
  - volsync-externalsecret.yaml
  - realm-config-job.yaml

# Hash-suffixed CM. realmlist.sql edits change the suffix, which changes
# the Job's volume reference, which (with kustomize.toolkit.fluxcd.io/force)
# triggers a Job re-run. No more manual resource-name bumps.
# NOTE: namespace must match the Job's namespace or kustomize won't
# auto-rewrite references.
configMapGenerator:
  - name: azerothcore-realmlist-sql
    namespace: game-servers
    files:
      - realmlist.sql
