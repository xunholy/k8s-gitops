---
apiVersion: v1
kind: ConfigMap
metadata:
  name: azerothcore-realm-rename-emberstone-sql
  namespace: game-servers
data:
  realmlist.sql: |
    UPDATE realmlist
    SET name = 'Emberstone',
        address = '${EXTERNAL_IP}',
        port = 3726,
        gamebuild = 12340
    WHERE id = 1;
    SELECT id, name, address, port, gamebuild FROM realmlist WHERE id = 1;
---
apiVersion: batch/v1
kind: Job
metadata:
  name: azerothcore-realm-rename-emberstone
  namespace: game-servers
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-db
          image: busybox:latest
          command: ['sh', '-c', 'until nc -z azerothcore-database 3306; do echo "Waiting for database..."; sleep 2; done']
      containers:
        - name: migrate
          image: mysql:9.6
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "=== Updating realm address and name for Emberstone ==="
              mysql -h azerothcore-database -P 3306 -u root -ppassword acore_auth < /sql/realmlist.sql
              echo "=== Realm rename complete ==="
          volumeMounts:
            - name: sql-scripts
              mountPath: /sql
      volumes:
        - name: sql-scripts
          configMap:
            name: azerothcore-realm-rename-emberstone-sql
