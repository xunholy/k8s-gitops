---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mediamtx
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: mediamtx-secret
    template:
      data:
        # Index order MUST match authInternalUsers in the mediamtx.yml ConfigMap:
        # 0=friend1, 1=friend2, 2=director.
        MTX_AUTHINTERNALUSERS_0_PASS: "{{ .FRIEND1_PASSWORD }}"
        MTX_AUTHINTERNALUSERS_1_PASS: "{{ .FRIEND2_PASSWORD }}"
        MTX_AUTHINTERNALUSERS_2_PASS: "{{ .DIRECTOR_PASSWORD }}"
  dataFrom:
    - extract:
        key: mediamtx
