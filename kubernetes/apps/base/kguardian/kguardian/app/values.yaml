---
controller:
  image:
    tag: "v1.8.1"
    sha: "sha256:c122ee55e35cbc6df9e507d691641f5968b13cd07bec94ba87283ea431d8e358"
  excludedNamespaces:
    - kguardian

broker:
  image:
    # v1.9.1 — /health checks schema state so kubelet self-heals on DB wipe
    # (kguardian-dev/kguardian#876). Validated end-to-end against this cluster.
    tag: "v1.9.1"
    sha: "sha256:65261cdfa672c7ad61044e4fe58d945cc5b422dd64de6341aa23c46fd555570e"
  resources:
    limits:
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 512Mi

frontend:
  image:
    tag: "v1.9.0"
    sha: "sha256:32bb6300f51f0bdc3040d6bfa524c8ad56ecd27feb76fb28f9e46dcda7eede83"

llmBridge:
  enabled: true
  image:
    tag: "v1.2.3"
    sha: "sha256:333aa8e252dcea145975d094408a7ab1e4abaedd5ac39e617bdf1cc5894a8437"
  secrets:
    openai:
      enabled: true
      name: "kguardian-secrets"

# kguardian-evaluator — audit-mode policy preview (chart 1.11.0+).
# Watches AuditNetworkPolicy / AuditClusterNetworkPolicy CRDs and reports
# flows that *would* be denied (and that are explicitly allowed) without
# blocking traffic. Surfaces in the frontend's "Audit" panel.
evaluator:
  image:
    # v0.2.1 — informer-goroutine leak fix on cache-sync failure
    # (kguardian-dev/kguardian#872).
    tag: "v0.2.1"
    sha: "sha256:a0f07a2f70586a9ea8e0d423f35a875af7258bb6fcd2dc690677eb35c81507df"

database:
  # Pin postgres image — `latest` drifts and PG major-version bumps break the on-disk format
  image:
    tag: "18.1"
    sha: "sha256:1090bc3a8ccfb0b55f78a494d76f8d603434f7e4553543d6e807bc7bd6bbd17f"
  # Persistent storage so the DB survives pod restarts (chart default is emptyDir → wipes on every recreate)
  persistence:
    enabled: true
    existingClaim: kguardian-db
  # Sized to observed load: postgres uses 2.0–2.8 cores under autovacuum + ingest pressure
  resources:
    limits:
      memory: 1Gi
    requests:
      cpu: "2"
      memory: 512Mi

mcpServer:
  enabled: false
  useKmcp: false
  image:
    tag: "v1.3.2"
    sha: "sha256:1ca186593b1948ec5a237f8f863047bea56880d73015b35576ec45a27b51a604"
