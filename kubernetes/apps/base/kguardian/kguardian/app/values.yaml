  excludedNamespaces:
    - kguardian

broker:
  image:
    tag: "v1.7.0"
    sha: "sha256:26866620ba01362bdfd777c698b5385088721be899327d9e77a8c0e4322322a3"
  resources:
    limits:
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 512Mi

frontend:
  image:
    tag: "v1.7.1"
    sha: "sha256:d5a679d4d83c3a2bccc970c39401cd81e9775177bb400585053713152b2e4ca2"

llmBridge:
  enabled: true
  image:
    tag: "v1.2.2"
    sha: "sha256:aba33d013bdf273d553aa781c4b66ed8159a438206e07c829aeb6c027c1b0918"
  secrets:
    openai:
      enabled: true
      name: "kguardian-secrets"

database:
  # Pin postgres image — `latest` drifts and PG major-version bumps break the on-disk format
  image:
    tag: "18.1"
    sha: "sha256:1090bc3a8ccfb0b55f78a494d76f8d603434f7e4553543d6e807bc7bd6bbd17f"
  # Persistent storage so the DB survives pod restarts (chart default is emptyDir → wipes on every recreate)
  persistence:
    enabled: true
    existingClaim: kguardian-db
  # Sized to observed load: postgres uses 2.0–2.8 cores under autovacuum + ingest pressure
  resources:
    limits:
      memory: 1Gi
    requests:
      cpu: "2"
      memory: 512Mi

mcpServer:
  enabled: false
  useKmcp: false
  image:
    tag: "v1.3.2"
    sha: "sha256:1ca186593b1948ec5a237f8f863047bea56880d73015b35576ec45a27b51a604"
