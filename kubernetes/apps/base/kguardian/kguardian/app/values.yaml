---
controller:
  image:
    # Released pin: controller v1.9.0 (massive-uplift release, PR #888).
    tag: "v1.9.0"
    sha: "sha256:9bbe80ad6c97a37fcee4b914c34c8570185c0c8f2b5d0000f23387d0c55f6526"
  excludedNamespaces:
    - kguardian

broker:
  # Both of the next two now MATCH the chart 1.12.0 defaults (kept explicit
  # for clarity, not because an override is required):
  # - dbPoolMaxSize 32 keeps headroom over audit.inflightPermits (16) so
  #   audit evals can't starve /health + inserts (liveness-flap guard).
  dbPoolMaxSize: 32
  # - NetworkPolicy left disabled: this cluster's controller is a
  #   hostNetwork eBPF DaemonSet, so Cilium sees its traffic as node
  #   identity. Enabling the (now hostNetwork-aware) NP would require
  #   listing the node CIDRs via broker.networkPolicy.allowedNodeCIDRs.
  networkPolicy:
    enabled: false
  image:
    # Released pin: broker v1.10.0 (massive-uplift release, PR #888).
    tag: "v1.10.0"
    sha: "sha256:fe0f13267a34c9b173cc3160c561cf75c61591486525cfcb18f1e8f7b53db927"
  resources:
    limits:
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 1Gi

frontend:
  image:
    # Released pin: frontend v1.10.0 (massive-uplift release, PR #888).
    tag: "v1.10.0"
    sha: "sha256:af44cd471c6260e8b34a01b11a23a773028c69041769ed1067ca37b5cc3ecd64"

llmBridge:
  enabled: true
  image:
    # Released pin: llm-bridge v1.3.0 (massive-uplift release, PR #888).
    tag: "v1.3.0"
    sha: "sha256:d6387861404240a791fe537baca8397083104732c2427bd1e961bfbfbd9c813a"
  secrets:
    openai:
      enabled: true
      name: "kguardian-secrets"

# kguardian-evaluator — audit-mode policy preview (chart 1.11.0+).
# Watches AuditNetworkPolicy / AuditClusterNetworkPolicy CRDs and reports
# flows that *would* be denied (and that are explicitly allowed) without
# blocking traffic. Surfaces in the frontend's "Audit" panel.
evaluator:
  image:
    # Released pin: evaluator v0.3.0 (massive-uplift release, PR #888).
    tag: "v0.3.0"
    sha: "sha256:ba79dc7b3b4018e17f18d0fb49984bdca77a6522412c98ab14f2656d3b00015f"

database:
  # Pin postgres image — `latest` drifts and PG major-version bumps break the on-disk format
  image:
    tag: "18.1"
    sha: "sha256:1090bc3a8ccfb0b55f78a494d76f8d603434f7e4553543d6e807bc7bd6bbd17f"
  # Persistent storage so the DB survives pod restarts (chart default is emptyDir → wipes on every recreate)
  persistence:
    enabled: true
    existingClaim: kguardian-db
  # Sized to observed load: postgres uses 2.0–2.8 cores under autovacuum + ingest pressure
  resources:
    limits:
      memory: 1Gi
    requests:
      cpu: "2"
      memory: 512Mi

mcpServer:
  enabled: false
  useKmcp: false
  image:
    tag: "v1.3.2"
    sha: "sha256:1ca186593b1948ec5a237f8f863047bea56880d73015b35576ec45a27b51a604"
