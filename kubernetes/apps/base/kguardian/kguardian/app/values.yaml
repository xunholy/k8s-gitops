---
controller:
  image:
    # TEMP pr-888 validation pin (PR #888 / massive-uplift). Revert to the
    # released v1.8.2 + its digest after validating.
    tag: "pr-888"
    sha: "sha256:6adce012c0fd1fea936a7e89aa6dc25200895da3b468780233050caf7f63fefe"
  excludedNamespaces:
    - kguardian

broker:
  # PR #888 validation finding: the chart's new default-on broker
  # NetworkPolicy used a podSelector to admit the controller, but the
  # controller is a hostNetwork eBPF DaemonSet — Cilium sees its traffic
  # as node identity, not the pod label, so the policy blocked it and
  # stalled the controller rollout (HelmRelease UpgradeFailed). Disabled
  # here until the chart's hostNetwork-aware fix (allowedNodeCIDRs) lands.
  networkPolicy:
    enabled: false
  image:
    # TEMP pr-888 validation pin (PR #888 / massive-uplift). Revert to the
    # released v1.9.1 + its digest after validating.
    tag: "pr-888"
    sha: "sha256:29b29a99e751a666933dd251992a35b8df9174eb5428aea6aaf49e50ff32c27a"
  resources:
    limits:
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 512Mi

frontend:
  image:
    # TEMP pr-888 validation pin (PR #888). Revert to v1.9.0 + digest after.
    tag: "pr-888"
    sha: "sha256:b5e5dc75f27908fb46af8ecee6226b003b76e2a976a895f7dfcf49ec9276194f"

llmBridge:
  enabled: true
  image:
    # TEMP pr-888 validation pin (PR #888). Revert to v1.2.3 + digest after.
    tag: "pr-888"
    sha: "sha256:2e52c462f602549f24a155523eb0b4fe5eebea5832f8686151c08f1032646cab"
  secrets:
    openai:
      enabled: true
      name: "kguardian-secrets"

# kguardian-evaluator — audit-mode policy preview (chart 1.11.0+).
# Watches AuditNetworkPolicy / AuditClusterNetworkPolicy CRDs and reports
# flows that *would* be denied (and that are explicitly allowed) without
# blocking traffic. Surfaces in the frontend's "Audit" panel.
evaluator:
  image:
    # TEMP pr-888 validation pin (PR #888 / massive-uplift). Revert to the
    # released v0.2.2 + its digest after validating.
    tag: "pr-888"
    sha: "sha256:13d37e59ddc30ae29d0b89175157c57d2364c193ec09866409b3ff7280c25b5f"

database:
  # Pin postgres image — `latest` drifts and PG major-version bumps break the on-disk format
  image:
    tag: "18.1"
    sha: "sha256:1090bc3a8ccfb0b55f78a494d76f8d603434f7e4553543d6e807bc7bd6bbd17f"
  # Persistent storage so the DB survives pod restarts (chart default is emptyDir → wipes on every recreate)
  persistence:
    enabled: true
    existingClaim: kguardian-db
  # Sized to observed load: postgres uses 2.0–2.8 cores under autovacuum + ingest pressure
  resources:
    limits:
      memory: 1Gi
    requests:
      cpu: "2"
      memory: 512Mi

mcpServer:
  enabled: false
  useKmcp: false
  image:
    tag: "v1.3.2"
    sha: "sha256:1ca186593b1948ec5a237f8f863047bea56880d73015b35576ec45a27b51a604"
