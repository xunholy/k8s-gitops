---
controller:
  image:
    # Released pin: controller v1.9.1.
    tag: "v1.9.1"
    sha: "sha256:e3c0c9864c2f98757caecda6aee5b12a50a468b8c48c1e571104fdc1481b0c32"
  excludedNamespaces:
    - kguardian

broker:
  # Both of the next two now MATCH the chart 1.12.0 defaults (kept explicit
  # for clarity, not because an override is required):
  # - dbPoolMaxSize 32 keeps headroom over audit.inflightPermits (16) so
  #   audit evals can't starve /health + inserts (liveness-flap guard).
  dbPoolMaxSize: 32
  # - NetworkPolicy left disabled: this cluster's controller is a
  #   hostNetwork eBPF DaemonSet, so Cilium sees its traffic as node
  #   identity. Enabling the (now hostNetwork-aware) NP would require
  #   listing the node CIDRs via broker.networkPolicy.allowedNodeCIDRs.
  networkPolicy:
    enabled: false
  image:
    # Released pin: broker v1.12.2 — semver build-metadata fix (#1126: Flux's
    # "+sha" chart revision no longer false-positives update_available or
    # fragments telemetry version grouping).
    tag: "v1.12.2"
    sha: "sha256:cac7af0367629961eb50a718e5205efc030ecb0123306a8fc8d644a37a803907"
  resources:
    limits:
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 1Gi

frontend:
  image:
    # Released pin: frontend v1.11.1 (connection resilience fixes).
    tag: "v1.11.1"
    sha: "sha256:7fc8ad596421b922b39c8bc25edf8fe9adb638f0ab2fbda7ef5d39280cdfd147"

llmBridge:
  enabled: true
  image:
    # Released pin: llm-bridge v1.4.1 (streaming hardening #1039: SSE
    # keepalive, abort-aware tool rounds, 429/529 mapping).
    tag: "v1.4.2"
    sha: "sha256:b7b2f94881a9d096f989b69b7f3754766a1d9ed3080b5a8bec3b7ebd407157ea"
  secrets:
    openai:
      enabled: true
      name: "kguardian-secrets"

# kguardian-evaluator — audit-mode policy preview (chart 1.11.0+).
# Watches AuditNetworkPolicy / AuditClusterNetworkPolicy CRDs and reports
# flows that *would* be denied (and that are explicitly allowed) without
# blocking traffic. Surfaces in the frontend's "Audit" panel.
evaluator:
  image:
    # Released pin: evaluator v0.3.2.
    tag: "v0.3.2"
    sha: "sha256:a499ed57a50e45f78fdfa600be62bfbe9536055a3ab250bb11bd0abafb312350"

database:
  # Pin postgres image — `latest` drifts and PG major-version bumps break the on-disk format
  image:
    tag: "18.1"
    sha: "sha256:1090bc3a8ccfb0b55f78a494d76f8d603434f7e4553543d6e807bc7bd6bbd17f"
  # Persistent storage so the DB survives pod restarts (chart default is emptyDir → wipes on every recreate)
  persistence:
    enabled: true
    existingClaim: kguardian-db
  # Sized to observed load: postgres uses 2.0–2.8 cores under autovacuum + ingest pressure
  resources:
    limits:
      memory: 1Gi
    requests:
      cpu: "2"
      memory: 512Mi

mcpServer:
  # Enabled 2026-07-08: the llm-bridge is hard-wired to MCP_SERVER_URL=
  # kguardian-mcp-server:8081 with no static tool fallback, so the AI
  # assistant's entire tool path was non-functional while this was false.
  # Service name matches the llm-bridge target; BROKER_URL is auto-derived.
  # (advisor.enabled=false, so the 3 generate_* tools have no backend yet;
  # the 8 broker-backed tools incl. get_cluster_traffic work.)
  enabled: true
  image:
    # Released pin: mcp-server v1.5.0 (data-coverage + generation tools, PR #996).
    tag: "v1.5.1"
    sha: "sha256:6ef5b184ce724e901e4710861ff03865204c948ad353e4db59145c6a1345b419"
