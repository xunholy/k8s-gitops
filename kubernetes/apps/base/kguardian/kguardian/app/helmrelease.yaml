---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app kguardian
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: kguardian
  valuesFrom:
    - kind: ConfigMap
      name: kguardian-values
  # Patch the database Deployment to use Recreate. Chart up to 1.11.0
  # ships RollingUpdate, which deadlocks on a singleton RWO PVC during
  # upgrade — the new pod blocks in ContainerCreating waiting for an
  # attach the old pod still holds. Drop this once the chart >= 1.11.1
  # is in use; the patch becomes a no-op at that point.
  #
  # Strategic-merge with $patch: replace because Kubernetes rejects a
  # Deployment carrying both strategy.type=Recreate and strategy.rollingUpdate;
  # the cluster's existing object has rollingUpdate populated by k8s
  # defaults, so a plain merge leaves it behind and the API server
  # 422s. Replace forces the whole strategy block to be rewritten.
  postRenderers:
    - kustomize:
        patches:
          - target:
              version: v1
              kind: Deployment
              name: kguardian-db
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: kguardian-db
              spec:
                strategy:
                  $patch: replace
                  type: Recreate
