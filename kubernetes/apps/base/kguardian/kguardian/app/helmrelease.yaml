---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app kguardian
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: kguardian
  valuesFrom:
    - kind: ConfigMap
      name: kguardian-values
  # Patch the database Deployment to use Recreate. Chart up to 1.11.0
  # ships RollingUpdate, which deadlocks on a singleton RWO PVC during
  # upgrade — the new pod blocks in ContainerCreating waiting for an
  # attach the old pod still holds. Drop this once the chart >= 1.11.1
  # is in use; the patch becomes a no-op at that point.
  postRenderers:
    - kustomize:
        patches:
          - target:
              version: v1
              kind: Deployment
              name: kguardian-db
            patch: |
              - op: add
                path: /spec/strategy
                value:
                  type: Recreate
