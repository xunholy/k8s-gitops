---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: kguardian
spec:
  interval: 5m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    # Released chart: kguardian 1.12.0 (massive-uplift release, PR #888) —
    # ships the broker pool/retention/index hardening, hostNetwork-aware
    # opt-in NetworkPolicy, and load-tolerant probes.
    tag: 1.12.0
  url: oci://ghcr.io/kguardian-dev/charts/kguardian
