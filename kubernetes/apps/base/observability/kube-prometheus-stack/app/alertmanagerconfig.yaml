---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/alertmanagerconfig_v1alpha1.json
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: alertmanager
spec:
  route:
    receiver: email
    groupBy:
      - namespace
      - alertname
      - job
    groupWait: 24h
    groupInterval: 1h
    repeatInterval: 24h
    routes:
      # Drop Watchdog and InfoInhibitor — these are internal signals
      - receiver: "null"
        matchers:
          - name: alertname
            matchType: "=~"
            value: "InfoInhibitor|Watchdog"
        continue: false
      # Drop maintenance-signal alerts — their only purpose is to be the
      # source side of inhibit rules. Never email these.
      - receiver: "null"
        matchers:
          - name: alertname
            matchType: "=~"
            value: "NodeUnderMaintenance|FluxReconciliationInProgress"
        continue: false
      # Drop etcd alerts that are noisy on Talos single-node etcd restarts
      - receiver: "null"
        matchers:
          - name: alertname
            matchType: "=~"
            value: "etcdHighNumberOfLeaderChanges|etcdMembersDown|etcdInsufficientMembers|etcdHighNumberOfFailedGRPCRequests|etcdHighCommitDurations"
          - name: severity
            matchType: "!="
            value: critical
        continue: false
      # Drop Ceph PG alerts that are already muted/acknowledged in Ceph itself
      - receiver: "null"
        matchers:
          - name: alertname
            matchType: "=~"
            value: "CephPGsDamaged|CephOSDScrubErrors"
        continue: false
      # Storage / disk degradation — FAST PATH. A read-only volume (Ceph RBD
      # remount-ro or ext4 emergency_ro) or a filling/erroring PV means an app is
      # SILENTLY failing writes while still "Running". You must hear about this in
      # seconds, not the 24h the generic critical route below used to impose —
      # that delay (plus the emergency_ro detection gap, now fixed in #4143) is why
      # a critical service sat read-only for ~7 days unnoticed (2026-07). First
      # email in 30s, reminders every 1h while firing, RESOLVED email on clear.
      - receiver: email
        matchers:
          - name: alertname
            matchType: "=~"
            value: "KubeVolumeReadOnly|KubeVolumeEmergencyReadOnly|KubeVolumeEmergencyReadOnlyCollectorStale|KubePersistentVolumeFillingUp|KubePersistentVolumeInodesFillingUp|KubePersistentVolumeErrors|CephOSDDown|CephOSDNearFull|CephOSDCriticallyFull|CephClusterNearFull|CephClusterCriticallyFull|CephClusterErrorState|CephMonQuorumLost|CephMonQuorumAtRisk|CephMgrIsAbsent|CephFilesystemReadOnly"
        groupBy:
          - alertname
          - namespace
        groupWait: 30s
        groupInterval: 5m
        repeatInterval: 1h
        continue: false
      # Game-servers (WoW) — fast path. First email within 30s of any new
      # alert in the namespace; subsequent alerts in the same group batched
      # 5min apart; reminders only every 12h while still firing (and one
      # final RESOLVED email when it clears, via sendResolved).
      # Grouping by namespace + severity bundles related alerts into one
      # email — e.g. all `critical game-servers` alerts arrive together
      # rather than one email per alertname.
      - receiver: email
        matchers:
          - name: namespace
            matchType: "="
            value: game-servers
          - name: severity
            matchType: "=~"
            value: critical|warning
        groupBy:
          - namespace
          - severity
        groupWait: 30s
        groupInterval: 5m
        repeatInterval: 12h
        continue: false
      # Critical alerts — notify FAST. "critical" means something is broken NOW;
      # the old 24h groupWait meant real outages went unnoticed for a full day.
      # First email in 60s, batched 5m, reminders every 4h while still firing.
      - receiver: email
        matchers:
          - name: severity
            matchType: "="
            value: critical
        groupWait: 60s
        groupInterval: 5m
        repeatInterval: 4h
        continue: false
      # Warning alerts — only notify if sustained beyond 24h
      - receiver: email
        matchers:
          - name: severity
            matchType: "="
            value: warning
        groupWait: 24h
        repeatInterval: 24h
        continue: false
  receivers:
    - name: "null"
    - name: email
      emailConfigs:
        - to: "${PRIVATE_EMAIL}"
          from: "noreply@${CLUSTER_DOMAIN}"
          smarthost: "smtp-relay.home-system.svc.cluster.local:25"
          requireTLS: false
          sendResolved: true
          headers:
            - key: From
              value: "Alert Manager <noreply@${CLUSTER_DOMAIN}>"
            - key: Subject
              value: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .GroupLabels.SortedPairs.Values | join " " }}'
  inhibitRules:
    # Critical silences warning/info for the same alert
    - sourceMatch:
        - name: severity
          matchType: "="
          value: critical
      targetMatch:
        - name: severity
          matchType: "=~"
          value: warning|info
      equal:
        - namespace
        - alertname
    # InfoInhibitor silences info
    - sourceMatch:
        - name: alertname
          matchType: "="
          value: InfoInhibitor
      targetMatch:
        - name: severity
          matchType: "="
          value: info
      equal:
        - namespace
    # KubePodCrashLooping inhibits KubePodNotReady for the same pod
    - sourceMatch:
        - name: alertname
          matchType: "="
          value: KubePodCrashLooping
      targetMatch:
        - name: alertname
          matchType: "="
          value: KubePodNotReady
      equal:
        - namespace
        - pod
    # GameServerSegfault is the root cause — silence the downstream
    # restart-pattern alerts for the same pod so we only get one email
    # for one underlying problem.
    - sourceMatch:
        - name: alertname
          matchType: "="
          value: GameServerSegfault
      targetMatch:
        - name: alertname
          matchType: "=~"
          value: "GameServerCrashLooping|GameServerRecentRestarts|KubePodCrashLooping"
      equal:
        - namespace
        - pod
    # GameServerCrashLooping inhibits the slower GameServerRecentRestarts
    # for the same pod (same signal, different windows)
    - sourceMatch:
        - name: alertname
          matchType: "="
          value: GameServerCrashLooping
      targetMatch:
        - name: alertname
          matchType: "="
          value: GameServerRecentRestarts
      equal:
        - namespace
        - pod
    # GameServerDown inhibits GameServerDegraded for the same deployment
    - sourceMatch:
        - name: alertname
          matchType: "="
          value: GameServerDown
      targetMatch:
        - name: alertname
          matchType: "="
          value: GameServerDegraded
      equal:
        - namespace
        - deployment
    # Node-level alerts inhibit pod-level alerts on the same node
    - sourceMatch:
        - name: alertname
          matchType: "=~"
          value: "KubeNodeNotReady|KubeNodeUnreachable"
      targetMatch:
        - name: severity
          matchType: "=~"
          value: warning|info
      equal:
        - node
    # Planned maintenance: a cordoned/draining node suppresses
    # warning/info alerts about pods and targets on that node.
    # Critical alerts still fire — outages during a drain are real.
    - sourceMatch:
        - name: alertname
          matchType: "="
          value: NodeUnderMaintenance
      targetMatch:
        - name: severity
          matchType: "=~"
          value: warning|info
      equal:
        - node
    # In-flight Flux HelmRelease/Kustomization reconciles suppress
    # warning/info alerts in the same workload namespace
    # (KubePodNotReady, KubeDeploymentReplicasMismatch, TargetDown,
    # etc.). Critical alerts still fire.
    - sourceMatch:
        - name: alertname
          matchType: "="
          value: FluxReconciliationInProgress
      targetMatch:
        - name: severity
          matchType: "=~"
          value: warning|info
      equal:
        - namespace
