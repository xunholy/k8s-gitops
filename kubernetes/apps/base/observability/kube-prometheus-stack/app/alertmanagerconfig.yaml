---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/alertmanagerconfig_v1alpha1.json
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: alertmanager
spec:
  route:
    receiver: email
    groupBy:
      - namespace
      - alertname
    groupWait: 1m
    groupInterval: 10m
    repeatInterval: 12h
    routes:
      # Drop Watchdog and InfoInhibitor — these are internal signals
      - receiver: "null"
        matchers:
          - name: alertname
            matchType: "=~"
            value: "InfoInhibitor|Watchdog"
        continue: false
      # Drop etcd alerts that are noisy on Talos single-node etcd restarts
      - receiver: "null"
        matchers:
          - name: alertname
            matchType: "=~"
            value: "etcdHighNumberOfLeaderChanges|etcdMembersDown|etcdInsufficientMembers|etcdHighNumberOfFailedGRPCRequests|etcdHighCommitDurations"
          - name: severity
            matchType: "!="
            value: critical
        continue: false
      # Drop kube-scheduler TargetDown — Talos binds scheduler to 127.0.0.1;
      # fix requires adding bind-address: 0.0.0.0 to Talos scheduler extraArgs
      - receiver: "null"
        matchers:
          - name: alertname
            matchType: "="
            value: TargetDown
          - name: job
            matchType: "="
            value: kube-scheduler
        continue: false
      # Drop Ceph PG alerts that are already muted/acknowledged in Ceph itself
      - receiver: "null"
        matchers:
          - name: alertname
            matchType: "=~"
            value: "CephPGsDamaged|CephOSDScrubErrors"
        continue: false
      # Critical alerts — deliver immediately
      - receiver: email
        matchers:
          - name: severity
            matchType: "="
            value: critical
        groupWait: 30s
        repeatInterval: 4h
        continue: false
      # Warning alerts — batch with longer wait to reduce upgrade noise
      - receiver: email
        matchers:
          - name: severity
            matchType: "="
            value: warning
        groupWait: 5m
        repeatInterval: 12h
        continue: false
  receivers:
    - name: "null"
    - name: email
      emailConfigs:
        - to: "${PRIVATE_EMAIL}"
          from: "noreply@${CLUSTER_DOMAIN}"
          smarthost: "smtp-relay.home-system.svc.cluster.local:25"
          requireTLS: false
          sendResolved: true
          headers:
            - key: From
              value: "Alert Manager <noreply@${CLUSTER_DOMAIN}>"
            - key: Subject
              value: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .GroupLabels.SortedPairs.Values | join " " }}'
  inhibitRules:
    # Critical silences warning/info for the same alert
    - sourceMatch:
        - name: severity
          matchType: "="
          value: critical
      targetMatch:
        - name: severity
          matchType: "=~"
          value: warning|info
      equal:
        - namespace
        - alertname
    # InfoInhibitor silences info
    - sourceMatch:
        - name: alertname
          matchType: "="
          value: InfoInhibitor
      targetMatch:
        - name: severity
          matchType: "="
          value: info
      equal:
        - namespace
    # KubePodCrashLooping inhibits KubePodNotReady for the same pod
    - sourceMatch:
        - name: alertname
          matchType: "="
          value: KubePodCrashLooping
      targetMatch:
        - name: alertname
          matchType: "="
          value: KubePodNotReady
      equal:
        - namespace
        - pod
    # Node-level alerts inhibit pod-level alerts on the same node
    - sourceMatch:
        - name: alertname
          matchType: "=~"
          value: "KubeNodeNotReady|KubeNodeUnreachable"
      targetMatch:
        - name: severity
          matchType: "=~"
          value: warning|info
      equal:
        - node
