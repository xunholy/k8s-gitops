---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/alertmanagerconfig_v1alpha1.json
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: alertmanager
spec:
  route:
    receiver: email
    groupBy:
      - namespace
      - alertname
      - job
    groupWait: 24h
    groupInterval: 1h
    repeatInterval: 24h
    routes:
      # Drop Watchdog and InfoInhibitor — these are internal signals
      - receiver: "null"
        matchers:
          - name: alertname
            matchType: "=~"
            value: "InfoInhibitor|Watchdog"
        continue: false
      # Drop etcd alerts that are noisy on Talos single-node etcd restarts
      - receiver: "null"
        matchers:
          - name: alertname
            matchType: "=~"
            value: "etcdHighNumberOfLeaderChanges|etcdMembersDown|etcdInsufficientMembers|etcdHighNumberOfFailedGRPCRequests|etcdHighCommitDurations"
          - name: severity
            matchType: "!="
            value: critical
        continue: false
      # Drop Ceph PG alerts that are already muted/acknowledged in Ceph itself
      - receiver: "null"
        matchers:
          - name: alertname
            matchType: "=~"
            value: "CephPGsDamaged|CephOSDScrubErrors"
        continue: false
      # Game-servers (WoW) — fast path: notify within 30s, repeat every hour
      # while firing. The default critical/warning routes below have 24h
      # group waits that are unsuitable for player-facing outages.
      - receiver: email
        matchers:
          - name: namespace
            matchType: "="
            value: game-servers
          - name: severity
            matchType: "=~"
            value: critical|warning
        groupWait: 30s
        groupInterval: 5m
        repeatInterval: 1h
        continue: false
      # Critical alerts — only notify if sustained beyond 24h
      - receiver: email
        matchers:
          - name: severity
            matchType: "="
            value: critical
        groupWait: 24h
        repeatInterval: 24h
        continue: false
      # Warning alerts — only notify if sustained beyond 24h
      - receiver: email
        matchers:
          - name: severity
            matchType: "="
            value: warning
        groupWait: 24h
        repeatInterval: 24h
        continue: false
  receivers:
    - name: "null"
    - name: email
      emailConfigs:
        - to: "${PRIVATE_EMAIL}"
          from: "noreply@${CLUSTER_DOMAIN}"
          smarthost: "smtp-relay.home-system.svc.cluster.local:25"
          requireTLS: false
          sendResolved: true
          headers:
            - key: From
              value: "Alert Manager <noreply@${CLUSTER_DOMAIN}>"
            - key: Subject
              value: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .GroupLabels.SortedPairs.Values | join " " }}'
  inhibitRules:
    # Critical silences warning/info for the same alert
    - sourceMatch:
        - name: severity
          matchType: "="
          value: critical
      targetMatch:
        - name: severity
          matchType: "=~"
          value: warning|info
      equal:
        - namespace
        - alertname
    # InfoInhibitor silences info
    - sourceMatch:
        - name: alertname
          matchType: "="
          value: InfoInhibitor
      targetMatch:
        - name: severity
          matchType: "="
          value: info
      equal:
        - namespace
    # KubePodCrashLooping inhibits KubePodNotReady for the same pod
    - sourceMatch:
        - name: alertname
          matchType: "="
          value: KubePodCrashLooping
      targetMatch:
        - name: alertname
          matchType: "="
          value: KubePodNotReady
      equal:
        - namespace
        - pod
    # Node-level alerts inhibit pod-level alerts on the same node
    - sourceMatch:
        - name: alertname
          matchType: "=~"
          value: "KubeNodeNotReady|KubeNodeUnreachable"
      targetMatch:
        - name: severity
          matchType: "=~"
          value: warning|info
      equal:
        - node
