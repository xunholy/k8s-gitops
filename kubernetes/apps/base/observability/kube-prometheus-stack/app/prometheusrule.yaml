---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: node-exporter-filesystem-custom
spec:
  groups:
    # Replaces the upstream NodeFilesystemAlmostOutOfSpace (disabled in the
    # kube-prometheus-stack HelmRelease defaultRules). The bulk media NFS share
    # (/mnt/tank/media on expanse) runs ~96% full as normal operation, so it
    # only alerts at 99% full (<1% free). All other filesystems keep the
    # standard 5% (warning) / 3% (critical) thresholds.
    - name: node-exporter-filesystem.rules
      rules:
        - alert: NodeFilesystemAlmostOutOfSpace
          expr: |-
            (
              node_filesystem_avail_bytes{job="node-exporter",fstype!="",mountpoint!="",mountpoint!="/mnt/tank/media"} / node_filesystem_size_bytes{job="node-exporter",fstype!="",mountpoint!="",mountpoint!="/mnt/tank/media"} * 100 < 5
            and
              node_filesystem_readonly{job="node-exporter",fstype!="",mountpoint!="",mountpoint!="/mnt/tank/media"} == 0
            )
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: Filesystem has less than 5% space left.
            description: Filesystem on {{ $labels.device }}, mounted on {{ $labels.mountpoint }}, at {{ $labels.instance }} has only {{ printf "%.2f" $value }}% available space left.
            runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodefilesystemalmostoutofspace
        - alert: NodeFilesystemAlmostOutOfSpace
          expr: |-
            (
              node_filesystem_avail_bytes{job="node-exporter",fstype!="",mountpoint!="",mountpoint!="/mnt/tank/media"} / node_filesystem_size_bytes{job="node-exporter",fstype!="",mountpoint!="",mountpoint!="/mnt/tank/media"} * 100 < 3
            and
              node_filesystem_readonly{job="node-exporter",fstype!="",mountpoint!="",mountpoint!="/mnt/tank/media"} == 0
            )
          for: 30m
          labels:
            severity: critical
          annotations:
            summary: Filesystem has less than 3% space left.
            description: Filesystem on {{ $labels.device }}, mounted on {{ $labels.mountpoint }}, at {{ $labels.instance }} has only {{ printf "%.2f" $value }}% available space left.
            runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodefilesystemalmostoutofspace
        # Bulk media share: expected to run near-full, only alert at 99% (<1% free)
        - alert: NodeFilesystemAlmostOutOfSpace
          expr: |-
            (
              node_filesystem_avail_bytes{job="node-exporter",fstype!="",mountpoint="/mnt/tank/media"} / node_filesystem_size_bytes{job="node-exporter",fstype!="",mountpoint="/mnt/tank/media"} * 100 < 1
            and
              node_filesystem_readonly{job="node-exporter",fstype!="",mountpoint="/mnt/tank/media"} == 0
            )
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: Filesystem has less than 1% space left.
            description: Filesystem on {{ $labels.device }}, mounted on {{ $labels.mountpoint }}, at {{ $labels.instance }} has only {{ printf "%.2f" $value }}% available space left.
            runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodefilesystemalmostoutofspace
    # Detects PVC volumes remounted read-only (errors=remount-ro after I/O
    # errors — Ceph RBD session loss etc.). REQUIRES the node-exporter
    # mount-points-exclude override (see the HelmRelease) that scrapes
    # /var/lib/kubelet/pods/ — without it node_filesystem_readonly has no series
    # for PVC mounts and this can never fire. Extracts the pod-UID from the
    # mountpoint and joins kube_pod_info to name the affected pod. Replaces the
    # dead, mislabelled game-servers GameServerVolumeReadOnly rule that queried
    # the same (empty) metric. This is what makes read-only remounts page in
    # minutes instead of surfacing days later as "my app broke".
    - name: node-exporter-storage.rules
      rules:
        - alert: KubeVolumeReadOnly
          expr: |-
            label_replace(
              node_filesystem_readonly{job="node-exporter",mountpoint=~"/var/lib/kubelet/pods/.+",fstype!~"tmpfs|overlay|nsfs"} == 1,
              "uid", "$1", "mountpoint", "^/var/lib/kubelet/pods/([^/]+)/.*$"
            ) * on (uid) group_left (namespace, pod) kube_pod_info
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: Read-only volume on pod {{ $labels.namespace }}/{{ $labels.pod }} ({{ $labels.instance }})
            description: |
              A volume mounted by pod `{{ $labels.namespace }}/{{ $labels.pod }}` (node `{{ $labels.instance }}`)
              is mounted READ-ONLY — device `{{ $labels.device }}`, mountpoint `{{ $labels.mountpoint }}`.
              Usually errors=remount-ro after underlying I/O errors (Ceph RBD session loss, disk failure).
              The app cannot write and may be silently broken while still "Running".
              Remediation: once the underlying storage is healthy, force-recreate the pod
              (kubectl delete pod -n {{ $labels.namespace }} {{ $labels.pod }}) to remap the volume read-write.
        # ext4 `emergency_ro` sets the fs read-only after an I/O error but LEAVES the
        # mount flag `rw`, so node_filesystem_readonly (KubeVolumeReadOnly above) is
        # blind to it — this is the variant that hid qui + 5 apps read-only for ~7
        # days (2026-07). The node-exporter emergency-ro sidecar (see the HelmRelease)
        # emits node_filesystem_emergency_ro from the host mount table so this fires.
        - alert: KubeVolumeEmergencyReadOnly
          expr: |-
            label_replace(
              node_filesystem_emergency_ro{mountpoint=~"/var/lib/kubelet/pods/.+"} == 1,
              "uid", "$1", "mountpoint", "^/var/lib/kubelet/pods/([^/]+)/.*$"
            ) * on (uid) group_left (namespace, pod) kube_pod_info
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: Emergency read-only volume on pod {{ $labels.namespace }}/{{ $labels.pod }} ({{ $labels.instance }})
            description: |
              A volume mounted by pod `{{ $labels.namespace }}/{{ $labels.pod }}` (node `{{ $labels.instance }}`)
              has entered ext4 `emergency_ro` — device `{{ $labels.device }}`, mountpoint `{{ $labels.mountpoint }}`.
              The fs went read-only after an I/O error (Ceph RBD watch loss) but the mount flag is still `rw`,
              so KubeVolumeReadOnly cannot see it. The app is silently failing writes while still "Running".
              Remediation: scale the workload to 0 then 1 to remap the RBD read-write
              (a plain pod delete may not clear the cached RO). See project_ceph_rbd_readonly_remount.
        # Guard the detector itself — the whole point is to never be blind again.
        - alert: KubeVolumeEmergencyReadOnlyCollectorStale
          expr: time() - node_filesystem_emergency_ro_last_scan_timestamp_seconds > 300
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: emergency_ro collector stale on {{ $labels.instance }}
            description: |
              The node-exporter emergency-ro sidecar on `{{ $labels.instance }}` has not refreshed
              node_filesystem_emergency_ro for >5m — emergency read-only detection is blind on this node.
              Check the emergency-ro-collector sidecar in the node-exporter pod.
