---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: observability
  labels:
    gitops.owncloud.ai/defaults: disabled
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: kube-prometheus-stack
  valuesFrom:
    - kind: ConfigMap
      name: flux-metrics-configmap
      valuesKey: flux-metrics.yaml
  install:
    timeout: 1h
    replace: true
    crds: CreateReplace
    createNamespace: true
  upgrade:
    remediation:
      remediateLastFailure: true
      retries: 3
      strategy: rollback
    cleanupOnFail: true
    crds: CreateReplace
    force: true
  test:
    enable: true
  rollback:
    recreate: true
    force: true
    cleanupOnFail: true
  uninstall:
    keepHistory: false
  driftDetection:
    mode: enabled
  maxHistory: 3
  dependsOn:
    - name: grafana
      namespace: observability
  timeout: 30m
  values:
    cleanPrometheusOperatorObjectNames: true
    # Disable alerts that produce false positives in Talos/homelab environments
    defaultRules:
      disabled:
        # False positives from short-lived SA tokens on K8s 1.24+
        KubeClientCertificateExpiration: true
        # Extremely noisy — fires on any container with CPU limits under throttle; not actionable in homelab
        CPUThrottlingHigh: true
        # Expected in resource-constrained homelab; not actionable without adding hardware
        KubeMemoryOvercommit: true
        KubeCPUOvercommit: true
        # Replaced with custom rule at 3x threshold (default 1.5x is too sensitive
        # with auto-compaction; fragmentation between defrag cycles is normal)
        etcdDatabaseHighFragmentationRatio: true
        # Replaced with custom rule (prometheusrule.yaml): the bulk media NFS share
        # (/mnt/tank/media) runs ~96% full normally and only alerts at 99%; all
        # other filesystems keep the standard 5%/3% thresholds.
        NodeFilesystemAlmostOutOfSpace: true
      # Extend "for:" durations on upgrade-sensitive alerts to avoid transient noise
      rules:
        kubeProxy: false
    customRules:
      KubePodNotReady:
        for: 30m
      KubePodCrashLooping:
        for: 30m
      KubeContainerWaiting:
        for: 1h
      KubeDeploymentReplicasMismatch:
        for: 30m
      KubeStatefulSetReplicasMismatch:
        for: 30m
      KubeDeploymentRolloutStuck:
        for: 30m
      KubeDaemonSetRolloutStuck:
        for: 30m
      KubeStatefulSetUpdateNotRolledOut:
        for: 30m
      KubeJobFailed:
        for: 1h
      TargetDown:
        for: 15m
      # 15m default fires on transient memory spikes (Kopia backups on TrueNAS,
      # ZFS scrubs, batch I/O). Real pressure outlasts 30m; backups don't.
      NodeMemoryHighUtilization:
        for: 30m
    alertmanager:
      alertmanagerSpec:
        alertmanagerConfiguration:
          name: alertmanager
        externalUrl: https://alertmanager.${CLUSTER_DOMAIN}
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: ceph-block
              resources:
                requests:
                  storage: 1Gi
    grafana:
      enabled: false
      forceDeployDashboards: true
      operator:
        dashboardsConfigMapRefEnabled: true
        folder: observability
        matchLabels:
          grafana.internal/instance: grafana
    prometheus:
      # thanosService:
      #   enabled: true
      # thanosServiceMonitor:
      #   enabled: true
      ## Settings affecting prometheusSpec
      ## ref: https://github.com/prometheus-operator/prometheus-operator/blob/master/Documentation/api.md#prometheusspec
      prometheusSpec:
        priorityClassName: platform-cluster-critical
        # REQUIRED: Cilium Hubble metrics are exposed via OpenMetrics. Prometheus Operator requires the `exemplar-storage` feature to be enabled to scrape OpenMetrics.
        # https://docs.cilium.io/en/stable/observability/metrics/#openmetrics
        # https://prometheus.io/docs/prometheus/latest/feature_flags/#exemplars-storage
        enableFeatures:
          - exemplar-storage
          - memory-snapshot-on-shutdown
        scrapeInterval: 1m
        externalUrl: https://prometheus.${CLUSTER_DOMAIN}
        podAntiAffinity: hard
        ruleSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        scrapeConfigSelectorNilUsesHelmValues: false
        retention: 14d
        retentionSize: 50GB
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: ceph-block
              resources:
                requests:
                  storage: 50Gi
        enableAdminAPI: true
        walCompression: true
        resources:
          requests:
            cpu: 100m
          limits:
            memory: 2000Mi
    additionalPrometheusRulesMap:
      etcd-fragmentation:
        groups:
          - name: etcd-fragmentation
            rules:
              - alert: etcdDatabaseHighFragmentationRatio
                annotations:
                  summary: >-
                    etcd {{ $labels.instance }} DB fragmentation is {{ $value | humanizePercentage }},
                    indicating auto-compaction may not be working or defragmentation is overdue
                expr: |-
                  (last_over_time(etcd_mvcc_db_total_size_in_bytes[5m]) / last_over_time(etcd_mvcc_db_total_size_in_use_in_bytes[5m])) > 3
                for: 30m
                labels:
                  severity: warning
      oom-rules:
        groups:
          - name: oom
            rules:
              - alert: OomKilled
                annotations:
                  summary: >-
                    Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }}
                    has been OOMKilled {{ $value }} times in the last 10 minutes
                expr: |-
                  (kube_pod_container_status_restarts_total - kube_pod_container_status_restarts_total offset 10m >= 1)
                  and ignoring (reason) min_over_time(kube_pod_container_status_last_terminated_reason{reason="OOMKilled"}[10m]) == 1
                labels:
                  severity: critical
      # Maintenance signals — emit a low-severity alert when a node is
      # cordoned/draining or when a Flux HelmRelease/Kustomization is
      # mid-reconcile. These never email (routed to "null" in the
      # AlertmanagerConfig) — their only job is to be the SOURCE side of
      # inhibit rules so warning/info alerts sharing the same node or
      # namespace are suppressed during planned changes. Critical alerts
      # are intentionally NOT inhibited.
      maintenance-signals:
        groups:
          - name: maintenance-signals
            rules:
              - alert: NodeUnderMaintenance
                annotations:
                  summary: >-
                    Node {{ $labels.node }} is cordoned/unschedulable —
                    pod and target alerts on this node are inhibited
                expr: kube_node_spec_unschedulable == 1
                for: 1m
                labels:
                  severity: info
              # label_replace rewrites `namespace` (which is flux-system, where
              # flux-operator runs) to the actual workload namespace, so the
              # inhibit rule can equal on `namespace`.
              - alert: FluxReconciliationInProgress
                annotations:
                  summary: >-
                    Flux {{ $labels.kind }} {{ $labels.exported_namespace }}/{{ $labels.name }}
                    is reconciling ({{ $labels.reason }}) — child alerts in this namespace are inhibited
                expr: |-
                  label_replace(
                    flux_resource_info{kind=~"HelmRelease|Kustomization", ready="Unknown", suspended="False"} == 1,
                    "namespace", "$1", "exported_namespace", "(.+)"
                  )
                for: 1m
                labels:
                  severity: info
    prometheus-node-exporter:
      fullnameOverride: node-exporter
    kube-state-metrics:
      fullnameOverride: kube-state-metrics
      verticalPodAutoscaler:
        enabled: true
      metricLabelsAllowlist:
        - pods=[*]
        - deployments=[*]
        - persistentvolumeclaims=[*]
    # Talos binds scheduler and controller-manager to 0.0.0.0;
    # use kube-apiserver selector since Talos labels differ from upstream
    kubeScheduler:
      service:
        selector:
          component: kube-apiserver
    kubeControllerManager:
      service:
        selector:
          component: kube-apiserver
    # Disable kubeProxy whilst using Cilium as it's not deployed
    kubeProxy:
      enabled: false
    # etcd metrics exposed on http://0.0.0.0:2381 via Talos extraArgs
    kubeEtcd:
      service:
        selector:
          component: kube-apiserver
        port: 2381
        targetPort: 2381
      serviceMonitor:
        scheme: http
        caFile: ""
        certFile: ""
        keyFile: ""
