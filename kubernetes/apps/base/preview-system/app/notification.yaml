---
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Provider
metadata:
  name: github-pr-comment
spec:
  type: githubdispatch
  address: https://github.com/xunholy/k8s-gitops
  secretRef:
    name: github-auth
---
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Alert
metadata:
  name: preview-status
spec:
  providerRef:
    name: github-pr-comment
  eventSeverity: info
  eventSources:
    - kind: Kustomization
      name: "*"
      namespace: preview-pr-*
    - kind: HelmRelease
      name: "*"
      namespace: preview-pr-*
