---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kgateway
  namespace: ai-system
  labels:
    flux-defaults: "true"
spec:
  path: "./apps/base/ai-system/kgateway/app"
  wait: false
  dependsOn:
    - name: kgateway-crds
      namespace: ai-system
  targetNamespace: ai-system
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kgateway-crds
  namespace: ai-system
  labels:
    flux-defaults: "true"
spec:
  path: "./apps/base/ai-system/kgateway/crds"
  wait: false
  targetNamespace: ai-system
