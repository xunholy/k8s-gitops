---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/gateway.envoyproxy.io/clienttrafficpolicy_v1alpha1.json
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: openclaw
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: openclaw
  timeout:
    http:
      # Long stream idle timeout for WebSocket and SSE connections used by OpenClaw
      streamIdleTimeout: "3600s"
  # Force HTTP/1.1 only - OpenClaw uses WebSocket as its primary transport and
  # WebSocket over HTTP/2 (Extended CONNECT / RFC 8441) has a known Envoy bug
  # (envoyproxy/envoy#38645) where only the first stream per connection upgrades
  http1: {}
  tls:
    minVersion: "1.2"
    alpnProtocols:
      - http/1.1
