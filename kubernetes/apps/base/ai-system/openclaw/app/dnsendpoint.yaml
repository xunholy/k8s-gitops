---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: openclaw
  annotations:
    external-dns.alpha.kubernetes.io/external: "true"
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
spec:
  endpoints:
    - dnsName: 'openclaw.${CLUSTER_DOMAIN}'
      recordType: A
      targets:
        - '${CLUSTER_LB_OPENCLAW}'
