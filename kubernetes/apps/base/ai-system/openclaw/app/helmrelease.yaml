---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app openclaw
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 10m
    replace: true
    crds: CreateReplace
    createNamespace: true
  upgrade:
    remediation:
      remediateLastFailure: true
      retries: 3
      strategy: rollback
    cleanupOnFail: true
    crds: CreateReplace
  test:
    enable: true
  rollback:
    recreate: true
    force: true
    cleanupOnFail: true
  uninstall:
    keepHistory: false
  driftDetection:
    mode: enabled
  maxHistory: 3
  values:
    controllers:
      *app :
        initContainers:
          install-proxy:
            image:
              repository: node
              tag: 22-slim
            command: ["/bin/sh"]
            args:
              - "-c"
              - |
                export NPM_CONFIG_PREFIX=/opt/proxy
                npm install -g claude-max-api-proxy@1.0.0 @anthropic-ai/claude-code@2.1.83
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                memory: 1Gi
        containers:
          app:
            image:
              repository: ghcr.io/openclaw/openclaw
              tag: 2026.3.24
            env:
              TZ: Australia/Melbourne
            envFrom:
              - secretRef:
                  name: openclaw-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            probes:
              startup:
                enabled: true
                spec:
                  httpGet:
                    path: /healthz
                    port: http
                  initialDelaySeconds: 5
                  periodSeconds: 5
                  failureThreshold: 30
              readiness:
                enabled: true
                spec:
                  httpGet:
                    path: /healthz
                    port: http
                  periodSeconds: 10
                  failureThreshold: 3
              liveness:
                enabled: true
                spec:
                  httpGet:
                    path: /healthz
                    port: http
                  periodSeconds: 30
                  failureThreshold: 5
            resources:
              requests:
                cpu: 200m
                memory: 1Gi
              limits:
                memory: 4Gi
          claude-max-api:
            image:
              repository: node
              tag: 22-slim
            command: ["/bin/sh"]
            args:
              - "-c"
              - |
                export NPM_CONFIG_PREFIX=/opt/proxy
                export PATH=/opt/proxy/bin:$PATH
                exec node /opt/proxy/lib/node_modules/claude-max-api-proxy/dist/server/standalone.js
            env:
              HOME: /home/node
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            probes:
              startup:
                enabled: true
                spec:
                  httpGet:
                    path: /health
                    port: 3456
                  initialDelaySeconds: 10
                  periodSeconds: 5
                  failureThreshold: 30
              readiness:
                enabled: true
                spec:
                  httpGet:
                    path: /health
                    port: 3456
                  periodSeconds: 10
                  failureThreshold: 3
              liveness:
                enabled: true
                spec:
                  httpGet:
                    path: /health
                    port: 3456
                  periodSeconds: 30
                  failureThreshold: 5
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    service:
      app:
        controller: *app
        ports:
          http:
            port: 18789
    persistence:
      data:
        existingClaim: openclaw-data
        globalMounts:
          - path: /home/node/.openclaw
      config:
        type: configMap
        name: openclaw-config
        globalMounts:
          - path: /home/node/.openclaw/openclaw.json
            subPath: openclaw.json
            readOnly: true
      claude-auth:
        type: secret
        name: openclaw-secret
        items:
          - key: .credentials.json
            path: .credentials.json
        advancedMounts:
          *app :
            claude-max-api:
              - path: /home/node/.claude
                readOnly: true
      proxy-install:
        type: emptyDir
        advancedMounts:
          *app :
            install-proxy:
              - path: /opt/proxy
            claude-max-api:
              - path: /opt/proxy
                readOnly: true
      npm-cache:
        type: emptyDir
        advancedMounts:
          *app :
            install-proxy:
              - path: /home/node/.npm
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
