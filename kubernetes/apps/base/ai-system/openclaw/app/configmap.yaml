---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
data:
  openclaw.json: |
    {
      "gateway": {
        "port": 18789,
        "mode": "local",
        "bind": "lan",
        "auth": {
          "mode": "password"
        },
        "controlUi": {
          "allowedOrigins": ["https://openclaw.${CLUSTER_DOMAIN}"]
        }
      },
      "browser": {
        "enabled": true
      },
      "env": {
        "OPENAI_API_KEY": "not-needed",
        "OPENAI_BASE_URL": "http://localhost:3456/v1"
      },
      "agents": {
        "defaults": {
          "workspace": "/home/node/.openclaw/workspace",
          "model": {
            "primary": "openai/claude-opus-4",
            "fallbacks": [
              "openai/claude-sonnet-4"
            ]
          },
          "userTimezone": "UTC",
          "timeoutSeconds": 600,
          "maxConcurrent": 3
        },
        "list": [
          {
            "id": "main",
            "default": true,
            "identity": {
              "name": "OpenClaw"
            }
          }
        ]
      },
      "session": {
        "scope": "per-sender",
        "store": "/home/node/.openclaw/sessions",
        "reset": {
          "mode": "idle",
          "idleMinutes": 60
        }
      },
      "logging": {
        "level": "info",
        "consoleLevel": "info",
        "consoleStyle": "compact",
        "redactSensitive": "tools"
      },
      "tools": {
        "profile": "full",
        "web": {
          "search": {
            "enabled": false
          },
          "fetch": {
            "enabled": true
          }
        }
      }
    }
