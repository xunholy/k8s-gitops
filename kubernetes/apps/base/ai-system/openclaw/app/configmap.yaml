---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
data:
  openclaw.json: |
    {
      "gateway": {
        "port": 18789,
        "mode": "local",
        "bind": "lan",
        "auth": {
          "mode": "token"
        },
        "trustedProxies": ["10.244.0.0/16"],
        "controlUi": {
          "allowedOrigins": ["https://openclaw.${CLUSTER_DOMAIN}"],
          "allowInsecureAuth": true,
          "dangerouslyDisableDeviceAuth": true
        }
      },
      "browser": {
        "enabled": true
      },
      "agents": {
        "defaults": {
          "workspace": "/home/node/.openclaw/workspace",
          "model": {
            "primary": "openai/claude-opus-4",
            "fallbacks": [
              "openai/claude-sonnet-4"
            ]
          },
          "userTimezone": "UTC",
          "timeoutSeconds": 600,
          "maxConcurrent": 3,
          "contextPruning": {
            "mode": "cache-ttl",
            "ttl": "1h",
            "keepLastAssistants": 3,
            "softTrimRatio": 0.3,
            "hardClearRatio": 0.5
          }
        },
        "list": [
          {
            "id": "main",
            "default": true,
            "identity": {
              "name": "OpenClaw"
            }
          }
        ]
      },
      "session": {
        "scope": "per-sender",
        "store": "/home/node/.openclaw/sessions",
        "reset": {
          "mode": "idle",
          "idleMinutes": 60
        },
        "maintenance": {
          "mode": "enforce",
          "pruneAfter": "30d",
          "maxEntries": 500,
          "rotateBytes": "10mb",
          "maxDiskBytes": "2gb",
          "highWaterBytes": "1.6gb"
        }
      },
      "logging": {
        "level": "info",
        "consoleLevel": "info",
        "consoleStyle": "compact",
        "redactSensitive": "tools"
      },
      "cron": {
        "enabled": true,
        "maxConcurrentRuns": 2,
        "sessionRetention": "24h"
      },
      "tools": {
        "profile": "full",
        "web": {
          "search": {
            "enabled": true,
            "provider": "duckduckgo"
          },
          "fetch": {
            "enabled": true
          }
        }
      }
    }
