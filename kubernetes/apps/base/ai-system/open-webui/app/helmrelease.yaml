---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: open-webui
spec:
  interval: 1h
  chart:
    spec:
      chart: open-webui
      version: 14.8.0
      sourceRef:
        kind: HelmRepository
        name: open-webui-charts
        namespace: flux-system
      interval: 10m
  values:
    ollama:
      enabled: false
    pipelines:
      enabled: false
    websocket:
      enabled: false
    ollamaUrls:
      - "http://ollama.ai-system.svc.cluster.local:11434"
    persistence:
      enabled: true
      storageClass: ceph-block
      size: 8Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 2Gi
