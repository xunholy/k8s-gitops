---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent
  namespace: ai-system
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: kagent
  install:
    timeout: 10m
    replace: true
    crds: CreateReplace
    createNamespace: true
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    remediation:
      remediateLastFailure: true
      retries: 3
      strategy: rollback
    cleanupOnFail: true
    crds: CreateReplace
  test:
    enable: true
  rollback:
    recreate: true
    force: true
    cleanupOnFail: true
  uninstall:
    keepHistory: false
  driftDetection:
    mode: enabled
  maxHistory: 3
  # Upstream kagent charts embed version with SemVer build metadata (+hash)
  # in labels, which Kubernetes rejects. Overwrite with sanitized values.
  postRenderers:
    - kustomize:
        patches:
          - patch: |
              - op: add
                path: /metadata/labels/helm.sh~1chart
                value: kagent
              - op: add
                path: /metadata/labels/app.kubernetes.io~1version
                value: "0.7.19"
            target:
              kind: ".*"
  valuesFrom:
    - kind: ConfigMap
      name: kagent-values
    - kind: Secret
      name: kagent-values-secret
