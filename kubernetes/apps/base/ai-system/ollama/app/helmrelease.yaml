---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ollama
  labels:
    flux-defaults: "true"
spec:
  interval: 1h
  chart:
    spec:
      chart: ollama
      version: 1.54.0
      sourceRef:
        kind: HelmRepository
        name: ollama-charts
        namespace: flux-system
      interval: 10m
  values:
    replicaCount: 1
    ollama:
      gpu:
        enabled: false
      models:
        pull:
          - qwen2.5:3b
    resources:
      requests:
        cpu: 500m
        memory: 4Gi
      limits:
        memory: 8Gi
    persistentVolume:
      enabled: true
      storageClass: ceph-block
      size: 30Gi
