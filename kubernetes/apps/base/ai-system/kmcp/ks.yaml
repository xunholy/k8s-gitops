---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kmcp
  namespace: ai-system
spec:
  path: "./apps/base/ai-system/kmcp/app"
  wait: false
  dependsOn:
    - name: kmcp-crds
      namespace: ai-system
  targetNamespace: ai-system
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kmcp-crds
  namespace: ai-system
spec:
  path: "./apps/base/ai-system/kmcp/crds"
  wait: false
  targetNamespace: ai-system
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
