---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keda
  labels:
    flux-defaults: "true"
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: keda
  values:
    crds:
      install: true
    operator:
      replicaCount: 2
    metricsServer:
      replicaCount: 2
    prometheus:
      metricServer:
        enabled: true
        serviceMonitor:
          enabled: true
      operator:
        enabled: true
        serviceMonitor:
          enabled: true
      webhooks:
        enabled: true
        serviceMonitor:
          enabled: true
