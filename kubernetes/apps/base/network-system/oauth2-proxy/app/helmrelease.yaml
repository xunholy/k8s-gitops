---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app oauth2-proxy
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: oauth2-proxy
  dependsOn:
    - name: dex
      namespace: network-system
    - name: cert-manager
      namespace: network-system
  values:
    # Resilience: 2 stateless replicas (cookie session store), spread one-per-node
    # and guarded by a PDB so a node drain/failure can't drop SSO entirely.
    replicaCount: 2
    podDisruptionBudget:
      enabled: true
      minAvailable: 1
      maxUnavailable: null
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: oauth2-proxy
            app.kubernetes.io/instance: oauth2-proxy
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 128Mi
    metrics:
      servicemonitor:
        enabled: true
    config:
      existingSecret: oauth2-proxy-dex
      configFile: |
        provider = "oidc"
        oidc_issuer_url = "https://dex.${CLUSTER_DOMAIN}"
        auth_logging = true
        cookie_domains = ".${CLUSTER_DOMAIN}"
        cookie_httponly = true
        cookie_name = "_owncloud_oauth"
        cookie_refresh = "1h"
        cookie_samesite = "lax"
        cookie_secure = true
        email_domains = [ "*" ]
        pass_access_token = true
        pass_authorization_header = true
        pass_basic_auth = false
        request_logging = true
        session_store_type = "cookie"
        silence_ping_logging = true
        set_authorization_header = true
        set_xauthrequest = true
        skip_jwt_bearer_tokens = true
        skip_provider_button = true
        ssl_insecure_skip_verify = false
        standard_logging = true
        upstreams = [ "static://200" ]
        whitelist_domains = ".${CLUSTER_DOMAIN}"
