---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: volsync
  namespace: volsync-system
  labels:
    flux-defaults: "true"
spec:
  path: "./apps/base/volsync-system/volsync/app"
  wait: true
  targetNamespace: volsync-system
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: volsync-maintenance
  namespace: volsync-system
  labels:
    flux-defaults: "true"
spec:
  path: "./apps/base/volsync-system/volsync/maintenance"
  wait: true
  targetNamespace: volsync-system
  dependsOn:
    - name: volsync
      namespace: volsync-system
