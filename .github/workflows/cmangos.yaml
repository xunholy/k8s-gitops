---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Build CMaNGOS Classic"

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - .github/workflows/cmangos.yaml
      - kubernetes/apps/base/game-servers/cmangos/app/resources/**

permissions: write-all

env:
  BUILDER_IMAGE: ghcr.io/xunholy/cmangos-classic-builder
  RUNNER_IMAGE: ghcr.io/xunholy/cmangos-classic

jobs:
  build-builder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build and push builder
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: kubernetes/apps/base/game-servers/cmangos/app/resources
          target: builder
          push: true
          tags: |
            ${{ env.BUILDER_IMAGE }}:${{ github.sha }}
            ${{ env.BUILDER_IMAGE }}:latest
          build-args: |
            THREADS=2
            COMMIT_SHA=${{ github.sha }}
            CACHEBUST=${{ github.run_id }}
          cache-from: type=gha,scope=builder
          cache-to: type=gha,mode=max,scope=builder

  build-runner:
    runs-on: ubuntu-latest
    needs: build-builder
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build and push runner
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: kubernetes/apps/base/game-servers/cmangos/app/resources
          target: runner
          push: true
          tags: |
            ${{ env.RUNNER_IMAGE }}:${{ github.sha }}
            ${{ env.RUNNER_IMAGE }}:latest
          build-args: |
            THREADS=2
            COMMIT_SHA=${{ github.sha }}
            CACHEBUST=${{ github.run_id }}
          cache-from: |
            type=gha,scope=builder
            type=gha,scope=runner
          cache-to: type=gha,mode=max,scope=runner
