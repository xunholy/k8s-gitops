---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Build CMaNGOS Classic"

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - .github/workflows/cmangos.yaml
      - kubernetes/apps/base/game-servers/cmangos/app/resources/**

permissions: write-all

env:
  BUILDER_IMAGE: ghcr.io/xunholy/cmangos-classic-builder
  RUNNER_IMAGE: ghcr.io/xunholy/cmangos-classic

jobs:
  build-builder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build and push builder
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: kubernetes/apps/base/game-servers/cmangos/app/resources
          target: builder
          push: true
          tags: |
            ${{ env.BUILDER_IMAGE }}:${{ github.sha }}
            ${{ env.BUILDER_IMAGE }}:latest
          build-args: |
            THREADS=4
            COMMIT_SHA=${{ github.sha }}
          cache-from: |
            type=gha,scope=builder
            type=registry,ref=${{ env.BUILDER_IMAGE }}:latest
          cache-to: type=gha,mode=max,scope=builder

  build-runner:
    runs-on: ubuntu-latest
    needs: build-builder
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build and push runner
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: kubernetes/apps/base/game-servers/cmangos/app/resources
          target: runner
          push: true
          tags: |
            ${{ env.RUNNER_IMAGE }}:${{ github.sha }}
            ${{ env.RUNNER_IMAGE }}:latest
          build-args: |
            THREADS=4
            COMMIT_SHA=${{ github.sha }}
          cache-from: |
            type=gha,scope=builder
            type=gha,scope=runner
            type=registry,ref=${{ env.RUNNER_IMAGE }}:latest
          cache-to: type=gha,mode=max,scope=runner
