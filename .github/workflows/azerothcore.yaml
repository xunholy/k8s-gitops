---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Build AzerothCore WotLK"

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - .github/workflows/azerothcore.yaml
      - kubernetes/apps/base/game-servers/azerothcore/app/resources/**

permissions: write-all

env:
  CONTEXT: kubernetes/apps/base/game-servers/azerothcore/app/resources
  WORLDSERVER_IMAGE: ghcr.io/xunholy/azerothcore-wotlk-worldserver
  AUTHSERVER_IMAGE: ghcr.io/xunholy/azerothcore-wotlk-authserver
  DB_IMPORT_IMAGE: ghcr.io/xunholy/azerothcore-wotlk-db-import

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and push worldserver
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ env.CONTEXT }}
          target: worldserver
          push: true
          tags: |
            ${{ env.WORLDSERVER_IMAGE }}:${{ github.sha }}
            ${{ env.WORLDSERVER_IMAGE }}:latest
          build-args: THREADS=2
          cache-from: type=gha,scope=azerothcore
          cache-to: type=gha,mode=max,scope=azerothcore

      - name: Build and push authserver
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ env.CONTEXT }}
          target: authserver
          push: true
          tags: |
            ${{ env.AUTHSERVER_IMAGE }}:${{ github.sha }}
            ${{ env.AUTHSERVER_IMAGE }}:latest
          build-args: THREADS=2
          cache-from: type=gha,scope=azerothcore
          cache-to: type=gha,mode=max,scope=azerothcore

      - name: Build and push db-import
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ env.CONTEXT }}
          target: db-import
          push: true
          tags: |
            ${{ env.DB_IMPORT_IMAGE }}:${{ github.sha }}
            ${{ env.DB_IMPORT_IMAGE }}:latest
          build-args: THREADS=2
          cache-from: type=gha,scope=azerothcore
          cache-to: type=gha,mode=max,scope=azerothcore
