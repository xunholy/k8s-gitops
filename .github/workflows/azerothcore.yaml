---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Build AzerothCore WotLK"

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - .github/workflows/azerothcore.yaml
      - kubernetes/apps/base/game-servers/azerothcore/app/resources/**

permissions: write-all

env:
  CONTEXT: kubernetes/apps/base/game-servers/azerothcore/app/resources
  WORLDSERVER_IMAGE: ghcr.io/xunholy/azerothcore-wotlk-worldserver
  AUTHSERVER_IMAGE: ghcr.io/xunholy/azerothcore-wotlk-authserver
  DB_IMPORT_IMAGE: ghcr.io/xunholy/azerothcore-wotlk-db-import

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build and push worldserver
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ env.CONTEXT }}
          target: worldserver
          push: true
          tags: |
            ${{ env.WORLDSERVER_IMAGE }}:${{ github.sha }}
            ${{ env.WORLDSERVER_IMAGE }}:latest
          build-args: THREADS=2
          cache-from: type=gha,scope=azerothcore
          cache-to: type=gha,mode=max,scope=azerothcore

      - name: Build and push authserver
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ env.CONTEXT }}
          target: authserver
          push: true
          tags: |
            ${{ env.AUTHSERVER_IMAGE }}:${{ github.sha }}
            ${{ env.AUTHSERVER_IMAGE }}:latest
          build-args: THREADS=2
          cache-from: type=gha,scope=azerothcore
          cache-to: type=gha,mode=max,scope=azerothcore

      - name: Build and push db-import
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ env.CONTEXT }}
          target: db-import
          push: true
          tags: |
            ${{ env.DB_IMPORT_IMAGE }}:${{ github.sha }}
            ${{ env.DB_IMPORT_IMAGE }}:latest
          build-args: THREADS=2
          cache-from: type=gha,scope=azerothcore
          cache-to: type=gha,mode=max,scope=azerothcore
